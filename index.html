<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    
    <script>
        const manifest = { "name": "Aquapoolco ERP", "short_name": "אקוופולקו", "display": "standalone", "start_url": ".", "theme_color": "#0f172a", "background_color": "#0f172a", "icons": [{"src": "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg", "sizes": "512x512", "type": "image/jpeg", "purpose": "any maskable"}] };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.write('<link rel="manifest" href="' + URL.createObjectURL(blob) + '">');
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 3rem; }
        .status-cell:active { transform: scale(0.95); }
        .status-0 { background-color: #334155; color: #cbd5e1; } .status-1 { background-color: #f59e0b; color: #fff; } .status-2 { background-color: #ef4444; color: #fff; } .status-3 { background-color: #10b981; color: #fff; } 
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: #0f172a; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
        .dir-ltr { direction: ltr; } .hide-scroll::-webkit-scrollbar { display: none; } .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("system-ui");
            const [portalName, setPortalName] = useState("אקוופולקו חן בע\"מ");
            const [officeEmail, setOfficeEmail] = useState("info@aquapoolco.co.il");
            
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendanceLogs, setAttendanceLogs] = useState([]);
            
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [editProjectModal, setEditProjectModal] = useState(null); // חלון עריכת פרויקט
            const [showAddUser, setShowAddUser] = useState(false);
            const [editUserModal, setEditUserModal] = useState(null);
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            
            const [statusModal, setStatusModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null); 
            const [materialsModal, setMaterialsModal] = useState(null);
            const [materialReqType, setMaterialReqType] = useState("stock"); 
            const [materialSignData, setMaterialSignData] = useState(null); 
            
            const [photosModal, setPhotosModal] = useState(null);
            const [currentProjectPhotos, setCurrentProjectPhotos] = useState([]);
            const [activePhotoFolder, setActivePhotoFolder] = useState('כללי');
            
            const [inventoryItemModal, setInventoryItemModal] = useState(null);
            const [invModalTab, setInvModalTab] = useState("gallery"); 
            const [inventoryPhotos, setInventoryPhotos] = useState([]);
            
            const [statusPhotoFile, setStatusPhotoFile] = useState(null);
            const [deliveryModal, setDeliveryModal] = useState(null); 
            const [deliveryPhotoFile, setDeliveryPhotoFile] = useState(null);

            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const invSigPad = useRef(null);
            const invCanvasRef = useRef(null);
            
            const [isUploading, setIsUploading] = useState(false);
            const [signRequirement, setSignRequirement] = useState(null);

            useEffect(() => {
                const savedUser = localStorage.getItem("aquapoolco_user");
                if (savedUser) { try { setCurrentUser(JSON.parse(savedUser)); } catch (e) { localStorage.removeItem("aquapoolco_user"); } }

                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appFont) setAppFont(d.appFont);
                        if (d.portalName) setPortalName(d.portalName);
                        if (d.officeEmail) setOfficeEmail(d.officeEmail);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("users").onSnapshot(snapshot => setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("inventory").onSnapshot(snapshot => setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("attendance").orderBy("timestamp", "desc").limit(100).onSnapshot(snapshot => setAttendanceLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
            }, []);

            useEffect(() => {
                let unsubscribe = () => {};
                if (photosModal) {
                    unsubscribe = db.collection("project_photos").where("projId", "==", photosModal.id).onSnapshot(snapshot => {
                        const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        docs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        setCurrentProjectPhotos(docs);
                    });
                }
                return () => unsubscribe();
            }, [photosModal]);

            useEffect(() => {
                let timeout;
                const resizeCanvas = (ref, padRef) => {
                    if (ref.current) {
                        const canvas = ref.current;
                        const ratio = Math.max(window.devicePixelRatio || 1, 1);
                        canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
                        canvas.getContext("2d").scale(ratio, ratio);
                        padRef.current = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
                    }
                };
                if (signRequirement || materialSignData || deliveryModal) timeout = setTimeout(() => resizeCanvas(canvasRef, sigPad), 150);
                if (inventoryItemModal && invModalTab === 'receive') timeout = setTimeout(() => resizeCanvas(invCanvasRef, invSigPad), 150);
                return () => clearTimeout(timeout);
            }, [signRequirement, materialSignData, inventoryItemModal, invModalTab, deliveryModal]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    const adminUser = { id: "admin-roei", name: "רועי גלם (מנכ''ל)", username: "roeigalam", role: "admin", tz: "000000000", phone: "0500000000" };
                    setCurrentUser(adminUser); localStorage.setItem("aquapoolco_user", JSON.stringify(adminUser)); return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) { setCurrentUser(userDoc); localStorage.setItem("aquapoolco_user", JSON.stringify(userDoc)); } 
                else { alert("שם משתמש או סיסמה שגויים."); }
            };

            const handleLogout = () => { setCurrentUser(null); localStorage.removeItem("aquapoolco_user"); };

            const logAttendanceAndLocation = (actionDetails, callback = null) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        p => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails, lat: p.coords.latitude, lng: p.coords.longitude, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        e => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails + " (ללא מיקום)", lat: null, lng: null, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                    );
                } else { if (callback) callback(); }
            };

            const handleWazeClick = (proj, e) => {
                e.preventDefault(); const wazeUrl = `waze://?q=${encodeURIComponent(proj.address)}&navigate=yes`;
                logAttendanceAndLocation(`ניווט לפרויקט: ${proj.name}`, () => { window.location.href = wazeUrl; });
                setTimeout(() => { window.location.href = wazeUrl; }, 1000);
            };

            const handleDeliveryAction = (e) => {
                e.preventDefault(); const { proj, mat, actionType } = deliveryModal;
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום!");
                if (actionType === 'confirm') {
                    if (!deliveryPhotoFile) return alert("חובה לצלם ציוד!");
                    setIsUploading(true);
                    const reader = new FileReader(); reader.onload = (event) => {
                        const img = new Image(); img.onload = () => {
                            const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; const scale = Math.min(1, MAX_WIDTH / img.width);
                            canvas.width = img.width * scale; canvas.height = img.height * scale;
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            const imgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                            db.collection("project_photos").add({ projId: proj.id, projName: proj.name, folder: "ציוד שסופק לשטח", imageBase64: imgBase64, uploadedBy: currentUser.name, timestamp: new Date().toISOString() })
                            .then(() => {
                                const updated = proj.allocatedMaterials.map(m => m.id === mat.id ? { ...m, status: 'delivered', deliveryDate: new Date().toISOString(), driverSig: sigPad.current.toDataURL(), driverName: currentUser.name } : m);
                                db.collection("projects").doc(proj.id).update({ allocatedMaterials: updated });
                                logAttendanceAndLocation(`אספקת ציוד: ${mat.name} ל${proj.name}`); setIsUploading(false); setDeliveryModal(null); setDeliveryPhotoFile(null);
                            });
                        }; img.src = event.target.result;
                    }; reader.readAsDataURL(deliveryPhotoFile);
                } else {
                    const updated = proj.allocatedMaterials.filter(m => m.id !== mat.id);
                    db.collection("projects").doc(proj.id).update({ allocatedMaterials: updated });
                    logAttendanceAndLocation(`ביטול חלוקה: ${mat.name}. סיבה: ${e.target.cancelReason.value}`); setDeliveryModal(null);
                }
            };

            const confirmSignatureAndStatus = (e) => {
                e.preventDefault(); if (!sigPad.current || sigPad.current.isEmpty() || !statusPhotoFile) return alert("חובה לצלם ולחתום!");
                setIsUploading(true);
                const reader = new FileReader(); reader.onload = (event) => {
                    const img = new Image(); img.onload = () => {
                        const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; const scale = Math.min(1, MAX_WIDTH / img.width);
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        db.collection("project_photos").add({ projId: signRequirement.projId, projName: projects.find(p=>p.id===signRequirement.projId)?.name, folder: signRequirement.stageLabel, imageBase64: canvas.toDataURL('image/jpeg', 0.6), uploadedBy: currentUser.name, timestamp: new Date().toISOString() })
                        .then(() => {
                            db.collection("projects").doc(signRequirement.projId).update({ [`statuses.${signRequirement.stageId}`]: signRequirement.code, [`signatures.${signRequirement.stageId}`]: { name: currentUser.name, id: currentUser.tz, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() } });
                            logAttendanceAndLocation(`סטטוס: ${signRequirement.newStatus} ב${signRequirement.projName}`); setIsUploading(false); setSignRequirement(null); setStatusModal(null);
                        });
                    }; img.src = event.target.result;
                }; reader.readAsDataURL(statusPhotoFile);
            };

            const handleMaterialSubmit = (e) => {
                e.preventDefault(); const data = { type: materialReqType, qty: Number(e.target.qty.value) };
                if (materialReqType === 'stock') {
                    const item = inventory.find(i=>i.id===e.target.itemId.value); if (item.quantity < data.qty) return alert("אין מלאי!");
                    data.itemId = item.id; data.itemName = item.name;
                } else { data.itemName = "הזמנה מיוחדת: " + e.target.specialText.value; }
                if (currentUser.role === 'admin') executeMaterialAllocation(data, null); else setMaterialSignData(data);
            };

            const executeMaterialAllocation = (data, sig) => {
                if (data.type === 'stock') { const item=inventory.find(i=>i.id===data.itemId); db.collection("inventory").doc(data.itemId).update({ quantity: item.quantity - data.qty }); }
                const updated = [...(materialsModal.allocatedMaterials || []), { id: Date.now().toString(), name: data.itemName, quantity: data.qty, date: new Date().toISOString(), status: 'pending', signature: sig }];
                db.collection("projects").doc(materialsModal.id).update({ allocatedMaterials: updated }); setMaterialSignData(null); setMaterialsModal(null);
            };

            const handleInventoryReceive = (e) => {
                e.preventDefault(); if (!invSigPad.current || invSigPad.current.isEmpty()) return alert("חובה לחתום!");
                setIsUploading(true);
                const current = inventory.find(i=>i.id===inventoryItemModal.id);
                db.collection("inventory").doc(inventoryItemModal.id).update({ quantity: current.quantity + Number(e.target.qty.value) }).then(() => {
                    logAttendanceAndLocation(`מלאי: +${e.target.qty.value} ל${current.name}`); setInvModalTab("gallery"); setIsUploading(false);
                });
            };

            const getCheckedValues = (form, name) => { const ins=form[name]; if(!ins) return []; return ins.length ? Array.from(ins).filter(i=>i.checked).map(i=>i.value) : (ins.checked ? [ins.value] : []); };
            const deleteAttendanceRecord = (id) => { if(window.confirm("למחוק?")) db.collection("attendance").doc(id).delete(); };
            const handleFinanceChange = (id, f, v) => db.collection("projects").doc(id).update({ [f]: Number(v) });
            const filteredProjects = projects.filter(p => !searchTerm || p.name.includes(searchTerm) || p.address.includes(searchTerm));
            const activeProjectsList = filteredProjects.filter(p => !p.isFinished);
            const roleLabels = { admin: "מנהל", warehouse: "מחסנאי", driver: "נהג", worker: "צוות שטח" };

            if (!currentUser) return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <form onSubmit={handleLogin} className="glass p-10 rounded-[2rem] w-full max-sm text-center shadow-2xl" style={{ borderTop: `4px solid ${appColor}` }}>
                        <img src={LOGO_URL} className="h-24 mx-auto mb-6 bg-white p-3 rounded-2xl" />
                        <h1 className="text-2xl font-black mb-8 text-white">Aquapoolco Elite</h1>
                        <input type="text" placeholder="שם משתמש" required value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-4 text-center text-white outline-none" />
                        <input type="password" placeholder="סיסמה" required value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-8 text-center text-white outline-none" />
                        <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black shadow-lg">כניסה</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <style>{`:root { --theme-color: ${appColor}; --theme-font: ${appFont}; } body { font-family: var(--theme-font); } .theme-bg { background-color: var(--theme-color); } .theme-text { color: var(--theme-color); }`}</style>

                    <header className="glass px-4 py-3 flex flex-col md:flex-row justify-between items-center sticky top-0 z-30 border-b border-white/5 gap-3 shadow-md">
                        <div className="flex w-full justify-between items-center md:w-auto">
                            <div className="flex items-center gap-3"><img src={LOGO_URL} className="h-10 bg-white rounded-lg p-1" /><div><div className="text-base font-black text-white">{portalName}</div><div className="text-[10px] theme-text">{currentUser.name} | {roleLabels[currentUser.role]}</div></div></div>
                            <button onClick={handleLogout} className="md:hidden w-10 h-10 flex items-center justify-center bg-slate-800 rounded-full text-slate-400">🚪</button>
                        </div>
                        <nav className="flex gap-2 w-full overflow-x-auto hide-scroll pb-1 md:w-auto md:pb-0">
                            <button onClick={() => setActiveTab("board")} className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold transition-all text-sm ${activeTab === 'board' ? 'theme-bg' : 'bg-slate-800 text-slate-300'}`}>📊 עבודה</button>
                            {currentUser.role === 'admin' && <button onClick={() => setActiveTab("attendance")} className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold transition-all text-sm ${activeTab === 'attendance' ? 'theme-bg' : 'bg-slate-800 text-slate-300'}`}>📍 נוכחות</button>}
                            {(currentUser.role === 'admin' || currentUser.role === 'driver') && <button onClick={() => setActiveTab("deliveries")} className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold transition-all text-sm ${activeTab === 'deliveries' ? 'theme-bg' : 'bg-slate-800 text-slate-300'}`}>🚚 חלוקה</button>}
                            {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && <button onClick={() => setActiveTab("inventory")} className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold transition-all text-sm ${activeTab === 'inventory' ? 'theme-bg' : 'bg-slate-800 text-slate-300'}`}>📦 מחסן</button>}
                            {currentUser.role === 'admin' && <button onClick={() => setActiveTab("finance")} className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold transition-all text-sm ${activeTab === 'finance' ? 'theme-bg' : 'bg-slate-800 text-slate-300'}`}>💰 כספים</button>}
                            {currentUser.role === 'admin' && <button onClick={() => setActiveTab("settings")} className={`whitespace-nowrap px-4 py-2.5 rounded-xl font-bold transition-all text-sm ${activeTab === 'settings' ? 'theme-bg' : 'bg-slate-800 text-slate-300'}`}>⚙️ הגדרות</button>}
                        </nav>
                        <button onClick={handleLogout} className="hidden md:block text-slate-500 font-bold text-sm">התנתק</button>
                    </header>

                    <main className="flex-1 p-3 md:p-8">
                        {activeTab === "board" && (
                            <div className="animate-fade-in max-w-[1600px] mx-auto">
                                <div className="mb-6 flex justify-between items-center"><input type="text" placeholder="🔍 חפש פרויקט..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full md:w-80 p-4 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none" />{currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="theme-bg px-6 py-3 rounded-xl font-bold text-white shadow-lg mr-4">➕ פרויקט חדש</button>}</div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {activeProjectsList.map(proj => {
                                        const done = stages.filter(s => proj.statuses && proj.statuses[s.id] === 3).length; const progress = stages.length ? Math.round((done / stages.length) * 100) : 0;
                                        const teamNames = (Array.isArray(proj.assignedUsers) && proj.assignedUsers.length > 0) ? proj.assignedUsers.map(uid => users.find(x=>x.id===uid)?.name || '').filter(Boolean).join(', ') : 'לא שובץ';
                                        return (
                                            <div key={proj.id} className="bg-slate-900/80 p-5 rounded-[2rem] border border-white/10 shadow-xl relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-2 h-full theme-bg opacity-80"></div>
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <h3 className="font-black text-white text-xl flex items-center gap-2">{proj.name} {currentUser.role === 'admin' && <button onClick={() => setEditProjectModal(proj)} className="text-blue-400 text-sm hover:text-white transition">✏️</button>}</h3>
                                                        <p className="text-[10px] text-slate-500 mt-1">👥 {teamNames}</p>
                                                    </div>
                                                    <a href="#" onClick={(e) => handleWazeClick(proj, e)} className="bg-blue-600 px-3 py-1.5 rounded-xl text-xs font-black text-white">🚗 Waze</a>
                                                </div>
                                                <p className="text-sm text-slate-400 mb-4">📍 {proj.address}</p>
                                                <div className="grid grid-cols-2 gap-2 mb-4">
                                                    {stages.map(stage => {
                                                        const code = (proj.statuses && proj.statuses[stage.id]) || 0;
                                                        return <button key={stage.id} onClick={() => setStatusModal({ projId: proj.id, stageId: stage.id, projName: proj.name, stageLabel: stage.label, currentCode: code })} className={`p-2 rounded-xl text-[10px] font-bold text-white status-${code}`}>{stage.label}: {statusLabels[code]}</button>
                                                    })}
                                                </div>
                                                <div className="flex items-center gap-3 mb-5"><span className="text-xs font-black text-white">{progress}%</span><div className="flex-1 bg-slate-800 rounded-full h-3 overflow-hidden"><div className="h-full theme-bg" style={{width:`${progress}%`}}></div></div></div>
                                                <div className="flex justify-between border-t border-white/5 pt-4">
                                                    <div className="flex gap-2"><button onClick={() => setPhotosModal(proj)} className="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl text-sm font-bold">📷 תמונות</button><button onClick={() => setMaterialsModal(proj)} className="bg-amber-600/20 text-amber-500 px-4 py-2 rounded-xl text-sm font-bold">📦 חומרים</button></div>
                                                    {currentUser.role === 'admin' && <button onClick={() => setFinishModal(proj)} className="w-10 h-10 bg-emerald-600/20 text-emerald-500 rounded-xl text-lg flex items-center justify-center font-bold">✅</button>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === "attendance" && currentUser.role === 'admin' && (
                            <div className="max-w-5xl mx-auto glass p-6 rounded-[2rem] animate-fade-in">
                                <h2 className="text-2xl font-black text-white mb-6">📍 יומן נוכחות ומיקומים</h2>
                                <div className="overflow-x-auto bg-slate-900 rounded-2xl border border-white/10">
                                    <table className="w-full text-right text-sm">
                                        <thead><tr className="bg-slate-800 text-slate-300"><th className="p-4 font-bold">שם</th><th className="p-4 font-bold">פעולה</th><th className="p-4 font-bold">זמן</th><th className="p-4 font-bold text-center">מיקום</th></tr></thead>
                                        <tbody>
                                            {attendanceLogs.map(log => (
                                                <tr key={log.id} className="border-b border-white/5"><td className="p-4 font-bold text-white">👤 {log.userName}</td><td className="p-4 text-emerald-400">{log.action}</td><td className="p-4 text-slate-400 dir-ltr text-right">{new Date(log.timestamp).toLocaleString('he-IL')}</td><td className="p-4 text-center">{log.lat ? <a href={`https://www.google.com/maps/search/?api=1&query=${log.lat},${log.lng}`} target="_blank" className="bg-blue-600 text-white px-2 py-1 rounded text-[10px] font-bold">🗺️ מפה</a> : <span className="text-red-400">ללא מיקום</span>}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* שאר הטאבים כפי שהיו בקוד הקודם... */}
                    </main>

                    {/* חלון עריכת פרויקט (חדש למנהל) */}
                    {editProjectModal && (
                        <div className="fixed inset-0 bg-slate-900/95 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => {
                                e.preventDefault();
                                const assigned = getCheckedValues(e.target, 'assignedUsers');
                                db.collection("projects").doc(editProjectModal.id).update({
                                    name: e.target.n.value, address: e.target.a.value, clientPhone: e.target.phone.value, assignedUsers: assigned
                                }).then(() => setEditProjectModal(null));
                            }} className="bg-[#1e293b] w-full md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px] border-blue-500 overflow-y-auto max-h-[90vh]">
                                <h2 className="text-white text-2xl font-black mb-5">עריכת תיק פרויקט</h2>
                                <div className="space-y-4">
                                    <div><label className="text-xs text-slate-400 font-bold block mb-1">שם הפרויקט / לקוח</label><input name="n" defaultValue={editProjectModal.name} className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required /></div>
                                    <div><label className="text-xs text-slate-400 font-bold block mb-1">כתובת מדוייקת (לווייז)</label><input name="a" defaultValue={editProjectModal.address} className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required /></div>
                                    <div><label className="text-xs text-slate-400 font-bold block mb-1">טלפון לקוח (לוואטסאפ)</label><input name="phone" type="tel" defaultValue={editProjectModal.clientPhone} className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required /></div>
                                    <div className="pt-2">
                                        <label className="text-xs text-amber-400 font-bold block mb-2">ניהול צוות מבצע:</label>
                                        <div className="bg-slate-900 rounded-xl p-2 max-h-40 overflow-y-auto">
                                            {users.map(u => (
                                                <label key={u.id} className="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl transition cursor-pointer">
                                                    <input type="checkbox" value={u.id} name="assignedUsers" defaultChecked={Array.isArray(editProjectModal.assignedUsers) && editProjectModal.assignedUsers.includes(u.id)} className="w-5 h-5 rounded accent-blue-500" />
                                                    <span className="text-white font-bold">{u.name}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-3 mt-6">
                                    <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg">שמור שינויים</button>
                                    <button type="button" onClick={()=>setEditProjectModal(null)} className="w-full text-slate-400 font-bold">ביטול</button>
                                    {currentUser.role === 'admin' && <button type="button" onClick={() => {if(window.confirm('למחוק פרויקט זה לצמיתות?')) db.collection('projects').doc(editProjectModal.id).delete().then(()=>setEditProjectModal(null))}} className="w-full text-red-500 text-xs font-bold mt-2">מחיקת פרויקט לצמיתות ⚠️</button>}
                                </div>
                            </form>
                        </div>
                    )}

                    {/* חלון חלוקה: סופק / ביטול */}
                    {deliveryModal && (
                        <div className="fixed inset-0 bg-slate-900/95 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={handleDeliveryAction} className="bg-[#1e293b] w-full md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px] border-emerald-500">
                                <h2 className="text-white text-center text-2xl font-black mb-1">{deliveryModal.actionType === 'confirm' ? 'תיעוד אספקה' : 'ביטול משימה'}</h2>
                                <p className="text-center text-slate-400 text-sm mb-6">{deliveryModal.mat.quantity} x {deliveryModal.mat.name}</p>
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto">
                                    {deliveryModal.actionType === 'confirm' ? (
                                        <label className={`w-full py-4 rounded-xl font-black text-sm transition cursor-pointer flex items-center justify-center gap-2 border border-dashed ${deliveryPhotoFile ? 'bg-emerald-600/20 text-emerald-400 border-emerald-500' : 'bg-slate-800 text-white border-white/30'}`}>
                                            {isUploading ? <span className="loader"></span> : (deliveryPhotoFile ? "📷 תמונה צולמה ✓" : "📷 צלם ציוד שסופק")}
                                            <input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => setDeliveryPhotoFile(e.target.files[0])} disabled={isUploading} />
                                        </label>
                                    ) : (
                                        <textarea name="cancelReason" rows="3" placeholder="סיבת ביטול (חובה)..." className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required></textarea>
                                    )}
                                    <div className="flex flex-col min-h-[200px]"><div className="flex justify-between items-center mb-2"><label className="text-xs text-slate-400 font-bold">חתימה:</label><button type="button" onClick={() => sigPad.current.clear()} className="bg-slate-700 text-white px-3 py-1 rounded text-xs">נקה</button></div><div className="flex-1 w-full bg-white rounded-2xl border-4 border-emerald-500/50 overflow-hidden touch-none relative"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" /></div></div>
                                </div>
                                <div className="flex gap-3 mt-6 pt-4 border-t border-white/10"><button type="submit" disabled={isUploading} className={`flex-1 text-white py-4 rounded-xl font-black text-lg ${deliveryModal.actionType === 'confirm' ? 'bg-emerald-600' : 'bg-red-600'}`}>{isUploading ? 'מעלה...' : 'אשר פעולה'}</button><button type="button" onClick={() => {setDeliveryModal(null); setDeliveryPhotoFile(null);}} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {/* חלון חתימה וסטטוס */}
                    {signRequirement && (
                        <div className="fixed inset-0 bg-slate-900/95 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={confirmSignatureAndStatus} className="bg-[#1e293b] w-full md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px] border-blue-500">
                                <h2 className="text-white text-center text-2xl font-black mb-1">אישור סטטוס</h2>
                                <p className="text-center text-slate-400 text-sm mb-4">מעבר ל: <span className="text-white font-bold">{signRequirement.newStatus}</span></p>
                                <div className="space-y-4 max-h-[60vh] overflow-y-auto">
                                    <div className="flex flex-col min-h-[200px]"><div className="flex justify-between items-center mb-2"><label className="text-xs text-slate-400 font-bold">חתימה:</label><button type="button" onClick={() => sigPad.current.clear()} className="bg-slate-700 text-white px-3 py-1 rounded text-xs">נקה</button></div><div className="flex-1 w-full bg-white rounded-2xl border-4 border-blue-500/50 overflow-hidden touch-none relative"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" /></div></div>
                                    <label className={`w-full py-4 rounded-xl font-black text-sm cursor-pointer flex items-center justify-center gap-2 border border-dashed ${statusPhotoFile ? 'bg-blue-600/20 text-blue-400 border-blue-500' : 'bg-slate-800 text-white border-white/30'}`}>{isUploading ? <span className="loader"></span> : (statusPhotoFile ? "📷 תמונה נבחרה ✓" : "📷 צלם מהשטח")}<input type="file" accept="image/*" capture="environment" className="hidden" onChange={(e) => setStatusPhotoFile(e.target.files[0])} disabled={isUploading} required /></label>
                                </div>
                                <div className="flex gap-3 mt-6 pt-4 border-t border-white/10"><button type="submit" disabled={isUploading} className="flex-1 theme-bg text-white py-4 rounded-xl font-black text-lg">אשר</button><button type="button" onClick={() => {setSignRequirement(null); setStatusPhotoFile(null);}} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {/* חלון בחירת סטטוס */}
                    {statusModal && !signRequirement && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50" onClick={() => setStatusModal(null)}>
                            <div className="bg-[#1e293b] w-full md:max-w-sm rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px]" style={{borderColor: appColor}} onClick={e=>e.stopPropagation()}>
                                <h3 className="text-center text-slate-400 text-xs font-bold uppercase">{statusModal.projName}</h3>
                                <h2 className="text-center text-2xl font-black text-white mb-6 border-b border-white/10 pb-4">{statusModal.stageLabel}</h2>
                                <div className="space-y-3">
                                    {[0,1,2,3].map(code => (
                                        <button key={code} onClick={() => { if(code !== statusModal.currentCode) setSignRequirement({ ...statusModal, code, newStatus: statusLabels[code] }); else setStatusModal(null); }} className={`w-full py-4 rounded-xl font-black text-lg status-${code} ${statusModal.currentCode===code?'ring-4 ring-white/30':''}`}>{statusLabels[code]}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setStatusModal(null)} className="w-full mt-4 text-slate-400 font-bold py-3">ביטול</button>
                            </div>
                        </div>
                    )}

                    {/* יצירת פרויקט חדש */}
                    {showAddProject && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => { e.preventDefault(); const assigned = getCheckedValues(e.target, 'assignedUsers'); db.collection("projects").add({ name: e.target.n.value, address: e.target.a.value, clientPhone: e.target.phone.value, assignedUsers: assigned, statuses: {}, isFinished: false, createdAt: firebase.firestore.Timestamp.now() }).then(() => setShowAddProject(false)); }} className="bg-[#1e293b] w-full h-[90vh] md:h-auto md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl flex flex-col" style={{ borderTop: `6px solid ${appColor}` }}>
                                <h2 className="text-white text-2xl font-black mb-5">הקמת פרויקט חדש</h2>
                                <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                                    <input name="n" placeholder="שם פרויקט / לקוח" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required />
                                    <input name="a" placeholder="כתובת מדוייקת (לווייז)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required />
                                    <input name="phone" type="tel" placeholder="טלפון לקוח (לוואטסאפ)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none" required />
                                    <div className="pt-2"><label className="text-xs text-amber-400 font-bold block mb-2">שיוך צוות:</label>
                                        <div className="bg-slate-900 rounded-xl p-2 max-h-40 overflow-y-auto">{users.map(u => ( <label key={u.id} className="flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl cursor-pointer"><input type="checkbox" value={u.id} name="assignedUsers" className="w-5 h-5 rounded accent-blue-500" /><span className="text-white font-bold">{u.name}</span></label> ))}</div>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-3 mt-4 pt-4 border-t border-white/10"><button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg">צור פרויקט</button><button type="button" onClick={()=>setShowAddProject(false)} className="w-full text-slate-400 font-bold py-2">ביטול</button></div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
