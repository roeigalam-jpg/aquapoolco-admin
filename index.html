<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkBase - הרמוניה תפעולית מוחלטת</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/linkbase-icon.jpeg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/linkbase-icon.jpeg">
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Heebo:wght@400;700;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-storage-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@3.0.0-beta.0/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@3.0.0-beta.0/default.css">
    
    <style>
        :root {
            --app-bg: #0f172a;
            --theme-color: #3b82f6;
            --app-card-bg: rgba(30, 41, 59, 0.85);
            --app-radius: 1rem;
            --theme-font: 'Rubik', sans-serif;
        }

        body {
            background-color: var(--app-bg);
            color: white;
            font-family: var(--theme-font);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: var(--app-card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .table-container {
            overflow-x: auto;
            border-radius: var(--app-radius);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: right;
        }

        th {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            color: #94a3b8;
            font-size: 0.875rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        td {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .theme-bg {
            background-color: var(--theme-color) !important;
            color: white !important;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--theme-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-cell {
            cursor: pointer;
            border-radius: 0.5rem;
            text-align: center;
            font-weight: bold;
            padding: 0.75rem 0.5rem;
            transition: all 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 3.5rem;
        }

        .status-cell.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        .pulse-glow { animation: pulseGlow 1.5s infinite; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .dir-ltr { direction: ltr; }
        
        /* סגנון חלון הדפסה ל-PDF */
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        MobileDragDrop.polyfill({ holdToDrag: 300 });
        const { useState, useEffect, useRef, useMemo } = React;

        // ================= FIREBASE CONFIG =================
        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ================= GLOBALS =================
        const APP_NAME = "LinkBase";
        const APP_SLOGAN = "הרמוניה תפעולית מוחלטת";
        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/linkbase-icon.jpeg";
        const roleLabels = {
            admin: "מנהל מערכת",
            accounting: "הנהלת חשבונות",
            warehouse: "מחסנאי",
            driver: "נהג חלוקה",
            worker: "צוות שטח"
        };

        // ================= MAIN APP COMPONENT =================
        function App() {
            // --- Auth State ---
            const [currentUser, setCurrentUser] = useState(null);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            const [verificationModal, setVerificationModal] = useState(null);
            const [verifyPhoneInput, setVerifyPhoneInput] = useState("");
            const [verificationCode, setVerificationCode] = useState("");
            const [generatedCode, setGeneratedCode] = useState(null);
            const [verifyStep, setVerifyStep] = useState(1);

            // --- Core Data State ---
            const [projects, setProjects] = useState([]);
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendanceLogs, setAttendanceLogs] = useState([]);
            const [allPhotos, setAllPhotos] = useState([]);

            // --- Settings State ---
            const [stages, setStages] = useState([
                {id: 's1', label: 'שלב א'},
                {id: 's2', label: 'שלב ב'}
            ]);
            const [statusLabels, setStatusLabels] = useState({
                0: "טרם התחיל",
                1: "בתהליך",
                2: "מעוכב ⚠️",
                3: "בוצע ✓"
            });

            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("'Rubik', sans-serif");
            const [appFontSize, setAppFontSize] = useState("app-text-normal");
            const [appBgColor, setAppBgColor] = useState("#0f172a");
            const [appCardBg, setAppCardBg] = useState("rgba(30, 41, 59, 0.85)");
            const [appRadius, setAppRadius] = useState("1rem");

            const [usersTabPassword, setUsersTabPassword] = useState("admin123");
            const [isUsersUnlocked, setIsUsersUnlocked] = useState(false);
            const [authUsersModal, setAuthUsersModal] = useState(false);
            const [usersPasswordInput, setUsersPasswordInput] = useState("");

            // --- Navigation & View State ---
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            const [deliveriesView, setDeliveriesView] = useState("pending");
            const [galleryFilterFolder, setGalleryFilterFolder] = useState("הכל");

            // --- Modals State ---
            const [showAddProject, setShowAddProject] = useState(false);
            const [editProjectModal, setEditProjectModal] = useState(null);
            const [showAddUser, setShowAddUser] = useState(false);
            const [editUserModal, setEditUserModal] = useState(null);
            const [assignModal, setAssignModal] = useState(null);
            const [showAddInventory, setShowAddInventory] = useState(false);
            const [statusModal, setStatusModal] = useState(null);
            const [signRequirement, setSignRequirement] = useState(null);
            const [adminOverrideModal, setAdminOverrideModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null);
            const [leaderboardModal, setLeaderboardModal] = useState(false);
            const [callTeamModal, setCallTeamModal] = useState(null);
            const [materialsModal, setMaterialsModal] = useState(null);
            const [materialReqType, setMaterialReqType] = useState("stock");
            const [materialSignData, setMaterialSignData] = useState(null);
            const [photosModal, setPhotosModal] = useState(null);
            const [inventoryItemModal, setInventoryItemModal] = useState(null);
            const [deliveryModal, setDeliveryModal] = useState(null);
            const [cancelDeliveryModal, setCancelDeliveryModal] = useState(null);
            const [mediaPreview, setMediaPreview] = useState(null);

            // --- Loading & Files State ---
            const [statusPhotoFiles, setStatusPhotoFiles] = useState(null);
            const [invDeliveryFiles, setInvDeliveryFiles] = useState(null);
            const [deliveryPhotoFiles, setDeliveryPhotoFiles] = useState(null);
            const [draggedProjId, setDraggedProjId] = useState(null);
            const [draggedDelivId, setDraggedDelivId] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [isZipLoading, setIsZipLoading] = useState(false);

            // --- Refs ---
            const invSigPad = useRef(null);
            const invCanvasRef = useRef(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
// ================= EFFECTS =================
            useEffect(() => {
                const savedUser = localStorage.getItem("aquapoolco_user");
                if (savedUser) { try { setCurrentUser(JSON.parse(savedUser)); } catch (e) {} }

                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages); if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor); if (d.appFont) setAppFont(d.appFont);
                        if (d.appFontSize) setAppFontSize(d.appFontSize); if (d.appBgColor) setAppBgColor(d.appBgColor);
                        if (d.appCardBg) setAppCardBg(d.appCardBg); if (d.appRadius) setAppRadius(d.appRadius);
                        if (d.usersTabPassword) setUsersTabPassword(d.usersTabPassword);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snap => setProjects(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                db.collection("users").onSnapshot(snap => setUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                db.collection("inventory").onSnapshot(snap => setInventory(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                db.collection("attendance").orderBy("timestamp", "desc").limit(100).onSnapshot(snap => setAttendanceLogs(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                db.collection("project_photos").orderBy("timestamp", "desc").onSnapshot(snap => setAllPhotos(snap.docs.map(d => ({id: d.id, ...d.data()}))));
            }, []);

            useEffect(() => setSearchTerm(""), [activeTab]);

            useEffect(() => {
                const resizeCanvas = (ref, padRef) => {
                    if (ref.current) {
                        const canvas = ref.current; const ratio = Math.max(window.devicePixelRatio || 1, 1);
                        canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
                        canvas.getContext("2d").scale(ratio, ratio);
                        padRef.current = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
                    }
                };
                if (signRequirement || materialSignData || deliveryModal || cancelDeliveryModal) setTimeout(() => resizeCanvas(canvasRef, sigPad), 150);
                if (inventoryItemModal) setTimeout(() => resizeCanvas(invCanvasRef, invSigPad), 150);
            }, [signRequirement, materialSignData, deliveryModal, cancelDeliveryModal, inventoryItemModal]);

            // ================= UTILS & FUNCTIONS =================
            const addScore = (points) => { if (currentUser && (currentUser.role === 'worker' || currentUser.role === 'driver')) db.collection("users").doc(currentUser.id).update({ score: firebase.firestore.FieldValue.increment(points) }); };
            
            const logAttendanceAndLocation = (actionDetails, callback = null) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails, lat: pos.coords.latitude, lng: pos.coords.longitude, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        err => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails + " (ללא מיקום)", timestamp: new Date().toISOString() }); if (callback) callback(); },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                } else if (callback) callback();
            };

            const uploadFilesToStorageAndDB = async (files, collectionName, extraData) => {
                if (!files || files.length === 0) return [];
                const uploadPromises = Array.from(files).map(async (file) => {
                    try {
                        let fileUrl = ""; let fileType = "";
                        if (file.type.startsWith('video/')) { const ref = storage.ref(`videos/${Date.now()}_${file.name}`); await ref.put(file); fileUrl = await ref.getDownloadURL(); fileType = 'video'; } 
                        else { const ref = storage.ref(`images/${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`); await ref.put(file); fileUrl = await ref.getDownloadURL(); fileType = 'image'; }
                        if (fileUrl) { const docRef = await db.collection(collectionName).add({ ...extraData, fileUrl, fileType, uploadedBy: currentUser.name, timestamp: new Date().toISOString() }); return { id: docRef.id, url: fileUrl, type: fileType }; }
                    } catch (error) { console.error(error); throw error; }
                });
                return Promise.all(uploadPromises);
            };

            const handleSecureDownload = async (url, filename) => {
                if (currentUser?.role !== 'admin') return;
                try { const res = await fetch(url); const blob = await res.blob(); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = filename; link.click(); } 
                catch (e) { alert("שגיאה בהורדה."); window.open(url, '_blank'); }
            };

            const downloadProjectZip = async (projId, projName) => {
                if (currentUser?.role !== 'admin') return;
                setIsZipLoading(true);
                const zip = new JSZip();
                const photosToZip = allPhotos.filter(p => p.projId === projId);
                if(photosToZip.length === 0) { alert("אין מדיה בפרויקט."); setIsZipLoading(false); return; }
                try {
                    for (let photo of photosToZip) { const res = await fetch(photo.url); const blob = await res.blob(); zip.folder(photo.folder || "כללי").file(`${photo.id}.jpg`, blob); }
                    const content = await zip.generateAsync({type: "blob"}); const link = document.createElement('a'); link.href = URL.createObjectURL(content); link.download = `${projName}_ארכיון.zip`; link.click();
                } catch (e) { alert("שגיאה ב-ZIP."); }
                setIsZipLoading(false);
            };

            const deletePhoto = async (photoId, isModal = false) => {
                if(currentUser?.role !== 'admin' || !window.confirm("למחוק לצמיתות?")) return;
                await db.collection("project_photos").doc(photoId).delete();
                if(isModal) setMediaPreview(null);
            };

            const generateProjectBook = (proj) => {
                const deliveredMats = (proj.allocatedMaterials || []).filter(m => m.status === 'delivered');
                const team = (proj.assignedUsers || []).map(uid => users.find(x=>x.id===uid)?.name).filter(Boolean).join(', ') || 'טרם שובץ';
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html dir="rtl" lang="he"><head><title>תיק מתקן - ${proj.name}</title>
                    <style>body{font-family:Arial,sans-serif;padding:40px;color:#0f172a;direction:rtl;text-align:right;}
                    .h{text-align:center;border-bottom:3px solid #2563eb;padding-bottom:20px;margin-bottom:30px;}
                    h1{font-size:36px;margin:0;font-weight:900;} h2{color:#2563eb;font-size:22px;margin:5px 0 0 0;}
                    table{width:100%;border-collapse:collapse;margin-bottom:40px;font-size:16px;} th,td{padding:12px;border:1px solid #cbd5e1;text-align:right;}
                    th{background:#f8fafc;} .s3{color:#16a34a;font-weight:bold;} .s2{color:#dc2626;font-weight:bold;} @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }</style>
                    </head><body><div class="h"><h1>${APP_NAME}</h1><h2>${APP_SLOGAN}</h2><h3 style="margin-top:20px;background:#f1f5f9;padding:10px;display:inline-block;border-radius:8px;">תיק מתקן - סיכום פרויקט</h3></div>
                    <div style="font-size:18px;margin-bottom:30px;line-height:1.8;"><p><strong>פרויקט:</strong> ${proj.name}</p><p><strong>כתובת:</strong> ${proj.address||'-'}</p><p><strong>צוות:</strong> ${team}</p><p><strong>תאריך:</strong> ${new Date().toLocaleDateString('he-IL')}</p></div>
                    <h3 style="border-bottom:2px solid #cbd5e1;padding-bottom:5px;margin-bottom:15px;">שלבי ביצוע:</h3>
                    <table><tr><th>שלב</th><th>סטטוס</th></tr>${stages.map(s=>{const c=proj.statuses?.[s.id]||0;return `<tr><td><b>${s.label}</b></td><td class="${c===3?'s3':c===2?'s2':''}">${statusLabels[c]}</td></tr>`;}).join('')}</table>
                    <h3 style="border-bottom:2px solid #cbd5e1;padding-bottom:5px;margin-bottom:15px;">ציוד שהותקן:</h3>
                    <ul style="font-size:16px;line-height:2;padding-right:20px;">${deliveredMats.length>0?deliveredMats.map(m=>`<li><strong>${m.name}</strong> - כמות: ${m.quantity}</li>`).join(''):'<li>לא סופק ציוד דרך המערכת.</li>'}</ul>
                    <div style="margin-top:60px;text-align:center;font-size:14px;color:#64748b;border-top:1px solid #e2e8f0;padding-top:20px;">מופק אוטומטית ממערכת ${APP_NAME}.</div></body></html>
                `);
                printWindow.document.close(); printWindow.focus(); setTimeout(() => printWindow.print(), 500);
            };

            const handleWhatsAppAndPDF = (proj) => { generateProjectBook(proj); const msg = `שלום, מצורף עדכון ודוח מסירת עבודה מאת ${APP_NAME}.`; const phone = proj.clientPhone?proj.clientPhone.replace(/^0/,'972'):''; if(phone) setTimeout(()=>window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank'),1000); };
            const handleWazeClick = (proj, e) => { if(e) e.preventDefault(); logAttendanceAndLocation(`ניווט ל: ${proj.name}`, () => window.open(`https://waze.com/ul?q=${encodeURIComponent(proj.address)}&navigate=yes`, '_blank')); };
            const handleCallTeamClick = (proj) => { const team = (proj.assignedUsers||[]).map(uid=>users.find(u=>u.id===uid)).filter(Boolean); if(team.length===0) alert("לא שובץ צוות."); else if(team.length===1) window.location.href=`tel:${team[0].phone||''}`; else setCallTeamModal({projName:proj.name, team}); };

            // ================= LOGIC HANDLERS =================
            const confirmSignatureAndStatus = async (e) => {
                e.preventDefault(); const remark = e.target.remark.value.trim();
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום!"); if (!statusPhotoFiles || statusPhotoFiles.length===0) return alert("חובה לצלם!"); if (!remark) return alert("חובה להזין הערה!");
                setIsUploading(true);
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(statusPhotoFiles, "project_photos", { projId: signRequirement.projId, projName: signRequirement.projName, folder: signRequirement.stageLabel });
                    const historyItem = { stageId: signRequirement.stageId, code: signRequirement.code, remark, user: currentUser.name, date: new Date().toISOString(), files: uploadedData };
                    await db.collection("projects").doc(signRequirement.projId).update({ [`statuses.${signRequirement.stageId}`]: signRequirement.code, [`hasPhotos.${signRequirement.stageId}`]: true, statusHistory: firebase.firestore.FieldValue.arrayUnion(historyItem) });
                    addScore(10); logAttendanceAndLocation(`עדכון סטטוס: ${signRequirement.newStatus} בפרויקט ${signRequirement.projName}`);
                    setIsUploading(false); setStatusPhotoFiles(null); setSignRequirement(null);
                } catch (err) { alert("שגיאה."); setIsUploading(false); }
            };

            const adminOverrideStatus = async (projId, stageId, code) => {
                if(currentUser?.role!=='admin') return;
                try { await db.collection("projects").doc(projId).update({ [`statuses.${stageId}`]: code, statusHistory: firebase.firestore.FieldValue.arrayUnion({ stageId, code, remark: "עודכן ידנית ע\"י מנהל", user: currentUser.name, date: new Date().toISOString() }) }); setAdminOverrideModal(null); logAttendanceAndLocation(`עריכת מנהל סטטוס`); } catch(e) { alert("שגיאה"); }
            };

            const handleMaterialSubmit = (e) => {
                e.preventDefault(); const fd = new FormData(e.target); const qty = Number(fd.get('qty'));
                if (materialReqType === 'stock') {
                    const itemId = fd.get('itemId'); const item = inventory.find(i=>i.id===itemId); if(!item) return; if(item.quantity<qty) return alert(`במלאי יש רק ${item.quantity}.`);
                    if (currentUser.role==='admin'||currentUser.role==='accounting') {
                        db.collection("projects").doc(materialsModal.id).update({ allocatedMaterials: firebase.firestore.FieldValue.arrayUnion({ id:'mat_'+Date.now(), inventoryId:item.id, name:item.name, quantity:qty, requestedBy:currentUser.name, status:'pending', date:new Date().toISOString() }) });
                        db.collection("inventory").doc(item.id).update({ quantity: firebase.firestore.FieldValue.increment(-qty) }); alert("שויך בהצלחה!"); setMaterialsModal(null);
                    } else setMaterialSignData({ projId:materialsModal.id, projName:materialsModal.name, inventoryId:item.id, itemName:item.name, qty, type:'stock' });
                } else {
                    const text = fd.get('specialText'); if(!text) return alert("חובה להזין תיאור.");
                    if (currentUser.role==='admin'||currentUser.role==='accounting') {
                        db.collection("projects").doc(materialsModal.id).update({ allocatedMaterials: firebase.firestore.FieldValue.arrayUnion({ id:'mat_'+Date.now(), name:`מיוחדת: ${text}`, quantity:qty, requestedBy:currentUser.name, status:'pending', date:new Date().toISOString() }) }); alert("הבקשה נשמרה."); setMaterialsModal(null);
                    } else setMaterialSignData({ projId:materialsModal.id, projName:materialsModal.name, itemName:`מיוחדת: ${text}`, qty, type:'special' });
                }
            };

            const confirmMaterialSignature = () => {

            const handleDeliveryConfirm = async (e) => {

                        const updatedMats = doc.data().allocatedMaterials.map(m => m.id===deliveryModal.matId ? {...m, status:'delivered', deliverySignature:sigPad.current.toDataURL(), deliveryPhotos:uploadedData, deliveredAt:new Date().toISOString(), deliveredBy:currentUser.name} : m);

            const handleDeliveryCancel = (e) => {

                    const updatedMats = doc.data().allocatedMaterials.map(m => m.id===cancelDeliveryModal.matId ? {...m, status:reason==='delayed'?'delayed':'returned', delayReason:reasonText, returnedAt:new Date().toISOString(), returnedBy:currentUser.name} : m);

                                    <button type="submit" className="w-full text-white py-4 rounded-xl font-black" style={{backgroundColor:appColor}}>היכנס ✅</button>
                                </form>

                        </div>
                        <nav className="flex flex-wrap justify-center gap-1.5 w-full flex-1 px-1 lg:px-4 items-center">

                            {(currentUser.role==='admin'||currentUser.role==='accounting')&&<button onClick={()=>setActiveTab("gallery")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='gallery'?'bg-blue-600 text-white':'bg-black/30 text-slate-300'}`}>📷 גלריה</button>}
                            {currentUser.role==='admin'&&<button onClick={()=>setActiveTab("attendance")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='attendance'?'theme-bg':'bg-black/30 text-slate-300'}`}>📍 נוכחות</button>}
                            {(currentUser.role==='admin'||currentUser.role==='driver'||currentUser.role==='warehouse'||currentUser.role==='accounting')&&<button onClick={()=>setActiveTab("deliveries")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='deliveries'?'theme-bg':'bg-black/30 text-slate-300'}`}>🚚 חלוקה {pendingDeliveriesCount>0&&<span className="bg-red-500 text-white rounded-full px-1.5 py-0.5 text-[9px]">{pendingDeliveriesCount}</span>}</button>}
                            {(currentUser.role==='admin'||currentUser.role==='warehouse'||currentUser.role==='accounting')&&<button onClick={()=>setActiveTab("inventory")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='inventory'?'theme-bg':'bg-black/30 text-slate-300'}`}>📦 מחסן</button>}
                            {(currentUser.role==='admin'||currentUser.role==='accounting')&&<button onClick={()=>setActiveTab("finance")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='finance'?'theme-bg':'bg-black/30 text-slate-300'}`}>💰 כספים</button>}
                            {(currentUser.role==='admin'||currentUser.role==='accounting')&&<button onClick={()=>setActiveTab("archive")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='archive'?'bg-slate-700 text-white':'bg-black/30 text-slate-300'}`}>📁 ארכיון</button>}
                            {currentUser.role==='admin'&&<button onClick={()=>{if(isUsersUnlocked)setActiveTab("users");else setAuthUsersModal(true);}} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='users'?'theme-bg':'bg-black/30 text-slate-300'}`}>👥 צוות</button>}
                            {currentUser.role==='admin'&&<button onClick={()=>setActiveTab("settings")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm ${activeTab==='settings'?'theme-bg':'bg-black/30 text-slate-300'}`}>⚙️ הגדרות</button>}
                        </nav>
                        <div className="hidden lg:flex gap-4 items-center shrink-0 pr-2">
                            <button onClick={()=>setLeaderboardModal(true)} className="bg-amber-500/20 text-amber-400 border border-amber-500/50 px-4 py-2.5 rounded-xl font-bold shadow-lg text-sm hover:bg-amber-500 hover:text-white">🏆 טבלת ניקוד</button>
                            {(currentUser.role==='admin'||currentUser.role==='accounting')&&<button onClick={()=>setShowAddProject(true)} className="theme-bg px-6 py-2.5 rounded-xl font-bold shadow-lg text-sm">➕ פרויקט חדש</button>}

                                                        </td>
                                                        {stages.map(stage => {

                            <div className="glass w-full max-w-md p-8 rounded-[2rem] border-t-4 border-amber-500 relative shadow-2xl" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setLeaderboardModal(false)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-bold text-xl">X</button>
                                <div className="text-center mb-6"><div className="text-5xl mb-2">🏆</div><h2 className="text-3xl font-black text-white">אלופי השטח</h2></div>
                                <div className="space-y-3 max-h-80 overflow-y-auto pr-2">
                                    {users.filter(u=>u.role==='worker'||u.role==='driver').sort((a,b)=>(b.score||0)-(a.score||0)).map((u,i) => (
                                        <div key={u.id} className="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5">
                                            <div className="flex items-center gap-4"><div className={`w-10 h-10 rounded-full flex items-center justify-center font-black ${i===0?'bg-yellow-500 text-black':i===1?'bg-slate-300 text-black':i===2?'bg-amber-700 text-white':'bg-black/50 text-slate-400'}`}>{i+1}</div><div className="font-black text-white">{u.name}</div></div>
                                            <div className="font-black text-amber-400 text-xl">{u.score||0} נק'</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {photosModal && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[80] p-4" onClick={()=>setPhotosModal(null)}>
                            <div className="glass w-full max-w-3xl p-6 rounded-2xl relative max-h-[90vh] flex flex-col" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setPhotosModal(null)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-bold text-xl">X</button>
                                <h2 className="text-2xl font-black mb-6">גלריית פרויקט - {photosModal.name}</h2>
                                <div className="overflow-y-auto grid grid-cols-2 md:grid-cols-4 gap-4 flex-1">
                                    {allPhotos.filter(p=>p.projId===photosModal.id).map(p => (
                                        <div key={p.id} className="relative group">
                                            {p.type==='video'?<video src={p.url} className="w-full h-32 object-cover rounded-xl" controls />:<img src={p.url} className="w-full h-32 object-cover rounded-xl cursor-pointer" onClick={()=>window.open(p.url,'_blank')} />}
                                            {currentUser.role==='admin'&&<button onClick={()=>deletePhoto(p.id)} className="absolute top-2 right-2 bg-red-600 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition">X</button>}
                                        </div>
                                    ))}
                                    {allPhotos.filter(p=>p.projId===photosModal.id).length===0 && <div className="col-span-full text-center text-slate-400">אין תמונות.</div>}
                                </div>
                            </div>
                        </div>
                    )}

                    {materialsModal && !materialSignData && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-[80] p-4" onClick={()=>setMaterialsModal(null)}>
                            <form onSubmit={handleMaterialSubmit} className="glass w-full max-w-md rounded-[2rem] p-6 shadow-2xl border-t-4 border-amber-500 relative" onClick={e=>e.stopPropagation()}>
                                <h2 className="text-xl font-black mb-6 text-center">הוספת ציוד ל-{materialsModal.name}</h2>
                                <div className="flex gap-2 mb-4 bg-black/40 p-1 rounded-xl"><button type="button" onClick={()=>setMaterialReqType('stock')} className={`flex-1 py-2 rounded-lg font-bold ${materialReqType==='stock'?'bg-amber-600 text-white':'text-slate-400'}`}>ממלאי קיים</button><button type="button" onClick={()=>setMaterialReqType('special')} className={`flex-1 py-2 rounded-lg font-bold ${materialReqType==='special'?'bg-amber-600 text-white':'text-slate-400'}`}>הזמנה מיוחדת</button></div>
                                <div className="space-y-4">
                                    {materialReqType==='stock'?(<div><label className="text-sm font-bold block mb-2">בחר מוצר:</label><select name="itemId" required className="w-full p-4 bg-black/50 rounded-xl outline-none"><option value="">-- בחר מהרשימה --</option>{inventory.filter(i=>i.quantity>0).map(i=><option key={i.id} value={i.id}>{i.name} (מלאי: {i.quantity})</option>)}</select></div>):(<div><label className="text-sm font-bold block mb-2">תיאור המוצר:</label><input type="text" name="specialText" className="w-full p-4 bg-black/50 rounded-xl outline-none" required /></div>)}
                                    <div><label className="text-sm font-bold block mb-2">כמות יחידות:</label><input type="number" name="qty" defaultValue="1" min="1" className="w-full p-4 bg-black/50 rounded-xl outline-none" required /></div>
                                </div>
                                <div className="flex gap-3 mt-8"><button type="submit" className="flex-1 bg-amber-600 py-4 rounded-xl font-black">המשך</button><button type="button" onClick={()=>setMaterialsModal(null)} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {materialSignData && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[90] p-4">
                            <div className="glass w-full max-w-md rounded-[2rem] p-6 flex flex-col h-[90vh] md:h-auto border-t-4 border-amber-500">
                                <h2 className="text-xl font-black mb-2 text-center">אישור משיכת ציוד</h2><h3 className="text-amber-400 text-center font-bold mb-4">{materialSignData.itemName} ({materialSignData.qty} יח')</h3>
                                <div className="flex-1 flex flex-col min-h-[150px]"><label className="text-sm font-bold mb-2">חתימת מבקש הציוד (חובה):</label><div className="flex-1 w-full bg-white rounded-2xl border-4 border-amber-500/50 relative"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" /></div></div>
                                <div className="flex gap-3 mt-4 shrink-0"><button onClick={confirmMaterialSignature} className="flex-1 bg-amber-600 py-4 rounded-xl font-black">אשר משיכה ✓</button><button onClick={()=>setMaterialSignData(null)} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </div>
                        </div>
                    )}

                    {deliveryModal && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[90] p-4">
                            <form onSubmit={handleDeliveryConfirm} className="glass w-full max-w-md rounded-[2rem] p-6 flex flex-col h-[90vh] md:h-auto border-t-[6px] border-cyan-500">
                                <h2 className="text-xl font-black mb-2 text-center">אישור מסירת סחורה</h2><h3 className="text-cyan-400 text-center font-bold mb-4">{deliveryModal.matName} ({deliveryModal.qty} יח')</h3>
                                <div className="flex-1 overflow-y-auto space-y-4">
                                    <div><label className="text-sm font-bold block mb-2">* תצלום סחורה באתר:</label><input type="file" multiple accept="image/*" capture="environment" onChange={(e)=>setDeliveryPhotoFiles(Array.from(e.target.files))} required disabled={isUploading} className="w-full" /></div>
                                    <div className="flex-1 flex flex-col min-h-[150px]"><label className="text-sm font-bold mb-2">* חתימת מקבל הסחורה (או נהג):</label><div className="flex-1 w-full bg-white rounded-2xl border-4 border-cyan-500/50 relative"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" /></div></div>
                                </div>
                                <div className="flex gap-3 mt-4 shrink-0"><button type="submit" disabled={isUploading} className="flex-1 bg-cyan-600 py-4 rounded-xl font-black">{isUploading?'מעלה...':'אשר מסירה ✓'}</button><button type="button" onClick={()=>setDeliveryModal(null)} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {cancelDeliveryModal && (
                        <div className="fixed inset-0 bg-black/95 flex justify-center items-center z-[90] p-4">
                            <form onSubmit={handleDeliveryCancel} className="glass w-full max-w-md rounded-[2rem] p-6 flex flex-col border-t-[6px] border-red-500 h-[90vh] md:h-auto">
                                <h2 className="text-xl font-black mb-2 text-center text-red-400">דיווח תקלה במסירה</h2><h3 className="text-slate-300 text-center font-bold mb-4">{cancelDeliveryModal.matName}</h3>
                                <div className="flex-1 overflow-y-auto space-y-4">
                                    <select name="reason" required className="w-full p-4 bg-black/50 rounded-xl outline-none border border-white/10"><option value="">-- בחר סיבה --</option><option value="not_delivered_client">לקוח לא נמצא במקום (מבוטל ומוחזר למלאי)</option><option value="not_delivered_closed">אתר סגור / אין גישה (מבוטל ומוחזר למלאי)</option><option value="delayed">עיכוב זמני / חסר ציוד ברכב (משימה נשארת פתוחה)</option></select>
                                    <div className="flex-1 flex flex-col min-h-[150px] mt-4"><label className="text-sm font-bold mb-2">* חתימת מדווח התקלה:</label><div className="flex-1 w-full bg-white rounded-2xl border-4 border-red-500/50 relative"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" /></div></div>
                                </div>
                                <div className="flex gap-3 mt-4 shrink-0"><button type="submit" className="flex-1 bg-red-600 py-4 rounded-xl font-black">שלח דיווח</button><button type="button" onClick={()=>setCancelDeliveryModal(null)} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {finishModal && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-50 p-4">
                            <div className="glass w-full max-w-sm rounded-[2rem] p-6 border-t-[6px] border-emerald-500 text-center">
                                <div className="text-5xl mb-4">✅</div><h2 className="text-2xl font-black mb-2">סיום פרויקט</h2><p className="text-slate-400 mb-6">{finishModal.name}</p>
                                <p className="mb-6 font-bold text-sm">האם אתה בטוח שברצונך להעביר פרויקט זה לארכיון?</p>
                                <div className="flex gap-3"><button onClick={()=>{db.collection("projects").doc(finishModal.id).update({isFinished:true}); setFinishModal(null);}} className="flex-1 bg-emerald-600 py-4 rounded-xl font-black">העבר לארכיון</button><button onClick={()=>setFinishModal(null)} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </div>
                        </div>
                    )}

                    {mediaPreview && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[110] p-4" onClick={()=>setMediaPreview(null)}>
                            <div className="relative w-full max-w-3xl flex flex-col items-center" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setMediaPreview(null)} className="absolute -top-10 right-0 text-white font-bold text-xl bg-black/50 w-8 h-8 rounded-full">X</button>
                                {mediaPreview.type==='video'?<video src={mediaPreview.url} controls autoPlay className="max-w-full max-h-[80vh] rounded-lg shadow-2xl" />:<img src={mediaPreview.url} className="max-w-full max-h-[80vh] rounded-lg shadow-2xl" />}
                                <div className="mt-4 text-center">
                                    <div className="font-black text-xl">{mediaPreview.projName}</div>
                                    {currentUser.role==='admin'&&(
                                        <div className="mt-4 flex gap-3 justify-center"><button onClick={()=>handleSecureDownload(mediaPreview.url, `img_${mediaPreview.projName}.jpg`)} className="bg-blue-600 px-6 py-2 rounded-xl font-bold">הורד</button><button onClick={()=>deletePhoto(mediaPreview.id,true)} className="bg-red-600 px-6 py-2 rounded-xl font-bold">מחק</button></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {(isUploading || isZipLoading) && (
                        <div className="fixed inset-0 bg-black/90 z-[200] flex flex-col items-center justify-center">
                            <div className="loader mb-4 border-t-blue-500 border-l-transparent w-12 h-12 border-4"></div>
                            <div className="font-bold text-lg">{isZipLoading ? 'מכין קובץ ZIP...' : 'מעבד נתונים...'}</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
