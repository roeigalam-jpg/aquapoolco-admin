<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --main-blue: #3b82f6; }
        body { background-color: #0f172a; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .card-shadow { box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        /* סטטוסים צבעוניים */
        .status-0 { background: #334155; color: #cbd5e1; } /* טרם התחיל */
        .status-1 { background: #f59e0b; color: white; } /* בתהליך */
        .status-2 { background: #ef4444; color: white; } /* מעוכב */
        .status-3 { background: #10b981; color: white; } /* בוצע */
        
        header { z-index: 100 !important; position: sticky; top: 0; }
        nav button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .signature-pad { background: white; border-radius: 1rem; border: 4px solid var(--main-blue); touch-action: none; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--main-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            // -- App State --
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            const [isUploading, setIsUploading] = useState(false);

            // -- Data State --
            const [projects, setProjects] = useState([]);
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [settings, setSettings] = useState({
                portalName: "אקוופולקו חן בע\"מ",
                mainColor: "#3b82f6",
                headerTextColor: "#ffffff",
                cardBg: "#1e293b",
                appFont: "system-ui",
                stages: [
                    {id: "1", label: "תשתית"},
                    {id: "2", label: "צנרת"},
                    {id: "3", label: "בטון"},
                    {id: "4", label: "איטום"},
                    {id: "5", label: "חיפוי"},
                    {id: "6", label: "גמר"}
                ]
            });

            const statusLabels = { 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" };

            // -- Modals State --
            const [showAddProject, setShowAddProject] = useState(false);
            const [editProjectModal, setEditProjectModal] = useState(null);
            const [statusModal, setStatusModal] = useState(null);
            const [signRequirement, setSignRequirement] = useState(null);
            const [materialsModal, setMaterialsModal] = useState(null);
            const [deliveryModal, setDeliveryModal] = useState(null);
            const [photosModal, setPhotosModal] = useState(null);
            const [inventoryItemModal, setInventoryItemModal] = useState(null);
            const [invModalTab, setInvModalTab] = useState("gallery");
            const [userModal, setUserModal] = useState(null);

            // -- Refs --
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const invSigPad = useRef(null);
            const invCanvasRef = useRef(null);

            // -- Data Fetching --
            useEffect(() => {
                const saved = localStorage.getItem("aquapoolco_user");
                if (saved) setCurrentUser(JSON.parse(saved));

                db.collection("settings").doc("general").onSnapshot(doc => doc.exists && setSettings(doc.data()));
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(s => setProjects(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("users").onSnapshot(s => setUsers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("inventory").onSnapshot(s => setInventory(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("attendance").orderBy("timestamp", "desc").onSnapshot(s => setAttendance(s.docs.map(d => ({id: d.id, ...d.data()}))));
            }, []);

            // -- Canvas Resizing --
            useEffect(() => {
                let timeout;
                const resize = (canvasEl, padRef) => {
                    if (canvasEl) {
                        const ratio = Math.max(window.devicePixelRatio || 1, 1);
                        canvasEl.width = canvasEl.offsetWidth * ratio;
                        canvasEl.height = canvasEl.offsetHeight * ratio;
                        canvasEl.getContext("2d").scale(ratio, ratio);
                        padRef.current = new SignaturePad(canvasEl, { backgroundColor: 'rgb(255, 255, 255)' });
                    }
                };
                if (signRequirement || deliveryModal) timeout = setTimeout(() => resize(canvasRef.current, sigPad), 200);
                if (inventoryItemModal && invModalTab === 'receive') timeout = setTimeout(() => resize(invCanvasRef.current, invSigPad), 200);
                return () => clearTimeout(timeout);
            }, [signRequirement, deliveryModal, inventoryItemModal, invModalTab]);

            // -- Actions --
            const handleLogin = (e) => {
                e.preventDefault();
                const u = users.find(x => x.username === e.target.un.value && x.password === e.target.pw.value);
                if (u || (e.target.un.value === "roeigalam" && e.target.pw.value === "2026")) {
                    const user = u || { name: "רועי גלם", role: "admin", id: "admin-roei" };
                    setCurrentUser(user); localStorage.setItem("aquapoolco_user", JSON.stringify(user));
                } else { alert("פרטי התחברות שגויים"); }
            };

            const logAction = (action, details = "") => {
                db.collection("attendance").add({
                    userId: currentUser.id,
                    userName: currentUser.name,
                    action: action,
                    details: details,
                    timestamp: new Date().toISOString()
                });
            };

            const handleStatusUpdate = (e) => {
                e.preventDefault();
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום!");
                setIsUploading(true);
                
                const file = e.target.statusPhoto.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    // כאן תבוא לוגיקת העלאת תמונה ל-Firebase (Base64 לצורך הדוגמה)
                    const imgData = event.target.result;
                    db.collection("project_photos").add({
                        projId: signRequirement.projId,
                        folder: signRequirement.stageLabel,
                        img: imgData,
                        uploadedBy: currentUser.name,
                        timestamp: new Date().toISOString()
                    });

                    db.collection("projects").doc(signRequirement.projId).update({
                        [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                        [`signatures.${signRequirement.stageId}`]: {
                            name: currentUser.name,
                            date: new Date().toISOString(),
                            sig: sigPad.current.toDataURL()
                        }
                    });

                    logAction(`עדכון שלב ${signRequirement.stageLabel}`, `סטטוס חדש: ${signRequirement.newStatus}`);
                    setIsUploading(false);
                    setSignRequirement(null);
                    setStatusModal(null);
                };
                reader.readAsDataURL(file);
            };

            // -- Helper: Group Attendance by Date --
            const groupedAttendance = useMemo(() => {
                return attendance.reduce((acc, curr) => {
                    const date = new Date(curr.timestamp).toLocaleDateString('he-IL');
                    if (!acc[date]) acc[date] = [];
                    acc[date].push(curr);
                    return acc;
                }, {});
            }, [attendance]);

            // -- Login Screen --
            if (!currentUser) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#0f172a]">
                    <form onSubmit={handleLogin} className="glass p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl border-t-8" style={{borderColor: settings.mainColor}}>
                        <img src={LOGO_URL} className="h-24 mx-auto mb-8 bg-white p-3 rounded-2xl shadow-xl" />
                        <h1 className="text-2xl font-black mb-10 text-white">Aquapoolco Elite</h1>
                        <input name="un" placeholder="שם משתמש" className="w-full p-4 bg-slate-900 rounded-2xl mb-4 text-center text-white border border-slate-700 outline-none" required />
                        <input name="pw" type="password" placeholder="סיסמה" className="w-full p-4 bg-slate-900 rounded-2xl mb-10 text-center text-white border border-slate-700 outline-none" required />
                        <button type="submit" className="w-full py-4 rounded-2xl font-black text-lg text-white shadow-lg" style={{backgroundColor: settings.mainColor}}>כניסה למערכת</button>
                    </form>
                </div>
            );// -- Render Content Based on Active Tab --
            const renderContent = () => {
                switch(activeTab) {
                    case "board":
                        return (
                            <div className="max-w-[1500px] mx-auto space-y-8 animate-slide-up">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="relative w-full md:w-96">
                                        <input type="text" placeholder="🔍 חפש פרויקט או כתובת..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 outline-none focus:border-blue-500 transition" />
                                    </div>
                                    {currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="w-full md:w-auto px-8 py-4 bg-blue-600 rounded-2xl font-black text-white shadow-xl hover:scale-105 active:scale-95 transition">+ פרויקט חדש</button>}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {projects.filter(p => p.name.includes(searchTerm) || p.address.includes(searchTerm)).map(p => {
                                        const done = settings.stages.filter(s => p.statuses?.[s.id] === 3).length;
                                        const progress = settings.stages.length ? Math.round((done / settings.stages.length) * 100) : 0;
                                        return (
                                            <div key={p.id} className="bg-slate-900/80 p-6 rounded-[2.5rem] border border-white/5 shadow-2xl relative overflow-hidden group">
                                                <div className="absolute top-0 right-0 w-2 h-full bg-blue-600 opacity-50"></div>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <h3 className="font-black text-xl text-white mb-1 flex items-center gap-2">{p.name} {currentUser.role === 'admin' && <button onClick={()=>setEditProjectModal(p)} className="text-blue-400 text-sm hover:text-white transition">✏️</button>}</h3>
                                                        <p className="text-xs text-slate-500 font-bold">📍 {p.address}</p>
                                                    </div>
                                                    <button onClick={() => { logAction(`ניווט ל${p.name}`); window.location.href=`waze://?q=${encodeURIComponent(p.address)}&navigate=yes`; }} className="bg-blue-600 px-3 py-1.5 rounded-xl text-[10px] font-black text-white shadow-lg">🚗 Waze</button>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 mb-4">
                                                    {settings.stages.map(s => {
                                                        const code = p.statuses?.[s.id] || 0;
                                                        return <button key={s.id} onClick={() => setStatusModal({projId: p.id, stageId: s.id, stageLabel: s.label, projName: p.name, currentCode: code})} className={`p-2 rounded-xl text-[10px] font-bold text-white transition hover:brightness-110 status-${code}`}>{s.label}: {statusLabels[code]}</button>
                                                    })}
                                                </div>
                                                <div className="flex items-center gap-3 mb-6">
                                                    <span className="text-[10px] font-black text-blue-400">{progress}%</span>
                                                    <div className="flex-1 bg-slate-800 rounded-full h-2.5 overflow-hidden"><div className="h-full bg-blue-600 shadow-[0_0_10px_rgba(59,130,246,0.5)]" style={{width: `${progress}%`}}></div></div>
                                                </div>
                                                <div className="flex justify-between items-center pt-4 border-t border-white/5">
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setPhotosModal(p)} className="bg-slate-800 px-4 py-2.5 rounded-xl text-[10px] font-black text-slate-300 hover:bg-slate-700 transition">📷 תמונות</button>
                                                        <button onClick={() => setMaterialsModal(p)} className="bg-slate-800 px-4 py-2.5 rounded-xl text-[10px] font-black text-amber-500 hover:bg-slate-700 transition">📦 ציוד</button>
                                                    </div>
                                                    {currentUser.role === 'admin' && <button onClick={() => { if(window.confirm('לסיים פרויקט ולארכב?')) db.collection("projects").doc(p.id).update({isFinished: true}); }} className="w-10 h-10 bg-emerald-600/20 text-emerald-500 rounded-xl flex items-center justify-center font-bold">✓</button>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    case "attendance":
                        return (
                            <div className="max-w-4xl mx-auto space-y-8 animate-slide-up">
                                <h2 className="text-2xl font-black text-white border-r-4 border-blue-500 pr-4">📍 דוח נוכחות ופעילות יומית</h2>
                                {Object.keys(groupedAttendance).map(date => (
                                    <div key={date} className="bg-slate-900 rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl">
                                        <div className="bg-blue-600/10 p-5 font-black text-blue-400 border-b border-white/5 flex justify-between">
                                            <span>📅 {date}</span>
                                            <span className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-lg">{groupedAttendance[date].length} דיווחים</span>
                                        </div>
                                        <div className="divide-y divide-white/5">
                                            {groupedAttendance[date].map(log => (
                                                <div key={log.id} className="p-5 flex justify-between items-center hover:bg-white/5 transition">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-10 h-10 bg-slate-800 rounded-2xl flex items-center justify-center font-bold text-blue-400 shadow-inner">👤</div>
                                                        <div><div className="font-black text-white">{log.userName}</div><div className="text-xs text-emerald-400 font-bold">{log.action}</div></div>
                                                    </div>
                                                    <div className="text-right"><div className="text-xs text-slate-500 font-mono mb-1">{new Date(log.timestamp).toLocaleTimeString('he-IL')}</div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        );
                    case "inventory":
                        return (
                            <div className="max-w-6xl mx-auto animate-slide-up">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                                    <h2 className="text-2xl font-black text-white border-r-4 border-amber-500 pr-4">📦 מחסן עלית - מלאי ציוד וחומרים</h2>
                                    <button onClick={() => setInventoryItemModal({name: '', quantity: 0, category: 'כללי', isNew: true})} className="w-full md:w-auto bg-amber-600 px-8 py-4 rounded-2xl font-black text-white shadow-xl hover:scale-105 transition">➕ פריט חדש</button>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-slate-900 p-6 rounded-[2rem] text-center border border-white/5 shadow-xl group hover:border-amber-500/30 transition relative overflow-hidden">
                                            <div className="text-[10px] text-slate-500 font-black uppercase mb-2 bg-slate-800 inline-block px-2 py-1 rounded-md">{item.category}</div>
                                            <div className="font-black text-lg text-white mb-6 h-12 flex items-center justify-center">{item.name}</div>
                                            <div className="flex items-center justify-between bg-slate-800 p-3 rounded-2xl mb-4">
                                                <button onClick={() => alert("עדכון מלאי מתבצע דרך 'ניהול וקליטה'")} className="w-10 h-10 bg-slate-700 rounded-xl font-black text-xl hover:bg-red-500 transition">-</button>
                                                <span className="text-3xl font-black text-white">{item.quantity}</span>
                                                <button onClick={() => alert("עדכון מלאי מתבצע דרך 'ניהול וקליטה'")} className="w-10 h-10 bg-slate-700 rounded-xl font-black text-xl hover:bg-emerald-500 transition">+</button>
                                            </div>
                                            <button onClick={() => setInventoryItemModal(item)} className="w-full bg-amber-600/10 text-amber-500 py-3 rounded-xl font-black text-xs hover:bg-amber-600 hover:text-white transition">📂 ניהול וקליטה</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    case "finance":
                        return (
                            <div className="max-w-5xl mx-auto space-y-6 animate-slide-up">
                                <h2 className="text-2xl font-black text-white border-r-4 border-emerald-500 pr-4">💰 כספים, תקציבים וגבייה</h2>
                                {projects.map(p => (
                                    <div key={p.id} className="bg-slate-900 p-6 rounded-[2rem] border border-white/5 grid md:grid-cols-4 gap-4 items-end shadow-xl">
                                        <div className="md:col-span-4 font-black text-xl border-b border-white/5 pb-2 mb-2">{p.name}</div>
                                        <div><label className="text-[10px] text-slate-500 font-bold block mb-1">תקציב פרויקט (₪)</label><input type="number" value={p.budget || 0} onChange={e => db.collection("projects").doc(p.id).update({budget: Number(e.target.value)})} className="w-full bg-slate-800 p-3 rounded-xl outline-none font-bold" /></div>
                                        <div><label className="text-[10px] text-slate-500 font-bold block mb-1">שולם א'</label><input type="number" value={p.payA || 0} onChange={e => db.collection("projects").doc(p.id).update({payA: Number(e.target.value)})} className="w-full bg-slate-800 p-3 rounded-xl outline-none font-bold text-emerald-400" /></div>
                                        <div><label className="text-[10px] text-slate-500 font-bold block mb-1">שולם ב'</label><input type="number" value={p.payB || 0} onChange={e => db.collection("projects").doc(p.id).update({payB: Number(e.target.value)})} className="w-full bg-slate-800 p-3 rounded-xl outline-none font-bold text-emerald-400" /></div>
                                        <div className="text-center bg-blue-600/10 p-3 rounded-xl border border-blue-500/20"><div className="text-[10px] text-blue-400 font-bold uppercase">יתרה לגבייה</div><div className="text-xl font-black text-white">₪{(p.budget || 0) - ((p.payA || 0) + (p.payB || 0))}</div></div>
                                    </div>
                                ))}
                            </div>
                        );
                    case "users":
                        return (
                            <div className="max-w-4xl mx-auto space-y-6 animate-slide-up">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black text-white border-r-4 border-purple-500 pr-4">👥 ניהול צוות והרשאות</h2>
                                    <button onClick={() => setUserModal({name: '', role: 'worker', username: '', password: '', isNew: true})} className="bg-purple-600 px-6 py-3 rounded-2xl font-black text-white shadow-lg">+ עובד חדש</button>
                                </div>
                                <div className="grid gap-4">
                                    {users.map(u => (
                                        <div key={u.id} className="bg-slate-900 p-5 rounded-3xl border border-white/5 flex justify-between items-center shadow-xl">
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-xl shadow-inner">👤</div>
                                                <div><div className="font-black text-white text-lg">{u.name}</div><div className="text-xs text-purple-400 font-bold uppercase">{u.role}</div></div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setUserModal(u)} className="p-2 bg-slate-800 rounded-xl text-blue-400 hover:bg-blue-600 hover:text-white transition">✏️</button>
                                                <button onClick={() => {if(window.confirm('למחוק עובד?')) db.collection("users").doc(u.id).delete()}} className="p-2 bg-slate-800 rounded-xl text-red-400 hover:bg-red-500 hover:text-white transition">🗑️</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    case "settings":
                        return (
                            <div className="max-w-3xl mx-auto animate-slide-up">
                                <h2 className="text-2xl font-black text-white mb-8 border-r-4 border-slate-500 pr-4">⚙️ הגדרות מערכת ועיצוב מותג</h2>
                                <div className="bg-slate-900 rounded-[2.5rem] p-8 border border-white/5 shadow-2xl space-y-8">
                                    <div className="grid md:grid-cols-2 gap-8">
                                        <div className="space-y-6">
                                            <div><label className="block text-xs text-slate-500 font-black uppercase mb-3">שם הפורטל</label><input value={settings.portalName} onChange={e => setSettings({...settings, portalName: e.target.value})} className="w-full bg-slate-800 p-4 rounded-2xl outline-none font-bold focus:ring-2 ring-blue-500/50" /></div>
                                            <div><label className="block text-xs text-slate-500 font-black uppercase mb-3">גופן מערכת</label><select value={settings.appFont} onChange={e=>setSettings({...settings, appFont: e.target.value})} className="w-full bg-slate-800 p-4 rounded-2xl outline-none font-bold"><option value="system-ui">ברירת מחדל</option><option value="Arial">Arial</option><option value="Rubik">Rubik</option></select></div>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center bg-slate-800 p-4 rounded-2xl"><span>צבע מותג</span><input type="color" value={settings.mainColor} onChange={e => setSettings({...settings, mainColor: e.target.value})} className="h-10 w-10 border-0 bg-transparent cursor-pointer" /></div>
                                            <div className="flex justify-between items-center bg-slate-800 p-4 rounded-2xl"><span>צבע כותרות</span><input type="color" value={settings.headerTextColor} onChange={e => setSettings({...settings, headerTextColor: e.target.value})} className="h-10 w-10 border-0 bg-transparent cursor-pointer" /></div>
                                            <div className="flex justify-between items-center bg-slate-800 p-4 rounded-2xl"><span>רקע כרטיסים</span><input type="color" value={settings.cardBg} onChange={e => setSettings({...settings, cardBg: e.target.value})} className="h-10 w-10 border-0 bg-transparent cursor-pointer" /></div>
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t border-white/5">
                                        <h3 className="font-black text-white mb-4">ניהול שלבי פרויקט:</h3>
                                        {settings.stages.map((s, idx) => (
                                            <div key={idx} className="flex gap-2 mb-3">
                                                <input value={s.label} onChange={e => { const n = [...settings.stages]; n[idx].label = e.target.value; setSettings({...settings, stages: n}); }} className="flex-1 bg-slate-800 p-3 rounded-xl text-sm font-bold" />
                                                <button onClick={() => { const n = settings.stages.filter((_, i) => i !== idx); setSettings({...settings, stages: n}); }} className="bg-red-500/10 text-red-500 px-3 rounded-xl font-bold">🗑️</button>
                                            </div>
                                        ))}
                                        <button onClick={() => setSettings({...settings, stages: [...settings.stages, {id: Date.now().toString(), label: "שלב חדש"}]})} className="w-full py-3 bg-slate-800 text-blue-400 rounded-xl font-black text-xs border border-dashed border-blue-500/30">+ הוסף שלב למערכת</button>
                                    </div>
                                    <button onClick={() => { db.collection("settings").doc("general").set(settings); alert("ההגדרות נשמרו בהצלחה!"); }} className="w-full bg-blue-600 py-5 rounded-2xl font-black text-lg shadow-xl hover:brightness-110 transition">💾 שמור את כל השינויים</button>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="min-h-screen flex flex-col" style={{ backgroundColor: settings.cardBg + '05', fontFamily: settings.appFont }}>
                    {/* Header ו-Nav כפי שהיו בחלק 1 */}
                    {/* ... (החלק שמופיע בקוד ששלחת כ-Header) */}
                    
                    {/* Main Content Area */}
                    <main className="flex-1 p-4 md:p-8">
                        {renderContent()}
                    </main>

                    {/* Modals Section */}
                    {statusModal && (
                        <div className="fixed inset-0 bg-slate-900/95 z-[100] flex flex-col justify-end md:justify-center items-center p-4">
                            <div className="bg-[#1e293b] w-full max-w-sm rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 shadow-2xl border-t-8 border-blue-600 animate-slide-up">
                                <h3 className="text-center font-black text-2xl text-white mb-2">{statusModal.stageLabel}</h3>
                                <p className="text-center text-slate-500 text-xs mb-8 uppercase tracking-widest">{statusModal.projName}</p>
                                <div className="space-y-3">
                                    {[0,1,2,3].map(c => (
                                        <button key={c} onClick={() => setSignRequirement({...statusModal, code: c, newStatus: statusLabels[c]})} className={`w-full py-4 rounded-2xl font-black text-lg transition-all active:scale-95 status-${c} ${statusModal.currentCode === c ? 'ring-4 ring-white/30' : ''}`}>{statusLabels[c]}</button>
                                    ))}
                                </div>
                                <button onClick={() => setStatusModal(null)} className="w-full mt-6 text-slate-500 font-bold py-2">ביטול וחזרה</button>
                            </div>
                        </div>
                    )}

                    {signRequirement && (
                        <div className="fixed inset-0 bg-slate-900/98 z-[110] flex flex-col justify-end md:justify-center items-center p-4">
                            <form onSubmit={handleStatusUpdate} className="bg-[#1e293b] w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 shadow-2xl border-t-8 border-emerald-500">
                                <h2 className="text-center font-black text-2xl mb-2 text-white">אישור וצילום מהשטח</h2>
                                <p className="text-center text-sm text-slate-400 mb-8">מעבר לסטטוס: <span className="text-white font-bold">{signRequirement.newStatus}</span></p>
                                <div className="space-y-6">
                                    <div className="relative">
                                        <label className="text-xs text-amber-500 font-black block mb-2 uppercase tracking-widest">* חובה לצלם תמונה מהאתר:</label>
                                        <input name="statusPhoto" type="file" accept="image/*" capture="environment" className="w-full p-4 bg-slate-900 rounded-2xl text-xs font-bold border-2 border-dashed border-white/10" required />
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-center mb-2"><label className="text-xs text-slate-400 font-bold">חתימת מנהל העבודה / צוות:</label><button type="button" onClick={() => sigPad.current.clear()} className="text-[10px] bg-slate-700 px-2 py-1 rounded text-white">נקה חתימה</button></div>
                                        <div className="h-48 bg-white rounded-2xl relative overflow-hidden"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full" /></div>
                                    </div>
                                    <button type="submit" disabled={isUploading} className="w-full bg-emerald-600 py-5 rounded-2xl font-black text-xl text-white shadow-xl flex items-center justify-center gap-3">
                                        {isUploading ? <div className="loader"></div> : "אשר ועדכן סטטוס ✓"}
                                    </button>
                                    <button type="button" onClick={() => setSignRequirement(null)} className="w-full text-slate-500 font-bold">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {inventoryItemModal && (
                        <div className="fixed inset-0 bg-slate-900/95 z-[100] flex flex-col justify-end md:justify-center items-center p-4">
                            <div className="bg-[#1e293b] w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 shadow-2xl border-t-8 border-amber-500">
                                <h2 className="text-2xl font-black mb-1">{inventoryItemModal.name || 'פריט חדש'}</h2>
                                <p className="text-slate-500 text-xs mb-8 uppercase">{inventoryItemModal.category}</p>
                                <div className="flex bg-slate-900 p-2 rounded-2xl mb-6">
                                    <button onClick={() => setInvModalTab('gallery')} className={`flex-1 py-3 rounded-xl font-black text-xs ${invModalTab === 'gallery' ? 'bg-amber-600 text-white' : 'text-slate-500'}`}>📷 היסטוריה</button>
                                    <button onClick={() => setInvModalTab('receive')} className={`flex-1 py-3 rounded-xl font-black text-xs ${invModalTab === 'receive' ? 'bg-amber-600 text-white' : 'text-slate-500'}`}>📥 קליטת סחורה</button>
                                </div>
                                {invModalTab === 'receive' ? (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const qty = Number(e.target.qty.value);
                                        db.collection("inventory").doc(inventoryItemModal.id).update({ quantity: inventoryItemModal.quantity + qty });
                                        logAction(`קליטת מלאי: +${qty} ל-${inventoryItemModal.name}`);
                                        setInventoryItemModal(null);
                                    }} className="space-y-4">
                                        <input name="qty" type="number" placeholder="כמות להוספה" className="w-full p-4 bg-slate-900 rounded-2xl text-center text-3xl font-black outline-none border border-amber-500/30" required />
                                        <div className="h-32 bg-white rounded-2xl relative overflow-hidden"><canvas ref={invCanvasRef} className="absolute inset-0 w-full h-full" /></div>
                                        <button type="submit" className="w-full bg-amber-600 py-4 rounded-2xl font-black text-lg">אשר קליטה למחסן</button>
                                    </form>
                                ) : (
                                    <div className="text-center py-10 text-slate-500 font-bold italic">היסטוריית קליטות ותמונות תופיע כאן...</div>
                                )}
                                <button onClick={() => setInventoryItemModal(null)} className="w-full mt-6 text-slate-500 font-bold">סגור חלון</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
