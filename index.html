            const confirmSignatureAndStatus = async (e) => {
                e.preventDefault(); 
                const remark = e.target.remark.value.trim();
                
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום!"); 
                if (!statusPhotoFiles || statusPhotoFiles.length === 0) return alert("חובה לצרף תצלום מהשטח!"); 
                if (!remark) return alert("חובה להזין הערת ביצוע!");
                
                setIsUploading(true);
                
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(statusPhotoFiles, "project_photos", { 
                        projId: signRequirement.projId, 
                        projName: signRequirement.projName, 
                        folder: signRequirement.stageLabel 
                    });
                    
                    const historyItem = { 
                        stageId: signRequirement.stageId, 
                        code: signRequirement.code, 
                        remark, 
                        user: currentUser.name, 
                        date: new Date().toISOString(), 
                        files: uploadedData 
                    };
                    
                    await db.collection("projects").doc(signRequirement.projId).update({ 
                        [`statuses.${signRequirement.stageId}`]: signRequirement.code, 
                        [`hasPhotos.${signRequirement.stageId}`]: true, 
                        statusHistory: firebase.firestore.FieldValue.arrayUnion(historyItem) 
                    });
                    
                    addScore(10); 
                    logAttendanceAndLocation(`עדכון סטטוס: ${signRequirement.newStatus} בפרויקט ${signRequirement.projName}`); 
                    
                    setIsUploading(false); 
                    setStatusPhotoFiles(null); 
                    setSignRequirement(null);
                } catch (err) { 
                    alert("שגיאה בעדכון הסטטוס."); 
                    setIsUploading(false); 
                }
            };

            const adminOverrideStatus = async (projId, stageId, code) => {
                if (currentUser?.role !== 'admin') return; 
                
                try { 
                    await db.collection("projects").doc(projId).update({ 
                        [`statuses.${stageId}`]: code, 
                        statusHistory: firebase.firestore.FieldValue.arrayUnion({ 
                            stageId, 
                            code, 
                            remark: "עודכן ידנית ע\"י מנהל (Override)", 
                            user: currentUser.name, 
                            date: new Date().toISOString() 
                        }) 
                    }); 
                    
                    setAdminOverrideModal(null); 
                    logAttendanceAndLocation(`עריכת מנהל מהירה לסטטוס בפרויקט ${projId}`); 
                } catch(e) { 
                    alert("שגיאה בעדכון מנהל"); 
                }
            };

            const handleMaterialSubmit = (e) => {
                e.preventDefault(); 
                const fd = new FormData(e.target); 
                const qty = Number(fd.get('qty'));
                
                if (materialReqType === 'stock') {
                    const itemId = fd.get('itemId'); 
                    const item = inventory.find(i => i.id === itemId); 
                    
                    if (!item) return; 
                    if (item.quantity < qty) return alert(`לא ניתן להזמין. במלאי יש רק ${item.quantity} יחידות.`);
                    
                    if (currentUser.role === 'admin' || currentUser.role === 'accounting') { 
                        db.collection("projects").doc(materialsModal.id).update({ 
                            allocatedMaterials: firebase.firestore.FieldValue.arrayUnion({ 
                                id: 'mat_' + Date.now(), 
                                inventoryId: item.id, 
                                name: item.name, 
                                quantity: qty, 
                                requestedBy: currentUser.name, 
                                status: 'pending', 
                                date: new Date().toISOString() 
                            }) 
                        }); 
                        
                        db.collection("inventory").doc(item.id).update({ 
                            quantity: firebase.firestore.FieldValue.increment(-qty) 
                        }); 
                        
                        alert("הציוד שויך לפרויקט בהצלחה!"); 
                        setMaterialsModal(null); 
                    } else {
                        setMaterialSignData({ 
                            projId: materialsModal.id, 
                            projName: materialsModal.name, 
                            inventoryId: item.id, 
                            itemName: item.name, 
                            qty, 
                            type: 'stock' 
                        });
                    }
                } else {
                    const text = fd.get('specialText'); 
                    if (!text) return alert("חובה להזין תיאור מיוחד.");
                    
                    if (currentUser.role === 'admin' || currentUser.role === 'accounting') { 
                        db.collection("projects").doc(materialsModal.id).update({ 
                            allocatedMaterials: firebase.firestore.FieldValue.arrayUnion({ 
                                id: 'mat_' + Date.now(), 
                                name: `הזמנה מיוחדת: ${text}`, 
                                quantity: qty, 
                                requestedBy: currentUser.name, 
                                status: 'pending', 
                                date: new Date().toISOString() 
                            }) 
                        }); 
                        
                        alert("הבקשה להזמנה מיוחדת נשמרה במערכת."); 
                        setMaterialsModal(null); 
                    } else {
                        setMaterialSignData({ 
                            projId: materialsModal.id, 
                            projName: materialsModal.name, 
                            itemName: `הזמנה מיוחדת: ${text}`, 
                            qty, 
                            type: 'special' 
                        });
                    }
                }
            };

            const confirmMaterialSignature = () => {
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום ולאשר!");
                
                const matItem = { 
                    id: 'mat_' + Date.now(), 
                    inventoryId: materialSignData.inventoryId || null, 
                    name: materialSignData.itemName, 
                    quantity: materialSignData.qty, 
                    requestedBy: currentUser.name, 
                    status: 'pending', 
                    date: new Date().toISOString(), 
                    signatureData: sigPad.current.toDataURL() 
                };
                
                db.collection("projects").doc(materialSignData.projId).update({ 
                    allocatedMaterials: firebase.firestore.FieldValue.arrayUnion(matItem) 
                });
                
                if (materialSignData.type === 'stock') {
                    db.collection("inventory").doc(materialSignData.inventoryId).update({ 
                        quantity: firebase.firestore.FieldValue.increment(-materialSignData.qty) 
                    });
                }
                
                addScore(3); 
                alert("בקשת הציוד נשלחה בהצלחה למערך החלוקה!"); 
                setMaterialSignData(null); 
                setMaterialsModal(null);
            };

            const handleDeliveryConfirm = async (e) => {
                e.preventDefault(); 
                
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה להחתים מקבל סחורה!"); 
                if (!deliveryPhotoFiles || deliveryPhotoFiles.length === 0) return alert("חובה לצלם את הסחורה באתר!");
                
                setIsUploading(true);
                
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(deliveryPhotoFiles, "project_photos", { 
                        projId: deliveryModal.projId, 
                        projName: deliveryModal.projName, 
                        folder: 'כללי', 
                        description: `מסירת סחורה: ${deliveryModal.matName}` 
                    });
                    
                    db.collection("projects").doc(deliveryModal.projId).get().then(doc => { 
                        const updatedMats = doc.data().allocatedMaterials.map(m => 
                            m.id === deliveryModal.matId ? 
                            {...m, status: 'delivered', deliverySignature: sigPad.current.toDataURL(), deliveryPhotos: uploadedData, deliveredAt: new Date().toISOString(), deliveredBy: currentUser.name} 
                            : m
                        ); 
                        db.collection("projects").doc(deliveryModal.projId).update({ allocatedMaterials: updatedMats }); 
                    });
                    
                    addScore(5); 
                    setIsUploading(false); 
                    setDeliveryModal(null); 
                    setDeliveryPhotoFiles(null);
                } catch(err) { 
                    alert("שגיאה במסירת סחורה."); 
                    setIsUploading(false); 
                }
            };

            const handleDeliveryCancel = (e) => {
                e.preventDefault(); 
                const reason = e.target.reason.value; 
                
                if (!sigPad.current || sigPad.current.isEmpty() || !reason) return alert("חובה לחתום ולבחור סיבת עיכוב/תקלה.");
                
                db.collection("projects").doc(cancelDeliveryModal.projId).get().then(doc => {
                    const mat = doc.data().allocatedMaterials.find(m => m.id === cancelDeliveryModal.matId); 
                    
                    if (mat && mat.inventoryId && (reason === 'not_delivered_closed' || reason === 'not_delivered_client')) {
                        db.collection("inventory").doc(mat.inventoryId).update({ 
                            quantity: firebase.firestore.FieldValue.increment(mat.quantity) 
                        });
                    }
                    
                    const reasonText = reason === 'not_delivered_client' ? 'לקוח לא זמין (הוחזר למלאי)' : reason === 'not_delivered_closed' ? 'אתר סגור (הוחזר למלאי)' : 'עיכוב / חסר בצוות (נשאר פתוח לחלוקה)';
                    
                    const updatedMats = doc.data().allocatedMaterials.map(m => 
                        m.id === cancelDeliveryModal.matId ? 
                        {...m, status: reason === 'delayed' ? 'delayed' : 'returned', delayReason: reasonText, returnedAt: new Date().toISOString(), returnedBy: currentUser.name} 
                        : m
                    );
                    
                    db.collection("projects").doc(cancelDeliveryModal.projId).update({ allocatedMaterials: updatedMats });
                }); 
                
                setCancelDeliveryModal(null);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                
       // כניסת מנהל מהירה מתוך הגדרות התבנית (ClientConfig)
                if (loginUsername === window.ClientConfig.masterAdmin.username && 
                    loginPassword === window.ClientConfig.masterAdmin.password) { 
                    
                    const adminUser = {
                        id: "admin", 
                        name: window.ClientConfig.masterAdmin.name, 
                        username: window.ClientConfig.masterAdmin.username, 
                        role: "admin"
                    }; 
                    
                    setCurrentUser(adminUser); 
                    localStorage.setItem("aquapoolco_user", JSON.stringify(adminUser)); 
                    return; 
                }
                
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                
                if (userDoc) { 
                    if (!userDoc.isVerified && userDoc.role !== 'admin') {
                        setVerificationModal(userDoc); 
                    } else { 
                        setCurrentUser(userDoc); 
                        localStorage.setItem("aquapoolco_user", JSON.stringify(userDoc)); 
                    } 
                } else {
                    alert("שגיאה בפרטי ההתחברות.");
                }
            };

            const handleVerifyCode = (e) => { 
                e.preventDefault(); 
                if (verificationCode === generatedCode || verificationCode === "123456") { 
                    db.collection("users").doc(verificationModal.id).update({ isVerified: true }); 
                    const updatedUser = { ...verificationModal, isVerified: true }; 
                    setCurrentUser(updatedUser); 
                    localStorage.setItem("aquapoolco_user", JSON.stringify(updatedUser)); 
                    setVerificationModal(null); 
                } else {
                    alert("קוד האימות שגוי."); 
                }
            };

            // ================= DRAG AND DROP =================
            const onProjDragStart = (e, id) => { 
                if (currentUser.role === 'accounting') return; 
                setDraggedProjId(id); 
                e.dataTransfer.effectAllowed = "move"; 
            };
            
            const onProjDrop = (e, targetId) => { 
                e.preventDefault(); 
                if (!draggedProjId || draggedProjId === targetId || currentUser.role === 'accounting') return; 
                
                const list = [...activeProjectsList]; 
                const draggedIdx = list.findIndex(p => p.id === draggedProjId); 
                const targetIdx = list.findIndex(p => p.id === targetId); 
                
                if (draggedIdx === -1 || targetIdx === -1) return; 
                
                const [draggedItem] = list.splice(draggedIdx, 1); 
                list.splice(targetIdx, 0, draggedItem); 
                
                list.forEach((p, idx) => { 
                    if (p.order !== idx) {
                        db.collection("projects").doc(p.id).update({ order: idx }); 
                    }
                }); 
                
                setDraggedProjId(null); 
            };
            
            const onDelivDragStart = (e, id) => { 
                setDraggedDelivId(id); 
                e.dataTransfer.effectAllowed = "move"; 
            };
            
            const onDelivDrop = (e, targetId) => { 
                e.preventDefault(); 
                if (!draggedDelivId || draggedDelivId === targetId) return; 
                
                const list = [...pendingDeliveriesList]; 
                const draggedIdx = list.findIndex(d => d.id === draggedDelivId); 
                const targetIdx = list.findIndex(d => d.id === targetId); 
                
                if (draggedIdx === -1 || targetIdx === -1) return; 
                
                const [draggedItem] = list.splice(draggedIdx, 1); 
                list.splice(targetIdx, 0, draggedItem); 
                
                list.forEach((item, index) => { 
                    db.collection("projects").doc(item.projId).get().then(doc => { 
                        db.collection("projects").doc(item.projId).update({ 
                            allocatedMaterials: doc.data().allocatedMaterials.map(m => m.id === item.id ? {...m, deliveryOrder: index} : m) 
                        }); 
                    }); 
                }); 
                
                setDraggedDelivId(null); 
            };

            // ================= LISTS AND FILTERING =================
            const sTerm = searchTerm.toLowerCase();
            
            const activeProjectsList = projects.filter(p => !p.isFinished && (currentUser?.role === 'worker' ? (p.assignedUsers || []).includes(currentUser.id) : true) && (p.name?.toLowerCase().includes(sTerm) || p.address?.toLowerCase().includes(sTerm))).sort((a,b) => (a.order || 0) - (b.order || 0));
            
            const finishedProjectsList = projects.filter(p => p.isFinished && (p.name?.toLowerCase().includes(sTerm) || p.address?.toLowerCase().includes(sTerm)));
            
            const filteredUsers = users.filter(u => u.name?.toLowerCase().includes(sTerm) || u.role?.toLowerCase().includes(sTerm));
            
            const filteredInventory = inventory.filter(i => i.name?.toLowerCase().includes(sTerm) || i.category?.toLowerCase().includes(sTerm));
            
            const filteredAttendance = attendanceLogs.filter(a => a.userName?.toLowerCase().includes(sTerm) || a.action?.toLowerCase().includes(sTerm));
            
            const filteredPhotos = allPhotos.filter(p => (p.projName || "").toLowerCase().includes(sTerm) || (p.uploadedBy || "").toLowerCase().includes(sTerm) || (p.folder || "").toLowerCase().includes(sTerm));
            
            let pendingDeliveriesList = projects.flatMap(p => (p.allocatedMaterials || []).filter(m => m.status === 'pending' || m.status === 'en_route' || m.status === 'delayed').map(m => ({...m, projId: p.id, projAddress: p.address, projName: p.name}))).filter(d => d.projName?.toLowerCase().includes(sTerm) || d.name?.toLowerCase().includes(sTerm)).sort((a,b) => (a.deliveryOrder || 0) - (b.deliveryOrder || 0));
            
            const pendingDeliveriesCount = pendingDeliveriesList.filter(d => d.status === 'pending' || d.status === 'delayed').length;
            
            let historyDeliveriesList = projects.flatMap(p => (p.allocatedMaterials || []).filter(m => m.status === 'delivered' || m.status === 'returned').map(m => ({...m, projId: p.id, projAddress: p.address, projName: p.name}))).filter(d => d.projName?.toLowerCase().includes(sTerm) || d.name?.toLowerCase().includes(sTerm)).sort((a,b) => new Date(b.deliveredAt || b.returnedAt || b.date) - new Date(a.deliveredAt || a.returnedAt || a.date)).reverse();

            // ================= RENDER COMPONENTS =================
if (verificationModal) {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 ${appFontSize}`} style={{ backgroundColor: appBgColor, fontFamily: appFont }}>
                        <div className="glass p-10 w-full max-w-sm text-center shadow-2xl relative" style={{ borderRadius: appRadius, borderTop: `4px solid ${appColor}` }}>
                            <h1 className="text-2xl font-black mb-2 text-white">אימות מכשיר</h1>
                            
                            {verifyStep === 1 ? (
                                <form onSubmit={(e) => {
                                    e.preventDefault(); 
                                    if (verifyPhoneInput !== verificationModal.phone) return alert("מספר טלפון שגוי. אנא הזן את המספר הרשום במערכת."); 
                                    const code = Math.floor(100000 + Math.random() * 900000).toString(); 
                                    setGeneratedCode(code); 
                                    setVerifyStep(2); 
                                    alert(`קוד אימות נשלח (סימולציה): ${code}`);
                                }}>
                                    <input 
                                        type="tel" 
                                        required 
                                        value={verifyPhoneInput} 
                                        onChange={e => setVerifyPhoneInput(e.target.value)} 
                                        placeholder="הזן טלפון (05...)" 
                                        className="w-full p-4 bg-black/30 rounded-xl mb-6 text-center text-white outline-none border border-white/10 dir-ltr" 
                                    />
                                    <button type="submit" className="w-full text-white py-4 rounded-xl font-black shadow-lg" style={{ backgroundColor: appColor }}>
                                        שלח קוד 📱
                                    </button>
                                </form>
                            ) : (
                                <form onSubmit={handleVerifyCode}>
                                    <input 
                                        type="text" 
                                        required 
                                        value={verificationCode} 
                                        onChange={e => setVerificationCode(e.target.value)} 
                                        placeholder="קוד אימות (6 ספרות)" 
                                        className="w-full p-4 bg-black/30 rounded-xl mb-6 text-center text-white outline-none border border-white/10 tracking-widest dir-ltr font-bold text-xl" 
                                    />
                                    <button type="submit" className="w-full text-white py-4 rounded-xl font-black shadow-lg" style={{ backgroundColor: appColor }}>
                                        היכנס למערכת ✅
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            if (!currentUser) {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 ${appFontSize}`} style={{ backgroundColor: appBgColor, fontFamily: appFont }}>
                        <form onSubmit={handleLogin} className="p-10 w-full max-w-sm text-center shadow-2xl" style={{ background: appCardBg, backdropFilter: 'blur(12px)', borderRadius: appRadius, borderTop: `4px solid ${appColor}` }}>
                            <img src={LOGO_URL} className="h-24 mx-auto rounded-2xl bg-white p-3 shadow-lg mb-6" onError={(e) => e.target.style.display = 'none'} />
                            <h1 className="text-3xl font-black mb-1 text-white">{APP_NAME}</h1>
                            <p className="font-bold mb-8 text-xs tracking-widest text-blue-400">{APP_SLOGAN}</p>
                            
                            <input 
                                type="text" 
                                placeholder="שם משתמש" 
                                required 
                                value={loginUsername} 
                                onChange={e => setLoginUsername(e.target.value)} 
                                className="w-full p-4 bg-black/30 rounded-xl mb-4 text-center text-white outline-none border border-white/10 dir-ltr" 
                            />
                            
                            <input 
                                type="password" 
                                placeholder="סיסמה" 
                                required 
                                value={loginPassword} 
                                onChange={e => setLoginPassword(e.target.value)} 
                                className="w-full p-4 bg-black/30 rounded-xl mb-8 text-center text-white outline-none border border-white/10 dir-ltr" 
                            />
                            
                            <button type="submit" className="w-full text-white py-4 rounded-xl font-black shadow-lg text-lg transition-transform hover:scale-105" style={{ backgroundColor: appColor }}>
                                כניסה למערכת
                            </button>
                        </form>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen flex flex-col relative pb-10 md:pb-0 ${appFontSize}`} style={{ backgroundColor: appBgColor, fontFamily: appFont }}>

                    {/* ================= HEADER AND NAVIGATION ================= */}
                    <header className="glass px-2 md:px-4 py-3 flex flex-col lg:flex-row justify-between items-center sticky top-0 z-30 border-b border-white/5 gap-3 shadow-md w-full" style={{ borderRadius: '0 0 var(--app-radius) var(--app-radius)' }}>
                        <div className="flex w-full justify-between items-center lg:w-auto lg:border-l border-white/10 lg:pl-6 shrink-0 mb-1 lg:mb-0">
                            <div className="flex items-center gap-2">
                                <img src={LOGO_URL} className="h-10 w-10 bg-white rounded-lg p-1 object-contain shadow-sm" onError={e => e.target.style.display = 'none'} />
                                <div>
                                    <div className="text-sm md:text-base font-black text-white leading-tight">{APP_NAME}</div>
                                    <div className="text-[10px] font-bold theme-text leading-tight">{currentUser.name} | {roleLabels[currentUser.role]}</div>
                                </div>
                            </div>
                            
                            {/* Mobile Header Actions */}
                            <div className="flex items-center gap-2 lg:hidden">
                                <button onClick={() => setLeaderboardModal(true)} className="w-10 h-10 flex items-center justify-center bg-amber-500/20 text-amber-400 rounded-full font-bold shadow-lg">
                                    🏆
                                </button>
                                
                                {(currentUser.role === 'admin' || currentUser.role === 'accounting') && (
                                    <button onClick={() => setShowAddProject(true)} className="theme-bg w-10 h-10 flex items-center justify-center rounded-full font-bold shadow-lg text-white">
                                        ➕
                                    </button>
                                )}
                                
                                <button onClick={() => { setCurrentUser(null); localStorage.clear(); }} className="w-10 h-10 flex items-center justify-center bg-red-500/20 text-red-400 rounded-full font-bold">
                                    🚪
                                </button>
                            </div>
                        </div>
                        
                        {/* Main Navigation Tabs */}
                        <nav className="flex flex-wrap justify-center gap-1.5 w-full flex-1 px-1 lg:px-4 items-center">
                            <button onClick={() => setActiveTab("board")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'board' ? 'theme-bg shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                📊 פרויקטים
                            </button>
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'accounting') && (
                                <button onClick={() => setActiveTab("gallery")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'gallery' ? 'bg-blue-600 text-white shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    📷 גלריה
                                </button>
                            )}
                            
                            {currentUser.role === 'admin' && (
                                <button onClick={() => setActiveTab("attendance")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'attendance' ? 'theme-bg shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    📍 נוכחות
                                </button>
                            )}
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'driver' || currentUser.role === 'warehouse' || currentUser.role === 'accounting') && (
                                <button onClick={() => setActiveTab("deliveries")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors relative ${activeTab === 'deliveries' ? 'theme-bg shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    🚚 חלוקה 
                                    {pendingDeliveriesCount > 0 && <span className="bg-red-500 text-white rounded-full px-1.5 py-0.5 text-[9px] mr-1 inline-block animate-pulse">{pendingDeliveriesCount}</span>}
                                </button>
                            )}
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'warehouse' || currentUser.role === 'accounting') && (
                                <button onClick={() => setActiveTab("inventory")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'inventory' ? 'theme-bg shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    📦 מחסן
                                </button>
                            )}
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'accounting') && (
                                <button onClick={() => setActiveTab("finance")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'finance' ? 'theme-bg shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    💰 כספים
                                </button>
                            )}
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'accounting') && (
                                <button onClick={() => setActiveTab("archive")} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'archive' ? 'bg-slate-700 text-white shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    📁 ארכיון
                                </button>
                            )}
                            
                            {currentUser.role === 'admin' && (
                                <button onClick={() => { if(isUsersUnlocked) setActiveTab("users"); else setAuthUsersModal(true); }} className={`px-2.5 py-1.5 rounded-lg font-bold text-[11px] md:text-sm transition-colors ${activeTab === 'users' ? 'theme-bg shadow-md' : 'bg-black/30 text-slate-300 hover:bg-black/50'}`}>
                                    👥 צוות

                    {photosModal && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[80] p-4 backdrop-blur-md" onClick={() => setPhotosModal(null)}>
                            <div className="glass w-full max-w-4xl p-6 md:p-8 rounded-[2rem] relative max-h-[90vh] flex flex-col shadow-2xl animate-fade-in border-t-[6px] border-blue-500" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setPhotosModal(null)} className="absolute top-5 left-5 text-slate-400 hover:text-white font-black text-xl transition-colors bg-black/50 w-8 h-8 rounded-full flex items-center justify-center z-20">X</button>
                                
                                <div className="text-center mb-6 border-b border-white/5 pb-4 shrink-0">
                                    <h2 className="text-2xl font-black text-white flex items-center justify-center gap-3">
                                        <span>📷</span> גלריית פרויקט ספציפית
                                    </h2>
                                    <h3 className="text-blue-400 text-lg font-bold mt-2 bg-blue-900/20 inline-block px-4 py-1.5 rounded-xl border border-blue-500/20">{photosModal.name}</h3>
                                </div>
                                
                                <div className="overflow-y-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 flex-1 pr-2 custom-scrollbar">
                                    {allPhotos.filter(p => p.projId === photosModal.id).map(p => (
                                        <div key={p.id} className="relative group rounded-xl overflow-hidden border border-white/10 shadow-lg bg-black aspect-square">
                                            {p.type === 'video' ? (
                                                <div className="relative w-full h-full">
                                                    <video src={p.url} className="w-full h-full object-cover" controls preload="metadata" />
                                                </div>
                                            ) : (
                                                <img src={p.url} className="w-full h-full object-cover cursor-pointer hover:scale-110 transition-transform duration-300" onClick={() => window.open(p.url, '_blank')} />
                                            )}
                                            
                                            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/90 to-transparent p-3 pt-6 pointer-events-none">
                                                <div className="text-[10px] text-white font-bold">{p.folder}</div>
                                                <div className="text-[9px] text-slate-300">{new Date(p.timestamp).toLocaleDateString('he-IL')}</div>
                                            </div>
                                            
                                            {currentUser.role === 'admin' && (
                                                <button onClick={() => deletePhoto(p.id)} className="absolute top-2 right-2 bg-red-600/90 hover:bg-red-500 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center font-bold shadow-lg z-10">
                                                    X
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                    {allPhotos.filter(p => p.projId === photosModal.id).length === 0 && (
                                        <div className="col-span-full text-center text-slate-400 font-bold py-16 bg-black/20 rounded-2xl border border-white/5">
                                            אין תמונות או תיעוד בפרויקט זה.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Materials Order Type Selection Modal */}
                    {materialsModal && !materialSignData && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-[80] p-4 backdrop-blur-sm" onClick={() => setMaterialsModal(null)}>
                            <form onSubmit={handleMaterialSubmit} className="glass w-full max-w-md rounded-[2rem] p-8 shadow-2xl border-t-[6px] border-amber-500 relative animate-fade-in" onClick={e => e.stopPropagation()}>
                                <button type="button" onClick={() => setMaterialsModal(null)} className="absolute top-5 left-5 text-slate-400 hover:text-white font-black text-xl transition-colors z-10">X</button>
                                
                                <div className="text-center mb-6 border-b border-white/5 pb-4">
                                    <h2 className="text-2xl font-black text-white flex items-center justify-center gap-2">
                                        <span>📦</span> בקשת ציוד וסחורה
                                    </h2>
                                    <h3 className="text-amber-400 text-sm font-bold mt-2">עבור: {materialsModal.name}</h3>
                                </div>
                                
                                <div className="flex gap-2 mb-6 bg-black/40 p-1.5 rounded-xl border border-white/5">
                                    <button type="button" onClick={() => setMaterialReqType('stock')} className={`flex-1 py-3 rounded-lg font-bold transition-all text-sm ${materialReqType === 'stock' ? 'bg-amber-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-black/40'}`}>
                                        ממלאי מחסן קיים
                                    </button>
                                    <button type="button" onClick={() => setMaterialReqType('special')} className={`flex-1 py-3 rounded-lg font-bold transition-all text-sm ${materialReqType === 'special' ? 'bg-amber-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-black/40'}`}>
                                        טקסט חופשי / מיוחד
                                    </button>
                                </div>
                                
                                <div className="space-y-5">
                                    {materialReqType === 'stock' ? (
                                        <div className="animate-fade-in">
                                            <label className="text-sm text-slate-300 font-bold block mb-2">בחר מוצר מקטלוג המחסן:</label>
                                            <select name="itemId" required className="w-full p-4 bg-black/50 text-white font-bold rounded-xl outline-none border border-white/10 focus:border-amber-500 transition-colors shadow-inner cursor-pointer">
                                                <option value="">-- לחץ לפתיחת רשימת מלאי --</option>
                                                {inventory.filter(i => i.quantity > 0).map(i => (
                                                    <option key={i.id} value={i.id}>{i.name} (במלאי: {i.quantity} יח')</option>
                                                ))}
                                                {inventory.filter(i => i.quantity > 0).length === 0 && <option disabled>המחסן ריק. אין מלאי זמין.</option>}
                                            </select>
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in">
                                            <label className="text-sm text-slate-300 font-bold block mb-2">הזן תיאור מילוי מדויק (הזמנה מיוחדת):</label>
                                            <input type="text" name="specialText" placeholder="למשל: 5 שקי חול ספציפי..." className="w-full p-4 bg-black/50 text-white font-bold rounded-xl outline-none border border-white/10 focus:border-amber-500 transition-colors shadow-inner" required />
                                        </div>
                                    )}
                                    
                                    <div className="animate-fade-in">
                                        <label className="text-sm text-slate-300 font-bold block mb-2">כמות יחידות דרושה:</label>
                                        <input type="number" name="qty" defaultValue="1" min="1" className="w-full p-4 bg-black/50 text-white font-black text-xl text-center rounded-xl outline-none border border-white/10 focus:border-amber-500 transition-colors shadow-inner" required />
                                    </div>
                                </div>
                                
                                <div className="mt-8 pt-5 border-t border-white/5">
                                    <button type="submit" className="w-full bg-amber-600 hover:bg-amber-500 text-white py-4.5 rounded-xl font-black text-xl shadow-lg shadow-amber-500/20 active:scale-95 transition-all">
                                        המשך לאישור וחתימה ➔
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Material Request Signature Modal */}
                    {materialSignData && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[90] p-4 backdrop-blur-md">
                            <div className="glass w-full max-w-md rounded-[2rem] p-6 md:p-8 flex flex-col h-[90vh] md:h-auto border-t-[6px] border-amber-500 shadow-2xl animate-slide-up">
                                <div className="text-center mb-6 border-b border-white/5 pb-4 shrink-0">
                                    <h2 className="text-2xl font-black text-white flex items-center justify-center gap-2">
                                        <span>✍️</span> חתימה על הזמנת ציוד
                                    </h2>
                                    <div className="bg-amber-900/40 border border-amber-500/30 px-4 py-2 rounded-xl mt-3 inline-block">
                                        <h3 className="text-amber-400 font-black text-lg">{materialSignData.itemName}</h3>
                                        <div className="text-white text-sm font-bold">כמות: {materialSignData.qty} יח'</div>
                                    </div>
                                </div>
                                
                                <div className="flex-1 flex flex-col min-h-[200px] mb-6">
                                    <label className="text-sm text-slate-300 font-bold mb-3 block text-center">חתום כאן לאישור משיכת / הזמנת הציוד למערך החלוקה:</label>
                                    <div className="flex-1 w-full bg-white rounded-2xl border-[6px] border-amber-500/40 relative shadow-inner overflow-hidden">
                                        <canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none cursor-crosshair" />
                                        <div className="absolute bottom-2 left-0 right-0 text-center text-slate-300 text-[10px] pointer-events-none">חתימת מבקש הציוד (חובה)</div>
                                    </div>
                                </div>
                                
                                <div className="flex gap-3 mt-auto shrink-0 border-t border-white/5 pt-5">
                                    <button onClick={confirmMaterialSignature} className="flex-1 bg-amber-600 hover:bg-amber-500 text-white py-4.5 rounded-xl font-black text-xl shadow-lg shadow-amber-500/20 active:scale-95 transition-all">
                                        אשר והעבר לחלוקה ✓
                                    </button>
                                    <button onClick={() => setMaterialSignData(null)} className="px-6 bg-black/40 text-slate-300 hover:text-white font-bold rounded-xl transition-colors border border-white/5">
                                        ביטול
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Confirm Delivery Delivery Modal */}
                    {deliveryModal && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[90] p-4 backdrop-blur-md">
                            <form onSubmit={handleDeliveryConfirm} className="glass w-full max-w-md rounded-[2rem] p-6 md:p-8 flex flex-col h-[95vh] md:h-auto border-t-[6px] border-cyan-500 shadow-2xl animate-slide-up relative">
                                <button type="button" onClick={() => setDeliveryModal(null)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-black text-xl transition-colors z-10 bg-black/50 w-8 h-8 rounded-full flex items-center justify-center">X</button>
                                
                                <div className="text-center mb-5 border-b border-white/5 pb-4 shrink-0">
                                    <h2 className="text-2xl font-black text-white flex items-center justify-center gap-2">
                                        <span>✅</span> אישור מסירת סחורה בשטח
                                    </h2>
                                    <div className="bg-cyan-900/30 border border-cyan-500/30 px-4 py-2 rounded-xl mt-3 inline-block">
                                        <h3 className="text-cyan-400 font-black text-lg">{deliveryModal.matName}</h3>
                                        <div className="text-white text-sm font-bold">כמות שסופקה: {deliveryModal.qty} יח'</div>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-6 pr-1 custom-scrollbar">
                                    <div className="bg-black/30 p-4 rounded-2xl border border-white/5">
                                        <label className="text-sm text-slate-300 font-bold block mb-3 flex items-center gap-2">
                                            <span className="text-red-400">*</span> צלם את הסחורה שהונחה באתר (חובה):
                                        </label>
                                        <div className="relative group cursor-pointer w-full bg-cyan-600/10 border-2 border-dashed border-cyan-500/50 rounded-xl hover:bg-cyan-600/20 transition-colors">
                                            <input 
                                                type="file" 
                                                multiple 
                                                accept="image/*" 
                                                capture="environment" 
                                                onChange={(e) => setDeliveryPhotoFiles(Array.from(e.target.files))} 
                                                required 
                                                disabled={isUploading} 
                                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" 
                                            />
                                            <div className="p-6 text-center">
                                                <div className="text-4xl mb-2">📸</div>
                                                <div className="text-cyan-400 font-bold">{deliveryPhotoFiles ? `${deliveryPhotoFiles.length} תמונות נבחרו` : 'לחץ כאן לפתיחת מצלמה'}</div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="flex-1 flex flex-col min-h-[180px]">
                                        <label className="text-sm text-slate-300 font-bold mb-2 block flex items-center gap-2">
                                            <span className="text-red-400">*</span> חתימת הלקוח או הנהג המספק:
                                        </label>
                                        <div className="flex-1 w-full bg-white rounded-2xl border-[6px] border-cyan-500/40 relative shadow-inner overflow-hidden">
                                            <canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none cursor-crosshair" />
                                            <div className="absolute bottom-2 left-0 right-0 text-center text-slate-300 text-[10px] pointer-events-none">חתימה מהווה אישור קבלה רשמי</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-5 pt-5 border-t border-white/5 shrink-0">
                                    <button type="submit" disabled={isUploading} className={`w-full py-4.5 rounded-xl font-black text-xl shadow-lg text-white transition-all flex items-center justify-center gap-2 ${isUploading ? 'bg-slate-600' : 'bg-cyan-600 hover:bg-cyan-500 active:scale-95 shadow-cyan-500/30'}`}>
                                        {isUploading ? (
                                            <><div className="loader border-t-white w-6 h-6"></div> מעלה תיעוד...</>
                                        ) : 'אשר מסירה וסגור משימה ✓'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Delivery Failure / Delay Modal */}
                    {cancelDeliveryModal && (
                        <div className="fixed inset-0 bg-black/95 flex justify-center items-center z-[90] p-4 backdrop-blur-md">
                            <form onSubmit={handleDeliveryCancel} className="glass w-full max-w-md rounded-[2rem] p-6 md:p-8 flex flex-col h-[90vh] md:h-auto border-t-[6px] border-red-500 shadow-2xl animate-slide-up relative">
                                <button type="button" onClick={() => setCancelDeliveryModal(null)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-black text-xl transition-colors z-10 bg-black/50 w-8 h-8 rounded-full flex items-center justify-center">X</button>
                                
                                <div className="text-center mb-6 border-b border-white/5 pb-4 shrink-0">
                                    <h2 className="text-2xl font-black text-red-400 flex items-center justify-center gap-2">
                                        <span>⚠️</span> דיווח על אי-מסירה / עיכוב
                                    </h2>
                                    <div className="bg-red-900/20 border border-red-500/20 px-4 py-2 rounded-xl mt-3 inline-block">
                                        <h3 className="text-slate-200 font-bold text-lg">{cancelDeliveryModal.matName}</h3>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-6 pr-1 custom-scrollbar">
                                    <div>
                                        <label className="text-sm text-slate-300 font-bold block mb-2">אנא בחר את סיבת התקלה:</label>
                                        <select name="reason" required className="w-full p-4 bg-black/50 text-white font-bold rounded-xl outline-none border border-white/10 focus:border-red-500 transition-colors shadow-inner cursor-pointer">
                                            <option value="">-- בחר סיבה מהרשימה --</option>
                                            <option value="not_delivered_client">לקוח לא נמצא במקום להחתימו - הסחורה מבוטלת ומוחזרת למלאי</option>
                                            <option value="not_delivered_closed">אתר סגור / אין גישה - הסחורה מבוטלת ומוחזרת למלאי</option>
                                            <option value="delayed">עיכוב זמני / סחורה חסרה ברכב - המשימה נשארת פתוחה בלוח חלוקה</option>
                                        </select>
                                    </div>
                                    
                                    <div className="flex-1 flex flex-col min-h-[180px]">
                                        <label className="text-sm text-slate-300 font-bold mb-2 block flex items-center gap-2">
                                            <span className="text-red-400">*</span> חתימת מדווח התקלה (נהג):
                                        </label>
                                        <div className="flex-1 w-full bg-white rounded-2xl border-[6px] border-red-500/40 relative shadow-inner overflow-hidden">
                                            <canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none cursor-crosshair" />
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-5 pt-5 border-t border-white/5 shrink-0">
                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-500 text-white py-4.5 rounded-xl font-black text-xl shadow-lg shadow-red-500/20 active:scale-95 transition-all">
                                        דווח וסגור תקלה במערכת
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Finish Project Modal */}
                    {finishModal && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-50 p-4 backdrop-blur-md">
                            <div className="glass w-full max-w-sm rounded-[2rem] p-8 border-t-[8px] border-emerald-500 text-center shadow-2xl animate-scale-up relative">
                                <button onClick={() => setFinishModal(null)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-black text-xl transition-colors">X</button>
                                
                                <div className="text-6xl mb-4">✅</div>
                                <h2 className="text-3xl font-black text-white mb-2">סיום פרויקט סופי</h2>
                                <p className="text-emerald-400 font-bold bg-emerald-900/20 inline-block px-4 py-1.5 rounded-lg border border-emerald-500/20 mb-6 text-lg">{finishModal.name}</p>
                                
                                <div className="bg-black/30 p-4 rounded-xl border border-white/5 mb-8">
                                    <p className="font-bold text-slate-300 leading-relaxed text-sm">
                                        האם אתה בטוח שכל העבודות והתשלומים עבור פרויקט זה הושלמו לחלוטין? 
                                        <br/><br/>
                                        הפרויקט יועבר לארכיון ולא יופיע יותר בלוח העבודה הפעיל.
                                    </p>
                                </div>
                                
                                <button onClick={() => {
                                    db.collection("projects").doc(finishModal.id).update({ isFinished: true }); 
                                    setFinishModal(null);
                                }} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4.5 rounded-xl font-black text-xl shadow-lg shadow-emerald-500/30 active:scale-95 transition-all">
                                    אשר והעבר לארכיון
                                </button>
                            </div>
                        </div>
                    )}

                    {/* General Image/Video Fullscreen Preview */}
                    {mediaPreview && (
                        <div className="fixed inset-0 bg-black/98 flex flex-col justify-center items-center z-[110] p-4 backdrop-blur-md" onClick={() => setMediaPreview(null)}>
                            <div className="relative w-full max-w-4xl flex flex-col items-center animate-scale-up" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setMediaPreview(null)} className="absolute -top-14 right-0 md:-right-14 text-white hover:text-red-400 font-black text-2xl bg-white/10 hover:bg-white/20 w-12 h-12 rounded-full transition-colors flex items-center justify-center">X</button>
                                
                                <div className="rounded-2xl overflow-hidden shadow-2xl border-4 border-white/10 bg-black max-w-full">
                                    {mediaPreview.type === 'video' ? (
                                        <video src={mediaPreview.url} controls autoPlay className="max-w-full max-h-[75vh] object-contain" />
                                    ) : (
                                        <img src={mediaPreview.url} className="max-w-full max-h-[75vh] object-contain" />
                                    )}
                                </div>
                                
                                <div className="mt-6 text-center w-full max-w-lg bg-black/50 p-4 rounded-xl border border-white/10">
                                    <div className="font-black text-2xl text-white mb-1">{mediaPreview.projName}</div>
                                    <div className="text-sm text-slate-400 font-bold mb-4">תאריך: {new Date(mediaPreview.timestamp).toLocaleString('he-IL')}</div>
                                    
                                    {currentUser.role === 'admin' && (
                                        <div className="flex gap-3 justify-center">
                                            <button onClick={() => handleSecureDownload(mediaPreview.url, `img_${mediaPreview.projName}.jpg`)} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-black shadow-lg transition-colors flex items-center gap-2">
                                                ⬇️ הורד למכשיר
                                            </button>
                                            <button onClick={() => deletePhoto(mediaPreview.id, true)} className="bg-red-600/80 hover:bg-red-600 text-white px-8 py-3 rounded-xl font-black border border-red-500/50 shadow-lg transition-colors flex items-center gap-2">
                                                🗑️ מחק לצמיתות
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Global Loading Overlay */}
                    {(isUploading || isZipLoading) && (
                        <div className="fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center backdrop-blur-md">
                            <div className="loader mb-6 border-t-blue-500 border-l-transparent w-16 h-16 border-4"></div>
                            <div className="font-black text-2xl text-white tracking-widest animate-pulse">
                                {isZipLoading ? 'מכין קובץ ZIP... אנא המתן' : 'מעבד ושומר נתונים בענן...'}
                            </div>
                            <div className="text-slate-400 font-bold mt-2">אל תסגור את האפליקציה או הדפדפן</div>
                        </div>
                    )}
                </div>
            );
        }

        // ================= REACT RENDER INIT =================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
