<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--app-card-bg, rgba(30, 41, 59, 0.8)); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: var(--app-radius, 1rem); border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: rgba(0,0,0,0.3); padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid rgba(255,255,255,0.1); white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 3.5rem; position: relative; }
        .status-cell.disabled { cursor: not-allowed; opacity: 0.7; }
        .status-0 { background-color: #334155; color: #cbd5e1; } .status-1 { background-color: #f59e0b; color: #fff; } .status-2 { background-color: #ef4444; color: #fff; } .status-3 { background-color: #10b981; color: #fff; } 
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
        .dir-ltr { direction: ltr; } .hide-scroll::-webkit-scrollbar { display: none; } .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pulse-glow { animation: pulseGlow 1.5s infinite; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appBgColor, setAppBgColor] = useState("#0f172a");
            const [appCardBg, setAppCardBg] = useState("rgba(30, 41, 59, 0.8)");
            const [appRadius, setAppRadius] = useState("1rem");
            const [portalName, setPortalName] = useState("אקוופולקו חן בע\"מ");
            
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState(""); 
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [editProjectModal, setEditProjectModal] = useState(null); 
            const [assignModal, setAssignModal] = useState(null); 
            const [callTeamModal, setCallTeamModal] = useState(null);
            
            const [statusModal, setStatusModal] = useState(null);
            const [signRequirement, setSignRequirement] = useState(null);
            
            const [photosModal, setPhotosModal] = useState(null);
            const [currentProjectPhotos, setCurrentProjectPhotos] = useState([]);
            const [activePhotoFolder, setActivePhotoFolder] = useState('כללי');
            const [statusPhotoFiles, setStatusPhotoFiles] = useState(null);
            
            const canvasRef = useRef(null);
            const sigPad = useRef(null);
            const [isUploading, setIsUploading] = useState(false);

            const roleLabels = { admin: "מנהל מערכת", accounting: "הנהלת חשבונות", warehouse: "מנהל מחסן", driver: "נהג חלוקה", worker: "צוות שטח" };
            const projectFolders = ['כללי', ...stages.map(s=>s.label), 'תקלות/תיקונים', '🗑️ פח אשפה'];

            useEffect(() => {
                const savedUser = localStorage.getItem("aquapoolco_user");
                if (savedUser) { try { setCurrentUser(JSON.parse(savedUser)); } catch (e) { localStorage.removeItem("aquapoolco_user"); } }

                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appBgColor) setAppBgColor(d.appBgColor);
                        if (d.appCardBg) setAppCardBg(d.appCardBg);
                        if (d.appRadius) setAppRadius(d.appRadius);
                        if (d.portalName) setPortalName(d.portalName);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("users").onSnapshot(snapshot => setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("inventory").onSnapshot(snapshot => setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
            }, []);

            useEffect(() => {
                let unsubPhotos = () => {};
                if (photosModal) {
                    unsubPhotos = db.collection("project_photos")
                        .where("projId", "==", photosModal.id)
                        .orderBy("timestamp", "desc")
                        .onSnapshot(snap => {
                            setCurrentProjectPhotos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                        });
                }
                return () => unsubPhotos();
            }, [photosModal]);

            useEffect(() => {
                if (signRequirement && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                    sigPad.current = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
                }
            }, [signRequirement]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    const adminUser = { id: "admin-roei", name: "רועי גלם (מנכ''ל)", username: "roeigalam", role: "admin", tz: "000000000", phone: "0500000000" };
                    setCurrentUser(adminUser); localStorage.setItem("aquapoolco_user", JSON.stringify(adminUser)); return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) { setCurrentUser(userDoc); localStorage.setItem("aquapoolco_user", JSON.stringify(userDoc)); } 
                else { alert("שם משתמש או סיסמה שגויים. נסה שנית."); }
            };

            const logAttendanceAndLocation = (actionDetails, callback = null) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        position => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails, lat: position.coords.latitude, lng: position.coords.longitude, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        error => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails + " (ללא מיקום)", lat: null, lng: null, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                    );
                } else { if (callback) callback(); }
            };

            // התיקון הקריטי: מעבר לקישור אוניברסלי ופתיחה בחלון חדש
            const handleWazeClick = (proj, e, matItem = null) => {
                if (e) e.preventDefault();
                
                if (matItem && matItem.status === 'pending') {
                    db.collection("projects").doc(proj.id).get().then(doc => {
                        if(doc.exists) {
                            const p = doc.data(); const updatedMats = p.allocatedMaterials.map(m => m.id === matItem.id ? { ...m, status: 'en_route' } : m);
                            db.collection("projects").doc(proj.id).update({ allocatedMaterials: updatedMats });
                        }
                    });
                } else if (!matItem && proj.allocatedMaterials) {
                    let changed = false;
                    const updatedMats = proj.allocatedMaterials.map(m => { if (m.status === 'pending') { changed = true; return { ...m, status: 'en_route' }; } return m; });
                    if (changed) db.collection("projects").doc(proj.id).update({ allocatedMaterials: updatedMats });
                }

                // שימוש ב-Universal Link של ווייז שמונע מסך לבן
                const wazeUrl = `https://waze.com/ul?q=${encodeURIComponent(proj.address)}&navigate=yes`;
                logAttendanceAndLocation(`יציאה לניווט: ${proj.name}`, () => { 
                    window.open(wazeUrl, '_blank'); 
                });
            };

            const uploadFilesToStorageAndDB = async (files, collectionName, extraData) => {
                if (!files || files.length === 0) return [];
                const uploadPromises = Array.from(files).map(async (file) => {
                    try {
                        let fileUrl = ""; let fileType = "";
                        if (file.type.startsWith('image/')) {
                            const blob = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    const img = new Image();
                                    img.onload = () => {
                                        const canvas = document.createElement('canvas'); const scaleSize = Math.min(1, 1200 / img.width);
                                        canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                        canvas.toBlob(b => resolve(b), 'image/jpeg', 0.8);
                                    };
                                    img.src = e.target.result;
                                };
                                reader.readAsDataURL(file);
                            });
                            const ref = storage.ref(`images/${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`);
                            await ref.put(blob); fileUrl = await ref.getDownloadURL(); fileType = 'image';
                        } else if (file.type.startsWith('video/')) {
                            const ref = storage.ref(`videos/${Date.now()}_${file.name}`);
                            await ref.put(file); fileUrl = await ref.getDownloadURL(); fileType = 'video';
                        }
                        if (fileUrl) {
                            const docRef = await db.collection(collectionName).add({ ...extraData, fileUrl: fileUrl, fileType: fileType, uploadedBy: currentUser.name, timestamp: new Date().toISOString(), isDeleted: false });
                            return { id: docRef.id, url: fileUrl, type: fileType };
                        }
                    } catch (error) { console.error("Upload error:", error); throw error; }
                });
                return Promise.all(uploadPromises);
            };

            const handleProjectPhotosUpload = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                setIsUploading(true);
                try {
                    await uploadFilesToStorageAndDB(files, "project_photos", { 
                        projId: photosModal.id, 
                        projName: photosModal.name, 
                        folder: activePhotoFolder !== '🗑️ פח אשפה' ? activePhotoFolder : 'כללי' 
                    });
                    
                    if (currentUser && currentUser.role === 'worker') {
                        db.collection("users").doc(currentUser.id).update({ score: firebase.firestore.FieldValue.increment(2) });
                    }
                    setIsUploading(false);
                } catch (err) { 
                    alert("שגיאה בהעלאה. בדוק חיבור לרשת ונסה שוב."); 
                    setIsUploading(false); 
                }
            };

            const confirmSignatureAndStatus = async (e) => {
                e.preventDefault();
                const remark = e.target.remark.value.trim();
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס!");
                if (!statusPhotoFiles || statusPhotoFiles.length === 0) return alert("📷 חובה להעלות לפחות תמונה אחת או וידאו מהשטח כדי לאשר!");

                setIsUploading(true);
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(statusPhotoFiles, "project_photos", { projId: signRequirement.projId, projName: signRequirement.projName, folder: signRequirement.stageLabel });
                    const historyItem = { stageId: signRequirement.stageId, code: signRequirement.code, remark: remark, user: currentUser.name, date: new Date().toISOString(), files: uploadedData };

                    await db.collection("projects").doc(signRequirement.projId).update({
                        [`statuses.${signRequirement.stageId}`]: signRequirement.code, [`hasPhotos.${signRequirement.stageId}`]: true,
                        [`signatures.${signRequirement.stageId}`]: { name: currentUser.name, id: currentUser.tz || '000', date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() },
                        statusHistory: firebase.firestore.FieldValue.arrayUnion(historyItem)
                    });

                    if (currentUser && currentUser.role === 'worker') {
                        db.collection("users").doc(currentUser.id).update({ score: firebase.firestore.FieldValue.increment(10) });
                    }
                    
                    setIsUploading(false); setStatusPhotoFiles(null); setSignRequirement(null); setStatusModal(null);
                } catch (err) { alert("שגיאה בתהליך העדכון והעלאת התמונות."); setIsUploading(false); }
            };

            const sTerm = (searchTerm || "").toLowerCase();
            const activeProjectsList = projects.filter(p => {
                if (p.isFinished) return false;
                const isAssigned = p.assignedUsers && p.assignedUsers.includes(currentUser.id);
                if (currentUser.role === 'worker' && !isAssigned) return false;
                return p.name?.toLowerCase().includes(sTerm) || p.address?.toLowerCase().includes(sTerm);
            }).sort((a,b) => (a.order || 0) - (b.order || 0));

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{ backgroundColor: appBgColor }}>
                        <form onSubmit={handleLogin} className="p-10 w-full max-w-sm text-center shadow-2xl relative" style={{ background: appCardBg, backdropFilter: 'blur(12px)', borderRadius: appRadius }}>
                            <h1 className="text-2xl font-black mb-8 text-white">התחברות למערכת</h1>
                            <input type="text" placeholder="שם משתמש" required value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} className="w-full p-4 bg-black/30 rounded-xl mb-4 text-center text-white border border-white/10" />
                            <input type="password" placeholder="סיסמה" required value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} className="w-full p-4 bg-black/30 rounded-xl mb-8 text-center text-white border border-white/10" />
                            <button type="submit" className="w-full text-white py-4 rounded-xl font-black shadow-lg" style={{backgroundColor: appColor}}>כניסה</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col relative pb-10" style={{ backgroundColor: appBgColor }}>
                    <style>{`:root { --theme-color: ${appColor}; --app-bg: ${appBgColor}; --app-card-bg: ${appCardBg}; --app-radius: ${appRadius}; } body { background-color: var(--app-bg) !important; } .theme-bg { background-color: var(--theme-color) !important; color: white !important; }`}</style>

                    <header className="glass px-4 py-3 flex justify-between items-center sticky top-0 z-30 border-b border-white/5 shadow-md">
                        <div className="font-black text-white">{portalName} <span className="text-xs opacity-50 block">{currentUser.name} | {roleLabels[currentUser.role]}</span></div>
                        <div className="flex gap-2">
                            {(currentUser.role === 'admin' || currentUser.role === 'accounting') && <button onClick={() => setShowAddProject(true)} className="theme-bg px-4 py-2 rounded-xl font-bold text-sm shadow-lg">➕ פרויקט חדש</button>}
                            <button onClick={()=> {setCurrentUser(null); localStorage.removeItem("aquapoolco_user");}} className="text-red-400 bg-red-900/30 px-3 py-2 rounded-xl text-sm font-bold">התנתק</button>
                        </div>
                    </header>

                    <main className="flex-1 p-3 md:p-8 max-w-[1600px] mx-auto w-full">
                        <input type="text" placeholder={`🔍 חיפוש פרויקט...`} value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full p-4 mb-6 rounded-xl bg-black/40 border border-white/10 text-white outline-none" />

                        {activeProjectsList.length === 0 && <div className="text-center py-10 text-slate-500 font-bold glass rounded-2xl">לא נמצאו פרויקטים מתאימים (או שאינך משובץ).</div>}
                        
                        <div className="space-y-5">
                            {activeProjectsList.map(proj => {
                                const allStagesForProgress = [...stages, ...(proj.customTasks || [])];
                                const doneCount = allStagesForProgress.filter(s => proj.statuses && proj.statuses[s.id] === 3).length; 
                                const progress = allStagesForProgress.length ? Math.round((doneCount / allStagesForProgress.length) * 100) : 0;
                                const teamNames = (Array.isArray(proj.assignedUsers) && proj.assignedUsers.length > 0) ? proj.assignedUsers.map(uid => users.find(x=>x.id===uid)?.name || '').filter(Boolean).join(', ') : 'לא שובץ';

                                return (
                                    <div key={proj.id} className="glass p-5 shadow-xl relative overflow-hidden transition-all border-white/10" style={{ borderRadius: appRadius }}>
                                        <div className="absolute top-0 right-0 w-2 h-full theme-bg opacity-80"></div>
                                        <div className="pr-3">
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="font-black text-white text-xl flex items-center gap-2">
                                                    {proj.name} 
                                                    {(currentUser.role === 'admin' || currentUser.role === 'accounting') && <button onClick={() => setEditProjectModal(proj)} className="text-blue-400 text-sm ml-2">✏️</button>}
                                                </h3>
                                                <a href="#" onClick={(e) => handleWazeClick(proj, e)} className="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-xs font-black">🚗 Waze</a>
                                            </div>
                                            <p className="text-sm text-slate-400 mb-3">📍 {proj.address}</p>
                                            
                                            <div className="flex gap-2 mb-4">
                                                <div onClick={() => currentUser.role === 'admin' ? setAssignModal({ id: proj.id, name: proj.name, users: Array.isArray(proj.assignedUsers) ? proj.assignedUsers : [] }) : null} className={`bg-black/30 px-3 py-2 rounded-xl text-xs font-bold border border-white/5 ${currentUser.role === 'admin' ? 'cursor-pointer' : ''}`}>צוות: {teamNames}</div>
                                            </div>
                                            
                                            <div className="flex gap-2 mb-4">
                                                {proj.clientPhone ? <a href={`tel:${proj.clientPhone}`} className="flex-1 bg-green-600/20 text-green-400 text-center py-2 rounded-xl text-xs font-bold border border-green-500/30">📞 ללקוח</a> : <button onClick={()=>alert('לא הוגדר טלפון ללקוח. ערוך את הפרויקט (✏️) והוסף מספר.')} className="flex-1 bg-black/30 text-slate-500 text-center py-2 rounded-xl text-xs font-bold border border-white/5">📞 חסר טלפון</button>}
                                                <button onClick={() => {
                                                    const team = (proj.assignedUsers || []).map(uid => users.find(u => u.id === uid)).filter(Boolean);
                                                    if (team.length === 0) alert("לא שובץ צוות.");
                                                    else if (team.length === 1) window.location.href = `tel:${team[0].phone || ''}`;
                                                    else setCallTeamModal({ projName: proj.name, team });
                                                }} className="flex-1 bg-indigo-600/20 text-indigo-400 text-center py-2 rounded-xl text-xs font-bold border border-indigo-500/30">📞 לצוות</button>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-3 mb-5">
                                                {allStagesForProgress.map(stage => {
                                                    const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                                                    const color = code === 3 ? "bg-[#10b981] text-white border-transparent" : code === 2 ? "bg-[#ef4444] text-white border-transparent" : code === 1 ? "bg-[#f59e0b] text-white border-transparent" : "bg-black/40 text-slate-400 border border-white/10";
                                                    
                                                    return (
                                                        <button key={stage.id} onClick={() => { if(currentUser.role === 'accounting') return; setStatusModal({ projId: proj.id, stageId: stage.id, projName: proj.name, stageLabel: stage.label, currentCode: code }); }} className={`w-full p-3 rounded-2xl flex flex-col justify-center items-center font-bold text-sm shadow-sm ${color}`}>
                                                            <span className="text-[10px] opacity-70 mb-1 leading-none text-center truncate">{stage.label}</span>
                                                            <span>{statusLabels[code]}</span>
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                            <div className="flex items-center gap-3 mb-5 bg-black/20 p-3 rounded-xl border border-white/5"><span className="text-xs font-black text-white w-8">{progress}%</span><div className="flex-1 bg-black/40 rounded-full h-3 overflow-hidden shadow-inner"><div className="h-full rounded-full theme-bg" style={{width:`${progress}%`}}></div></div></div>
                                            
                                            <div className="border-t border-white/5 pt-4">
                                                <button onClick={() => setPhotosModal(proj)} className="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl text-sm font-bold flex items-center">📷 תמונות ותיעוד שטח</button>
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </main>

                    {/* מודאל גלריה והעלאת תמונות */}
                    {photosModal && (
                        <div className="fixed inset-0 bg-black/90 flex flex-col z-50 p-4">
                            <div className="glass w-full h-full rounded-[2rem] flex flex-col shadow-2xl border-t-[6px]" style={{ borderColor: appColor }}>
                                <div className="p-4 border-b border-white/10 flex justify-between items-center bg-black/40 shrink-0">
                                    <div><h2 className="text-white text-xl font-black">📷 תיעוד פרויקט</h2><p className="text-slate-400 text-sm font-bold mt-1">{photosModal.name}</p></div>
                                    <button onClick={() => setPhotosModal(null)} className="w-10 h-10 bg-black/50 rounded-full text-white font-bold text-xl flex items-center justify-center hover:bg-white/10 transition">X</button>
                                </div>
                                <div className="flex gap-2 p-3 bg-black/30 overflow-x-auto shrink-0 border-b border-white/5">
                                    {projectFolders.map(folder => <button key={folder} onClick={() => setActivePhotoFolder(folder)} className={`whitespace-nowrap px-4 py-2 rounded-xl font-bold text-sm transition-all border border-transparent ${activePhotoFolder === folder ? 'bg-blue-600 text-white shadow-lg' : 'bg-black/50 text-slate-400 border-white/5'}`}>📁 {folder}</button>)}
                                </div>
                                <div className="flex-1 overflow-y-auto p-4">
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {currentProjectPhotos.filter(p => (!p.isDeleted && (p.folder || 'כללי') === activePhotoFolder)).map(photo => {
                                            const mediaUrl = photo.fileUrl;
                                            const isVideo = photo.fileType === 'video';
                                            return (
                                            <div key={photo.id} className="relative rounded-2xl overflow-hidden bg-black/50 border border-white/5 aspect-[3/4] shadow-lg">
                                                {isVideo ? ( <video src={mediaUrl} controls className="w-full h-full object-cover" /> ) : ( <a href={mediaUrl} target="_blank"><img src={mediaUrl} className="w-full h-full object-cover" /></a> )}
                                                <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-3 pointer-events-none"><p className="text-white text-[10px] font-bold">{photo.uploadedBy}</p></div>
                                                {currentUser.role === 'admin' && <button onClick={() => db.collection("project_photos").doc(photo.id).update({isDeleted:true})} className="absolute top-2 right-2 w-8 h-8 bg-red-600 text-white rounded-lg font-bold text-sm">🗑️</button>}
                                            </div>
                                        )})}
                                    </div>
                                </div>
                                <div className="p-4 border-t border-white/10 bg-black/40 shrink-0">
                                    <label className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-lg cursor-pointer flex items-center justify-center gap-2">
                                        {isUploading ? <span className="loader"></span> : `➕ העלה תמונות / וידאו לכאן`}
                                        <input type="file" accept="image/*,video/*" multiple className="hidden" onChange={handleProjectPhotosUpload} disabled={isUploading} />
                                    </label>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* חלון דרישת חתימה ותמונה לעדכון סטטוס */}
                    {signRequirement && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-end p-4 z-50">
                            <form onSubmit={confirmSignatureAndStatus} className="glass w-full rounded-[2rem] p-6 shadow-2xl flex flex-col border-t-[6px]" style={{ borderColor: appColor }}>
                                <h2 className="text-white text-center text-xl font-black mb-1 shrink-0">אישור ועדכון סטטוס</h2>
                                <p className="text-center text-slate-400 text-sm mb-4">שלב: <span className="text-white">{signRequirement.stageLabel}</span> ➡️ <span className="text-white bg-white/20 px-2 rounded-lg">{signRequirement.newStatus}</span></p>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                                    <div><label className="text-xs text-blue-300 font-bold block mb-2">* מה בוצע בשטח (הערת חובה):</label><textarea name="remark" rows="2" className="w-full p-3 bg-black/50 text-white rounded-xl outline-none border border-blue-500/30" required></textarea></div>

                                    <div className="pt-2"><label className="text-xs text-amber-400 font-bold block mb-2">* העלה תיעוד תמונה/וידאו מהשטח (ניתן לבחור כמה):</label>
                                        <label className={`w-full py-4 rounded-xl font-black text-sm cursor-pointer flex justify-center border border-dashed ${statusPhotoFiles && statusPhotoFiles.length > 0 ? 'bg-blue-600/20 text-blue-400 border-blue-500' : 'bg-black/50 text-white border-white/30'}`}>
                                            {isUploading ? <span className="loader"></span> : ((statusPhotoFiles && statusPhotoFiles.length > 0) ? `${statusPhotoFiles.length} קבצים נבחרו ✓` : "📷 לחץ לבחירת תמונות / וידאו")}
                                            <input type="file" accept="image/*,video/*" multiple className="hidden" onChange={(e) => setStatusPhotoFiles(e.target.files)} disabled={isUploading} />
                                        </label>
                                    </div>

                                    <div className="flex-1 flex flex-col min-h-[150px]"><div className="flex justify-between items-center mb-2"><label className="text-xs text-slate-400 font-bold">חתימה (חובה):</label><button type="button" onClick={() => sigPad.current.clear()} className="bg-black/50 text-white px-3 py-1 rounded-lg text-xs">נקה</button></div><div className="flex-1 w-full bg-white rounded-2xl overflow-hidden touch-none relative"><canvas ref={canvasRef} className="absolute inset-0 w-full h-full touch-none" /></div></div>
                                </div>
                                <div className="flex gap-3 mt-4 pt-4 border-t border-white/10 shrink-0"><button type="submit" disabled={isUploading} className={`flex-1 text-white py-4 rounded-xl font-black text-lg ${isUploading ? 'bg-slate-600' : 'theme-bg'}`}>{isUploading ? 'מעלה...' : 'חתום ואשר ✓'}</button><button type="button" onClick={() => {setSignRequirement(null); setStatusModal(null); setStatusPhotoFiles(null);}} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {/* חלון בחירת הסטטוס הראשוני */}
                    {statusModal && !signRequirement && (
                        <div className="fixed inset-0 bg-black/80 flex flex-col justify-center items-center p-4 z-[60]" onClick={() => setStatusModal(null)}>
                            <div className="glass w-full max-w-sm rounded-[2rem] p-6 shadow-2xl border-t-[6px]" style={{ borderColor: appColor }} onClick={e=>e.stopPropagation()}>
                                <h3 className="text-center text-slate-400 text-xs font-bold uppercase">{statusModal.projName}</h3><h2 className="text-center text-2xl font-black text-white mb-6 border-b border-white/10 pb-4">{statusModal.stageLabel}</h2>
                                <div className="space-y-3">
                                    {[ {code: 0, label: statusLabels[0], color: "status-0"}, {code: 1, label: statusLabels[1], color: "status-1"}, {code: 2, label: statusLabels[2], color: "status-2"}, {code: 3, label: statusLabels[3], color: "status-3"} ].map(opt => (
                                        <button key={opt.code} onClick={() => { if (opt.code !== statusModal.currentCode) setSignRequirement({ projId: statusModal.projId, stageId: statusModal.stageId, code: opt.code, stageLabel: statusModal.stageLabel, projName: statusModal.projName, newStatus: opt.label }); else setStatusModal(null); }} className={`w-full py-4 rounded-xl font-black text-lg flex justify-center shadow-md ${opt.color}`}>{opt.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* חלונות הוספה ושיבוץ */}
                    {(showAddProject || editProjectModal) && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-[100] p-4">
                            <form onSubmit={(e) => {
                                e.preventDefault(); const fd = new FormData(e.target);
                                const data = { name: fd.get('name'), address: fd.get('address'), clientPhone: fd.get('clientPhone') };
                                if(editProjectModal) { db.collection("projects").doc(editProjectModal.id).update(data); setEditProjectModal(null); }
                                else { db.collection("projects").add({...data, createdAt: new Date().toISOString(), statuses: {}, isFinished: false, assignedUsers: []}); setShowAddProject(false); }
                            }} className="glass w-full max-w-md rounded-[2rem] p-6 border-t-[6px]" style={{borderColor: appColor}}>
                                <h2 className="text-white text-2xl font-black mb-6">{editProjectModal ? '✏️ עריכת פרויקט' : '➕ פרויקט חדש'}</h2>
                                <div className="space-y-4 mb-6">
                                    <input name="name" defaultValue={editProjectModal?.name||''} placeholder="שם הפרויקט" required className="w-full p-4 bg-black/40 text-white rounded-xl border border-white/10" />
                                    <input name="address" defaultValue={editProjectModal?.address||''} placeholder="כתובת / Waze" required className="w-full p-4 bg-black/40 text-white rounded-xl border border-white/10" />
                                    <input name="clientPhone" defaultValue={editProjectModal?.clientPhone||''} type="tel" placeholder="טלפון לקוח (לדוגמה: 0501234567)" className="w-full p-4 bg-black/40 text-white rounded-xl border border-white/10 dir-ltr text-right" />
                                </div>
                                <div className="flex gap-3"><button type="submit" className="flex-1 theme-bg text-white py-4 rounded-xl font-black">שמור</button><button type="button" onClick={()=>{setShowAddProject(false);setEditProjectModal(null)}} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {assignModal && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-[100] p-4">
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const selected = Array.from(e.target.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                                db.collection("projects").doc(assignModal.id).update({ assignedUsers: selected });
                                setAssignModal(null);
                            }} className="glass w-full max-w-sm rounded-[2rem] p-6 border-t-[6px]" style={{borderColor: appColor}}>
                                <h2 className="text-white text-xl font-black mb-4">👥 שיבוץ צוות</h2>
                                <div className="max-h-[50vh] overflow-y-auto space-y-2 mb-6 bg-black/30 p-2 rounded-xl border border-white/5">
                                    {users.filter(u=>u.role!=='accounting').map(u => (
                                        <label key={u.id} className="flex items-center gap-3 p-3 bg-black/40 rounded-lg cursor-pointer">
                                            <input type="checkbox" value={u.id} defaultChecked={assignModal.users.includes(u.id)} className="w-5 h-5 accent-blue-500" />
                                            <div className="text-white font-bold text-sm">{u.name}</div>
                                        </label>
                                    ))}
                                </div>
                                <div className="flex gap-3"><button type="submit" className="flex-1 theme-bg text-white py-4 rounded-xl font-black">שמור</button><button type="button" onClick={()=>setAssignModal(null)} className="px-6 text-slate-400 font-bold">ביטול</button></div>
                            </form>
                        </div>
                    )}

                    {callTeamModal && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-[100] p-4" onClick={()=>setCallTeamModal(null)}>
                            <div className="glass w-full max-w-sm rounded-[2rem] p-6 border-t-[6px] border-indigo-500" onClick={e=>e.stopPropagation()}>
                                <h2 className="text-white text-xl font-black mb-6 text-center">📞 בחירת חיוג</h2>
                                <div className="space-y-3 mb-6">
                                    {callTeamModal.team.map(u => (
                                        <div key={u.id} className="flex items-center justify-between p-3 bg-black/40 rounded-xl border border-white/5">
                                            <div className="text-white font-bold">{u.name}</div>
                                            {u.phone ? <a href={`tel:${u.phone}`} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-black text-sm">חייג</a> : <span className="text-slate-500 text-xs">לא זמין</span>}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={()=>setCallTeamModal(null)} className="w-full text-slate-400 font-bold py-3 hover:text-white bg-black/30 rounded-xl">סגור</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
