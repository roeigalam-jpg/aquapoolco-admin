<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquapoolco Elite ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; }
        .status-cell:hover { filter: brightness(1.1); border-color: rgba(255,255,255,0.2); }
        
        .status-0 { background-color: #334155; color: #cbd5e1; } 
        .status-1 { background-color: #f59e0b; color: #fff; } 
        .status-2 { background-color: #ef4444; color: #fff; } 
        .status-3 { background-color: #10b981; color: #fff; } 
        .project-closed { opacity: 0.5; filter: grayscale(50%); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [pass, setPass] = useState("");
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            // מודאלים
            const [showAddProject, setShowAddProject] = useState(false);
            const [showAddUser, setShowAddUser] = useState(false);
            const [showAddInventory, setShowAddInventory] = useState(false);
            const [statusModal, setStatusModal] = useState(null);
            
            // מודאל חתימה
            const [signRequirement, setSignRequirement] = useState(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const [signerName, setSignerName] = useState("");
            const [signerId, setSignerId] = useState("");

            // מודאל שיוך חומרים
            const [materialsModal, setMaterialsModal] = useState(null);

            useEffect(() => {
                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists && doc.data().stages) setStages(doc.data().stages);
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("users").onSnapshot(snapshot => {
                    setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("inventory").onSnapshot(snapshot => {
                    setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, []);

            useEffect(() => {
                if (signRequirement && canvasRef.current) {
                    sigPad.current = new SignaturePad(canvasRef.current, { backgroundColor: 'rgb(255, 255, 255)' });
                }
            }, [signRequirement]);

            const handleLogin = () => {
                if (pass === "2026") {
                    setCurrentUser({ name: "רועי (מנכ''ל)", role: "admin", teamName: "הנהלה" });
                    return;
                }
                const userDoc = users.find(u => u.pin === pass);
                if (userDoc) {
                    setCurrentUser(userDoc);
                } else {
                    alert("שגיאה בפרטי ההתחברות");
                }
            };

            const confirmSignatureAndStatus = () => {
                if (!signerName || signerName.length < 2) return alert("יש להזין שם מלא");
                if (!signerId || signerId.length !== 9 || isNaN(signerId)) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                if (sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס");

                db.collection("projects").doc(signRequirement.projId).update({
                    [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                    [`signatures.${signRequirement.stageId}`]: {
                        name: signerName,
                        id: signerId,
                        date: new Date().toISOString(),
                        signatureData: sigPad.current.toDataURL()
                    }
                });

                setSignRequirement(null);
                setStatusModal(null);
                setSignerName("");
                setSignerId("");
            };

            const handleAllocateMaterial = (e) => {
                e.preventDefault();
                const invId = e.target.item.value;
                const qty = Number(e.target.qty.value);
                
                const item = inventory.find(i => i.id === invId);
                if(!item || item.quantity < qty) return alert("אין מספיק מלאי במחסן!");

                db.collection("inventory").doc(invId).update({ quantity: item.quantity - qty });
                
                const proj = projects.find(p => p.id === materialsModal.id);
                const currentMaterials = proj.allocatedMaterials || [];
                db.collection("projects").doc(proj.id).update({
                    allocatedMaterials: [...currentMaterials, { name: item.name, quantity: qty, date: new Date().toISOString() }]
                });
                alert("החומר שויך בהצלחה וירד מהמלאי!");
                setMaterialsModal(null);
            };

            // סינון פרויקטים בטוח - מוגן מפני קריסה כשהמשתמש לא מחובר
            const filteredProjects = projects.filter(p => {
                const pName = p.name || "";
                const pAddress = p.address || "";
                const matchesSearch = pName.includes(searchTerm) || pAddress.includes(searchTerm);
                if (!matchesSearch) return false;
                
                if (currentUser && currentUser.role === 'worker') {
                    return p.team === currentUser.teamName;
                }
                return true; 
            });

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass p-12 rounded-[2rem] w-full max-w-sm text-center border-t-4 border-blue-500 shadow-2xl">
                            <div className="flex justify-center mb-6">
                                <img src={LOGO_URL} alt="Logo" className="h-20 object-contain rounded-xl bg-white p-2 shadow-lg" onError={(e) => { e.target.style.display='none'; }} />
                            </div>
                            <h1 className="text-2xl font-black mb-1 text-white">מערכת ERP</h1>
                            <p className="text-blue-500 font-bold mb-8 uppercase text-xs tracking-widest">אקוופולקו חן בע"מ</p>
                            <input type="password" placeholder="הזן קוד גישה למערכת" onChange={e=>setPass(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-6 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold" />
                            <button onClick={handleLogin} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black transition-all shadow-lg">התחברות למערכת</button>
                        </div>
                    </div>
                );
            }

            const roleLabels = { admin: "מנכ''ל", warehouse: "מנהל מחסן", driver: "נהג חלוקה", worker: "צוות ביצוע" };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass px-6 py-4 flex justify-between items-center sticky top-0 z-30 overflow-x-auto border-b border-white/5">
                        <div className="flex items-center gap-6 min-w-max">
                            <div className="flex items-center gap-4 border-l border-white/10 pl-6">
                                <img src={LOGO_URL} alt="Logo" className="h-10 bg-white rounded p-1 object-contain" onError={(e) => e.target.style.display='none'} />
                                <div>
                                    <div className="text-lg font-black text-white leading-tight">אקוופולקו חן בע"מ</div>
                                    <div className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">שלום רועי | מחובר כ: {roleLabels[currentUser.role]}</div>
                                </div>
                            </div>
                            <nav className="flex gap-2">
                                <button onClick={() => setActiveTab("board")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'board' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📊 לוח עבודה</button>
                                {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                    <button onClick={() => setActiveTab("inventory")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'inventory' ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📦 מלאי מחסן</button>
                                )}
                                {currentUser.role === 'admin' && (
                                    <>
                                        <button onClick={() => setActiveTab("finance")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'finance' ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>💰 כספים</button>
                                        <button onClick={() => setActiveTab("users")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'users' ? 'bg-purple-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>👥 הרשאות</button>
                                        <button onClick={() => setActiveTab("settings")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'settings' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>⚙️ הגדרות לוח</button>
                                    </>
                                )}
                            </nav>
                        </div>
                        <div className="flex gap-4 items-center min-w-max pr-4">
                            {currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold shadow-lg transition-all text-sm">➕ פרויקט חדש</button>}
                            <button onClick={() => setCurrentUser(null)} className="text-slate-500 hover:text-white font-bold text-sm transition-colors">התנתק</button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 md:p-8">
                        
                        {activeTab === "board" && (
                            <div className="animate-fade-in max-w-[1600px] mx-auto">
                                <div className="flex justify-between items-end mb-6 gap-4 flex-wrap">
                                    <input type="text" placeholder="🔍 חפש פרויקט או עיר..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500 w-full md:w-80 font-bold" />
                                </div>

                                <div className="table-container bg-[#1e293b]/50 shadow-2xl">
                                    <table className="w-full text-right">
                                        <thead>
                                            <tr>
                                                <th className="w-2"></th>
                                                <th className="min-w-[250px]">שם פרויקט ומיקום</th>
                                                <th className="min-w-[120px]">צוות מבצע</th>
                                                {stages.map(s => <th key={s.id} className="text-center">{s.label}</th>)}
                                                <th>התקדמות</th>
                                                <th className="text-center">פעולות שטח</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredProjects.map(proj => {
                                                const doneCount = stages.filter(s => proj.statuses && proj.statuses[s.id] === 3).length;
                                                const progress = stages.length ? Math.round((doneCount / stages.length) * 100) : 0;
                                                
                                                return (
                                                    <tr key={proj.id} className={`group transition-colors ${proj.isClosed ? 'project-closed bg-black/30' : ''}`}>
                                                        <td className={`border-r-4 ${proj.isClosed ? 'border-slate-600' : 'border-blue-500'}`}></td>
                                                        <td>
                                                            <div className="font-black text-white text-lg flex items-center gap-2">
                                                                {proj.isClosed && "🔒"} {proj.name}
                                                            </div>
                                                            <div className="flex items-center gap-2 mt-1">
                                                                <span className="text-xs text-slate-400">📍 {proj.address}</span>
                                                                <a href={`https://waze.com/ul?q=${encodeURIComponent(proj.address)}`} target="_blank" className="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-2 py-0.5 rounded text-[10px] font-bold transition flex items-center gap-1">🚗 ניווט Waze</a>
                                                            </div>
                                                        </td>
                                                        <td><div className="bg-slate-800 text-slate-300 px-3 py-1 rounded-full text-xs font-bold inline-block border border-white/5">👷 {proj.team}</div></td>
                                                        
                                                        {stages.map(stage => {
                                                            const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                                                            const color = code === 3 ? "bg-[#10b981] text-white shadow-lg shadow-emerald-500/20" : code === 2 ? "bg-[#ef4444] text-white" : code === 1 ? "bg-[#f59e0b] text-white" : "bg-[#334155] text-slate-300";
                                                            const label = code === 3 ? "בוצע ✓" : code === 2 ? "מעוכב" : code === 1 ? "בתהליך" : "טרם התחיל";
                                                            
                                                            return (
                                                                <td key={stage.id} onClick={() => { 
                                                                    if(proj.isClosed) return;
                                                                    if(currentUser.role === 'driver') return alert("לנהגים אין הרשאה לעדכון סטטוס");
                                                                    setStatusModal({ projId: proj.id, stageId: stage.id, projName: proj.name, stageLabel: stage.label, currentCode: code });
                                                                }}>
                                                                    <div className={`status-cell ${color}`}>{label}</div>
                                                                </td>
                                                            );
                                                        })}
                                                        
                                                        <td className="px-4">
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-xs font-bold w-8 text-slate-300">{progress}%</span>
                                                                <div className="flex-1 bg-slate-800 rounded-full h-2 overflow-hidden border border-white/5">
                                                                    <div className={`h-full rounded-full transition-all duration-700 ${progress===100?'bg-emerald-500':'bg-blue-500'}`} style={{width:`${progress}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="text-center">
                                                            <div className="flex justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                                                    <button onClick={() => setMaterialsModal(proj)} title="שיוך חומרים מהמחסן" className="p-2 bg-slate-800 hover:bg-amber-600 rounded-lg transition border border-white/5">📦</button>
                                                                )}
                                                                {currentUser.role === 'admin' && (
                                                                    <>
                                                                        <button onClick={() => {db.collection("projects").doc(proj.id).update({ isClosed: !proj.isClosed })}} title={proj.isClosed ? "פתיחה מחדש" : "העבר לארכיון"} className="p-2 bg-slate-800 hover:bg-slate-600 rounded-lg transition border border-white/5">{proj.isClosed ? "🔓" : "🔒"}</button>
                                                                    </>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === "inventory" && (
                            <div className="max-w-5xl mx-auto glass p-8 rounded-[2rem] border-t-4 border-amber-500">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-3xl font-black text-white">📦 ניהול מלאי חומרים</h2>
                                    <button onClick={() => setShowAddInventory(true)} className="bg-amber-600 hover:bg-amber-500 text-white px-6 py-2 rounded-xl font-bold transition">➕ פריט חדש</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-slate-900/50 p-6 rounded-2xl border border-white/5 flex flex-col justify-between">
                                            <div>
                                                <h3 className="text-xl font-bold text-white mb-1">{item.name}</h3>
                                                <p className="text-sm text-slate-400 mb-4">{item.category}</p>
                                            </div>
                                            <div className="flex items-center justify-between bg-slate-800 p-3 rounded-xl border border-white/5">
                                                <button onClick={() => db.collection("inventory").doc(item.id).update({ quantity: Math.max(0, item.quantity - 1) })} className="w-10 h-10 bg-slate-700 rounded-lg font-black hover:bg-red-500 transition">-</button>
                                                <span className={`text-2xl font-black ${item.quantity <= 5 ? 'text-red-500' : 'text-white'}`}>{item.quantity}</span>
                                                <button onClick={() => db.collection("inventory").doc(item.id).update({ quantity: item.quantity + 1 })} className="w-10 h-10 bg-slate-700 rounded-lg font-black hover:bg-green-500 transition">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === "users" && currentUser.role === 'admin' && (
                            <div className="max-w-4xl mx-auto glass p-8 rounded-[2rem] border-t-4 border-purple-500">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-3xl font-black text-white">👥 הרשאות צוותים ומנהלים</h2>
                                    <button onClick={() => setShowAddUser(true)} className="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold">➕ עובד חדש</button>
                                </div>
                                <div className="space-y-3">
                                    {users.map(u => (
                                        <div key={u.id} className="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl border border-white/5">
                                            <div>
                                                <div className="font-bold text-white text-lg">{u.name}</div>
                                                <div className="text-xs text-slate-400">קוד גישה: {u.pin} | הרשאה: {roleLabels[u.role]} {u.role === 'worker' ? `(${u.teamName})` : ''}</div>
                                            </div>
                                            <button onClick={() => {if(window.confirm('למחוק משתמש?')) db.collection('users').doc(u.id).delete()}} className="text-red-400 font-bold px-4 py-2 bg-red-400/10 rounded-lg">מחק</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                    </main>

                    {statusModal && !signRequirement && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={() => setStatusModal(null)}>
                            <div className="glass p-8 rounded-[2rem] w-full max-w-sm" onClick={e=>e.stopPropagation()}>
                                <h3 className="text-center text-slate-400 text-sm font-bold">{statusModal.projName}</h3>
                                <h2 className="text-center text-2xl font-black text-white mb-6 border-b border-white/10 pb-4">{statusModal.stageLabel}</h2>
                                <div className="space-y-3">
                                    {[
                                        {code: 0, label: "טרם התחיל", color: "status-0"},
                                        {code: 1, label: "בתהליך", color: "status-1"},
                                        {code: 2, label: "מעוכב ⚠️", color: "status-2"},
                                        {code: 3, label: "בוצע ✓", color: "status-3"}
                                    ].map(opt => (
                                        <button key={opt.code} onClick={() => {
                                            if (opt.code !== statusModal.currentCode) {
                                                setSignRequirement({ projId: statusModal.projId, stageId: statusModal.stageId, code: opt.code, stageLabel: statusModal.stageLabel, newStatus: opt.label });
                                            } else {
                                                setStatusModal(null);
                                            }
                                        }} className={`w-full py-4 rounded-xl font-black text-lg ${opt.color} ${statusModal.currentCode===opt.code?'ring-4 ring-white':''}`}>{opt.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {signRequirement && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="glass p-8 rounded-[2rem] w-full max-w-md border-t-4 border-blue-500 shadow-2xl">
                                <h2 className="text-white text-center text-2xl font-black mb-2">אישור ושינוי סטטוס</h2>
                                <p className="text-center text-slate-400 text-sm mb-6 border-b border-white/10 pb-4">
                                    משנה סטטוס של <span className="text-white font-bold">{signRequirement.stageLabel}</span> ל-<span className="text-blue-400 font-bold">{signRequirement.newStatus}</span>
                                </p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs text-slate-400 font-bold mb-1 block">שם מלא של מאשר הסטטוס</label>
                                        <input value={signerName} onChange={e=>setSignerName(e.target.value)} placeholder="לדוגמה: ישראל ישראלי" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none border border-slate-700 focus:border-blue-500" required />
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-400 font-bold mb-1 block">מספר תעודת זהות (9 ספרות)</label>
                                        <input type="text" maxLength="9" value={signerId} onChange={e=>setSignerId(e.target.value.replace(/\D/g,''))} placeholder="000000000" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none border border-slate-700 focus:border-blue-500 tracking-widest text-center text-xl font-bold" required />
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-400 font-bold mb-1 block flex justify-between">
                                            <span>חתימה אישית חובה:</span>
                                            <span onClick={() => sigPad.current.clear()} className="text-blue-400 underline cursor-pointer">נקה</span>
                                        </label>
                                        <canvas ref={canvasRef} className="signature-pad w-full h-40" />
                                    </div>
                                </div>
                                <div className="flex gap-3 pt-6 mt-6 border-t border-white/10">
                                    <button onClick={confirmSignatureAndStatus} className="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black transition">חתום ואשר שינוי</button>
                                    <button onClick={() => {setSignRequirement(null); setStatusModal(null);}} className="px-6 text-slate-400 hover:text-white font-bold">ביטול</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {materialsModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="glass p-8 rounded-[2rem] w-full max-w-md">
                                <h2 className="text-white text-2xl font-black mb-2">📦 שיוך חומרים מהמחסן</h2>
                                <p className="text-slate-400 text-sm mb-6 border-b border-white/10 pb-4">פרויקט: <span className="text-white">{materialsModal.name}</span></p>
                                
                                <form onSubmit={handleAllocateMaterial} className="space-y-4 mb-8">
                                    <select name="item" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-slate-700 focus:border-amber-500 font-bold" required>
                                        <option value="">-- בחר פריט מהמלאי --</option>
                                        {inventory.filter(i => i.quantity > 0).map(i => (
                                            <option key={i.id} value={i.id}>{i.name} (במלאי: {i.quantity})</option>
                                        ))}
                                    </select>
                                    <input name="qty" type="number" min="1" placeholder="כמות לשיוך לאתר" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                    <button type="submit" className="w-full bg-amber-600 hover:bg-amber-500 text-white py-4 rounded-xl font-bold transition">משוך מהמחסן ושייך לאתר</button>
                                </form>

                                <div className="bg-slate-900/50 p-4 rounded-xl border border-white/5">
                                    <h4 className="text-xs font-bold text-slate-400 uppercase mb-3">חומרים ששויכו עד כה:</h4>
                                    <ul className="space-y-2 text-sm">
                                        {materialsModal.allocatedMaterials && materialsModal.allocatedMaterials.length > 0 ? 
                                            materialsModal.allocatedMaterials.map((m, i) => (
                                                <li key={i} className="flex justify-between items-center bg-slate-800 p-2 rounded">
                                                    <span className="text-white font-bold">{m.name}</span>
                                                    <span className="text-amber-400 font-black">x{m.quantity}</span>
                                                </li>
                                            )) : 
                                            <li className="text-slate-500">טרם שויכו חומרים.</li>
                                        }
                                    </ul>
                                </div>
                                
                                <button onClick={()=>setMaterialsModal(null)} className="w-full mt-6 text-slate-400 font-bold">סגור חלון</button>
                            </div>
                        </div>
                    )}

                    {showAddUser && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <form onSubmit={e => { e.preventDefault(); db.collection("users").add({ name: e.target.n.value, pin: e.target.p.value, role: e.target.r.value, teamName: e.target.t?.value || '' }); setShowAddUser(false); }} className="glass p-8 rounded-[2rem] w-full max-w-sm space-y-4">
                                <h2 className="text-white text-2xl font-black">משתמש/צוות חדש</h2>
                                <input name="n" placeholder="שם העובד / קבלן" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                <input name="p" placeholder="קוד PIN סודי" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                <select name="r" id="roleSelect" onChange={(e) => document.getElementById('teamInput').style.display = e.target.value === 'worker' ? 'block' : 'none'} className="w-full p-4 bg-slate-900 text-white rounded-xl border border-slate-700">
                                    <option value="worker">צוות שטח / קבלן ביצוע</option>
                                    <option value="driver">נהג חלוקה (צופה ומנווט בלבד)</option>
                                    <option value="warehouse">מנהל מחסן</option>
                                    <option value="admin">מנהל מערכת (גישה מלאה)</option>
                                </select>
                                <input id="teamInput" name="t" placeholder="לאיזה צוות לשייך? (למשל: 'צוות א')" className="w-full p-4 bg-slate-900 text-white rounded-xl border border-blue-500" required />
                                <button type="submit" className="w-full bg-purple-600 text-white py-4 rounded-xl font-bold">צור הרשאה</button>
                                <button type="button" onClick={()=>setShowAddUser(false)} className="w-full text-slate-400 font-bold">ביטול</button>
                            </form>
                        </div>
                    )}

                    {showAddProject && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <form onSubmit={e => { e.preventDefault(); db.collection("projects").add({ name: e.target.n.value, address: e.target.a.value, team: e.target.t.value, statuses: {}, isClosed: false, createdAt: firebase.firestore.Timestamp.now() }).then(() => setShowAddProject(false)); }} className="glass p-10 rounded-[2rem] w-full max-w-md space-y-5 border-t-4 border-blue-500 shadow-2xl">
                                <h2 className="text-white text-center text-2xl font-black mb-6">פתיחת תיק פרויקט באתר</h2>
                                <div>
                                    <label className="text-xs text-slate-400 font-bold">שם הלקוח</label>
                                    <input name="n" placeholder="משפחת לוי" className="w-full p-4 mt-1 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                </div>
                                <div>
                                    <label className="text-xs text-blue-400 font-bold">* חובה להזין כתובת מדויקת לניווט</label>
                                    <input name="a" placeholder="לדוגמה: רחוב הרצל 15, כפר סבא" minLength="5" className="w-full p-4 mt-1 bg-slate-900 text-white rounded-xl border border-blue-500 focus:ring-2 focus:ring-blue-500" required />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-400 font-bold">צוות משויך</label>
                                    <input name="t" placeholder="למשל: 'צוות א' (חייב לתאום לשם בניהול משתמשים)" className="w-full p-4 mt-1 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black mt-4">הקם פרויקט חדש</button>
                                <button type="button" onClick={()=>setShowAddProject(false)} className="w-full text-slate-400 font-bold hover:text-white">ביטול</button>
                            </form>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
