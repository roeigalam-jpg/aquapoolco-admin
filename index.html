<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        /* כפתורי סטטוס שמותאמים גם למגע באצבע (מובייל) */
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 3rem; }
        .status-cell:active { transform: scale(0.95); }
        
        .status-0 { background-color: #334155; color: #cbd5e1; } 
        .status-1 { background-color: #f59e0b; color: #fff; } 
        .status-2 { background-color: #ef4444; color: #fff; } 
        .status-3 { background-color: #10b981; color: #fff; } 

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
        .dir-ltr { direction: ltr; }
        
        /* הסתרת כפתורי גלילה מהירה למובייל בתפריט העליון */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("system-ui");
            const [portalName, setPortalName] = useState("אקוופולקו חן בע\"מ");
            const [officeEmail, setOfficeEmail] = useState("info@aquapoolco.co.il");
            
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [showAddUser, setShowAddUser] = useState(false);
            const [editUserModal, setEditUserModal] = useState(null);
            const [assignModal, setAssignModal] = useState(null); 
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            
            const [statusModal, setStatusModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null); 
            
            const [signRequirement, setSignRequirement] = useState(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const [signerName, setSignerName] = useState("");
            const [signerId, setSignerId] = useState("");

            const [materialsModal, setMaterialsModal] = useState(null);

            useEffect(() => {
                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appFont) setAppFont(d.appFont);
                        if (d.portalName) setPortalName(d.portalName);
                        if (d.officeEmail) setOfficeEmail(d.officeEmail);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("users").onSnapshot(snapshot => {
                    setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("inventory").onSnapshot(snapshot => {
                    setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, []);

            useEffect(() => {
                if (signRequirement && canvasRef.current) {
                    // הגדרת חתימה למובייל
                    sigPad.current = new SignaturePad(canvasRef.current, { backgroundColor: 'rgb(255, 255, 255)' });
                    
                    // תיקון קנה מידה במובייל לחתימה חלקה
                    const resizeCanvas = () => {
                        const canvas = canvasRef.current;
                        if(canvas) {
                            const ratio =  Math.max(window.devicePixelRatio || 1, 1);
                            canvas.width = canvas.offsetWidth * ratio;
                            canvas.height = canvas.offsetHeight * ratio;
                            canvas.getContext("2d").scale(ratio, ratio);
                            sigPad.current.clear();
                        }
                    };
                    window.addEventListener("resize", resizeCanvas);
                    resizeCanvas();
                    return () => window.removeEventListener("resize", resizeCanvas);
                }
            }, [signRequirement]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    setCurrentUser({ id: "admin-roei", name: "רועי גלם (מנכ''ל)", username: "roeigalam", role: "admin" });
                    return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) setCurrentUser(userDoc);
                else alert("שם משתמש או סיסמה שגויים. נסה שנית.");
            };

            const exportPDF = (proj, callback = null) => {
                const element = document.createElement('div');
                const teamNames = (Array.isArray(proj.assignedUsers) && proj.assignedUsers.length > 0) 
                    ? proj.assignedUsers.map(uid => { const u = users.find(x=>x.id===uid); return u ? u.name : ''; }).filter(Boolean).join(', ')
                    : 'טרם שובץ צוות';

                let milestonesHtml = stages.map(stage => {
                    const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                    const sig = proj.signatures && proj.signatures[stage.id];
                    let signatureImage = '';
                    if (sig && sig.signatureData) {
                        signatureImage = `<tr><td colspan="4" style="text-align:center; padding: 10px; border-bottom: 1px solid #ddd;"><img src="${sig.signatureData}" style="max-height: 80px; border: 1px solid #ccc; border-radius: 4px;" crossorigin="anonymous" /></td></tr>`;
                    }
                    return `
                        <tr>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold;">${stage.label}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${statusLabels[code]}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${sig ? `${sig.name}<br/><span style="color:gray; font-size: 10px;">ת.ז: ${sig.id}</span>` : '-'}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${sig ? new Date(sig.date).toLocaleString('he-IL') : '-'}</td>
                        </tr>
                        ${signatureImage}
                    `;
                }).join('');

                element.innerHTML = `
                    <div style="direction: rtl; font-family: Arial, sans-serif; padding: 40px; color: #333; letter-spacing: 0px; word-spacing: 2px;">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <img src="${LOGO_URL}" style="max-height: 100px;" crossorigin="anonymous" />
                        </div>
                        <h1 style="color: ${appColor}; text-align: center; border-bottom: 2px solid ${appColor}; padding-bottom: 10px; font-size: 24px;">${portalName} - דוח סטטוס פרויקט</h1>
                        <h2 style="text-align: center; margin-top: 20px; font-size: 20px;">פרויקט: ${proj.name}</h2>
                        
                        <div style="background-color: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 14px; border: 1px solid #e2e8f0;">
                            <p style="margin: 5px 0;"><strong>כתובת האתר:</strong> ${proj.address}</p>
                            <p style="margin: 5px 0;"><strong>צוות מבצע:</strong> ${teamNames}</p>
                            <p style="margin: 5px 0;"><strong>תאריך הפקת דוח:</strong> ${new Date().toLocaleString('he-IL')}</p>
                        </div>

                        <h3 style="color: #475569; margin-bottom: 15px; font-size: 16px;">פירוט אבני דרך וחתימות:</h3>
                        <table style="width: 100%; border-collapse: collapse; text-align: right; border: 1px solid #e2e8f0; font-size: 14px;">
                            <thead>
                                <tr style="background-color: ${appColor}; color: white;">
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">שלב עבודה</th>
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">סטטוס</th>
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">מאשר</th>
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">תאריך</th>
                                </tr>
                            </thead>
                            <tbody>${milestonesHtml}</tbody>
                        </table>
                        <p style="text-align: center; margin-top: 40px; font-size: 12px; color: #94a3b8;">הופק אוטומטית באמצעות מערכת ה-ERP של ${portalName}</p>
                    </div>
                `;

                const opt = { margin: 10, filename: `דוח_פרויקט_${proj.name.replace(/ /g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                html2pdf().set(opt).from(element).save().then(() => { if (callback) callback(); });
            };

            const confirmSignatureAndStatus = () => {
                if (!signerName || signerName.length < 2) return alert("יש להזין שם מלא");
                if (!signerId || signerId.length !== 9 || isNaN(signerId)) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                if (sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס");

                db.collection("projects").doc(signRequirement.projId).update({
                    [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                    [`signatures.${signRequirement.stageId}`]: { name: signerName, id: signerId, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() }
                });

                setSignRequirement(null); setStatusModal(null); setSignerName(""); setSignerId("");
            };

            const handleAllocateMaterial = (e) => {
                e.preventDefault();
                const invId = e.target.item.value; const qty = Number(e.target.qty.value);
                const item = inventory.find(i => i.id === invId);
                if(!item || item.quantity < qty) return alert("אין מספיק מלאי במחסן!");

                db.collection("inventory").doc(invId).update({ quantity: item.quantity - qty });
                const proj = projects.find(p => p.id === materialsModal.id);
                const currentMaterials = proj.allocatedMaterials || [];
                db.collection("projects").doc(proj.id).update({
                    allocatedMaterials: [...currentMaterials, { id: Date.now().toString(), name: item.name, quantity: qty, date: new Date().toISOString(), status: 'pending' }]
                });
                alert("החומר שויך בהצלחה ונשלחה משימה לנהג!");
                setMaterialsModal(null);
            };

            const markMaterialDelivered = (projId, matId) => {
                const proj = projects.find(p => p.id === projId);
                const updatedMaterials = proj.allocatedMaterials.map(m => m.id === matId ? { ...m, status: 'delivered', deliveryDate: new Date().toISOString() } : m);
                db.collection("projects").doc(projId).update({ allocatedMaterials: updatedMaterials });
            };

            const confirmFinishProject = (e) => {
                e.preventDefault();
                let phone = e.target.phone.value.replace(/\D/g, ''); 
                if (phone.startsWith('0')) phone = '972' + phone.substring(1);
                
                const proj = projects.find(p => p.id === finishModal.id);
                db.collection("projects").doc(finishModal.id).update({ isFinished: true, finishedAt: new Date().toISOString() });
                
                const message = `שלום,\n\nאנו שמחים לעדכן כי הפרויקט ${finishModal.name} סומן כ"הסתיים" במערכת.\nמצורף בזה דוח הסטטוס המסכם של הפרויקט.\n\nבברכה,\n${portalName}`;
                let waLink = `https://wa.me/?text=${encodeURIComponent(message)}`;
                if (phone && phone.length > 8) waLink = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
                
                exportPDF(proj, () => { window.location.href = waLink; });
                setFinishModal(null);
            };

            const deleteProject = (projId) => { if (window.confirm("מחיקה לצמיתות!! להמשיך?")) db.collection("projects").doc(projId).delete(); };
            const handleFinanceChange = (projId, field, value) => { db.collection("projects").doc(projId).update({ [field]: Number(value) }); };

            const filteredProjects = projects.filter(p => {
                const searchStr = String(searchTerm || "");
                const matchesSearch = String(p.name || "").includes(searchStr) || String(p.address || "").includes(searchStr);
                if (!matchesSearch) return false;
                if (currentUser && currentUser.role === 'worker') return Array.isArray(p.assignedUsers) && p.assignedUsers.includes(currentUser.id);
                return true; 
            });

            const activeProjectsList = filteredProjects.filter(p => !p.isFinished);
            const finishedProjectsList = filteredProjects.filter(p => p.isFinished);
            const roleLabels = { admin: "מנהל מערכת", warehouse: "מנהל מחסן", driver: "נהג חלוקה", worker: "צוות שטח" };

            const getCheckedValues = (formElement, inputName) => {
                const inputs = formElement[inputName]; let assigned = [];
                if (inputs) {
                    if (inputs.length === undefined) { if (inputs.checked) assigned.push(inputs.value); } 
                    else { assigned = Array.from(inputs).filter(i => i.checked).map(i => i.value); }
                }
                return assigned;
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <style>{`body { font-family: ${appFont}, sans-serif !important; } .theme-bg { background-color: ${appColor} !important; } .theme-text { color: ${appColor} !important; }`}</style>
                        <form onSubmit={handleLogin} className="glass p-10 md:p-12 rounded-[2rem] w-full max-w-sm text-center shadow-2xl relative overflow-hidden" style={{ borderTop: `4px solid ${appColor}` }}>
                            <div className="flex justify-center mb-6">
                                <img src={LOGO_URL} alt="Logo" className="h-24 w-auto object-contain rounded-2xl bg-white p-3 shadow-lg" onError={(e) => { e.target.style.display='none'; }} />
                            </div>
                            <h1 className="text-2xl font-black mb-1 text-white">התחברות לאפליקציה</h1>
                            <p className="font-bold mb-8 uppercase text-xs tracking-widest theme-text">{portalName}</p>
                            
                            <input type="text" placeholder="שם משתמש" required value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-4 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold text-lg" />
                            <input type="password" placeholder="סיסמה" required value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-8 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold text-lg" />
                            
                            <button type="submit" className="w-full text-white py-4 rounded-xl font-black transition-all shadow-lg theme-bg filter hover:brightness-110 text-lg">כניסה למערכת</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <style>{`
                        :root { --theme-color: ${appColor}; --theme-font: ${appFont}; }
                        body { font-family: var(--theme-font), sans-serif !important; }
                        .theme-bg { background-color: var(--theme-color) !important; color: white !important; }
                        .theme-text { color: var(--theme-color) !important; }
                        .theme-border { border-color: var(--theme-color) !important; }
                    `}</style>

                    {/* תפריט עליון מותאם למובייל - גלילה אופקית מוסתרת */}
                    <header className="glass px-4 py-3 flex flex-col md:flex-row justify-between items-center sticky top-0 z-30 border-b border-white/5 gap-3 shadow-md">
                        <div className="flex w-full justify-between items-center md:w-auto md:border-l border-white/10 pl-6">
                            <div className="flex items-center gap-3">
                                <img src={LOGO_URL} alt="Logo" className="h-10 w-10 bg-white rounded-lg p-1 object-contain shadow-sm" onError={(e) => e.target.style.display='none'} />
                                <div>
                                    <div className="text-base font-black text-white leading-none">{portalName}</div>
                                    <div className="text-[10px] font-bold theme-text mt-1">{currentUser.name} | {roleLabels[currentUser.role]}</div>
                                </div>
                            </div>
                            <div className="flex gap-2 md:hidden">
                                {currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="theme-bg w-10 h-10 flex items-center justify-center rounded-full font-bold shadow-lg text-lg">➕</button>}
                                <button onClick={() => setCurrentUser(null)} className="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-full text-slate-400 font-bold text-sm">🚪</button>
                            </div>
                        </div>

                        <nav className="flex gap-2 w-full overflow-x-auto hide-scroll pb-1 md:w-auto md:pb-0">
                            <button onClick={() => setActiveTab("board")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'board' ? 'theme-bg shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>📊 לוח עבודה</button>
                            <button onClick={() => setActiveTab("archive")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'archive' ? 'bg-slate-700 text-white shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>📁 ארכיון</button>
                            {(currentUser.role === 'admin' || currentUser.role === 'driver') && (
                                <button onClick={() => setActiveTab("deliveries")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'deliveries' ? 'theme-bg shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>🚚 חלוקה</button>
                            )}
                            {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                <button onClick={() => setActiveTab("inventory")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'inventory' ? 'theme-bg shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>📦 מחסן</button>
                            )}
                            {currentUser.role === 'admin' && (
                                <>
                                    <button onClick={() => setActiveTab("finance")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'finance' ? 'theme-bg shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>💰 כספים</button>
                                    <button onClick={() => setActiveTab("users")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'users' ? 'theme-bg shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>👥 משתמשים</button>
                                    <button onClick={() => setActiveTab("settings")} className={`whitespace-nowrap px-5 py-2.5 rounded-xl font-bold transition-all text-sm md:text-base ${activeTab === 'settings' ? 'theme-bg shadow-lg' : 'bg-slate-800 text-slate-300 border border-white/5'}`}>⚙️ הגדרות</button>
                                </>
                            )}
                        </nav>
                        
                        <div className="hidden md:flex gap-4 items-center min-w-max pr-4">
                            {currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="theme-bg px-6 py-2.5 rounded-full font-bold shadow-lg transition-all text-sm filter hover:brightness-110">➕ פרויקט חדש</button>}
                            <button onClick={() => setCurrentUser(null)} className="text-slate-500 hover:text-white font-bold text-sm transition-colors">התנתק</button>
                        </div>
                    </header>

                    <main className="flex-1 p-3 md:p-8">
                        
                        {activeTab === "board" && (
                            <div className="animate-fade-in max-w-[1600px] mx-auto">

                                    <div className="flex gap-2">
                                        <input name="u" placeholder="שם משתמש" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" required />
                                        <input name="p" type="tel" placeholder="סיסמה" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" required />
                                    </div>
                                    <select value={newUserRole} onChange={(e) => setNewUserRole(e.target.value)} className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold">
                                        <option value="worker">צוות שטח (ביצוע בשטח)</option>
                                        <option value="driver">נהג חלוקה</option>
                                        <option value="warehouse">מנהל מחסן</option>
                                        <option value="admin">מנהל מערכת (הכל)</option>
                                    </select>
                                </div>
                                <div className="flex flex-col gap-3 mt-6">
                                    <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg active:scale-95 transition">צור משתמש</button>
                                    <button type="button" onClick={()=>setShowAddUser(false)} className="w-full text-slate-400 font-bold py-2">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* יצירת פרויקט חדש */}
                    {showAddProject && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => { 
                                e.preventDefault(); 
                                const assigned = getCheckedValues(e.target, 'assignedUsers');
                                db.collection("projects").add({ 
                                    name: e.target.n.value, address: e.target.a.value, clientEmail: e.target.e.value, assignedUsers: assigned, statuses: {}, isFinished: false, createdAt: firebase.firestore.Timestamp.now() 
                                }).then(() => setShowAddProject(false)); 
                            }} className="bg-[#1e293b] w-full h-[90vh] md:h-auto md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl flex flex-col" style={{ borderTop: `6px solid ${appColor}` }}>
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden shrink-0"></div>
                                <h2 className="text-white text-2xl font-black mb-5 shrink-0">הקמת פרויקט חדש</h2>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                                    <div><label className="text-[10px] text-slate-400 font-bold uppercase block mb-1">שם פרויקט / לקוח</label><input name="n" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-black text-lg border border-transparent focus:border-blue-500" required /></div>
                                    <div><label className="text-[10px] theme-text font-bold uppercase block mb-1">* כתובת מדוייקת (לניווט בוויז)</label><input name="a" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold border border-transparent focus:theme-border" required /></div>
                                    <div><label className="text-[10px] text-emerald-400 font-bold uppercase block mb-1">אימייל לקוח (לדוחות)</label><input name="e" type="email" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" /></div>
                                    
                                    <div className="pt-2 border-t border-white/5">
                                        <label className="text-[10px] text-amber-400 font-bold uppercase block mb-2">שייך צוות (ניתן לסמן כמה):</label>
                                        <div className="bg-slate-900 rounded-2xl p-2 max-h-40 overflow-y-auto shadow-inner">
                                            {users.length === 0 && <span className="text-slate-500 text-xs p-3 block text-center">אין משתמשים</span>}
                                            {users.map(u => (
                                                <label key={u.id} className="flex items-center gap-3 p-3 cursor-pointer hover:bg-slate-800 rounded-xl transition active:bg-slate-700">
                                                    <input type="checkbox" value={u.id} name="assignedUsers" className="w-5 h-5 rounded accent-blue-500" />
                                                    <div className="flex flex-col">
                                                        <span className="text-white font-bold">{u.name}</span>
                                                        <span className="text-[10px] text-slate-500">{roleLabels[u.role]}</span>
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3 mt-4 pt-4 border-t border-white/10 shrink-0">
                                    <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg active:scale-95 transition shadow-lg">צור פרויקט</button>
                                    <button type="button" onClick={()=>setShowAddProject(false)} className="w-full text-slate-400 font-bold py-2">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
