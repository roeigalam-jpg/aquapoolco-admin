    <style>
        body { color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--app-card-bg, rgba(30, 41, 59, 0.8)); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: var(--app-radius, 1rem); border: 1px solid rgba(255,255,255,0.1); }

        td { padding: 1rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 3.5rem; position: relative; }
        .status-cell.disabled { cursor: not-allowed; opacity: 0.7; }
        .status-cell:not(.disabled):active { transform: scale(0.95); }
        .status-0 { background-color: #334155; color: #cbd5e1; } .status-1 { background-color: #f59e0b; color: #fff; } .status-2 { background-color: #ef4444; color: #fff; } .status-3 { background-color: #10b981; color: #fff; } 
        ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
        .dir-ltr { direction: ltr; } .hide-scroll::-webkit-scrollbar { display: none; } .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drag-handle { cursor: grab; } .drag-handle:active { cursor: grabbing; }
        .pulse-glow { animation: pulseGlow 1.5s infinite; }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 100%; }
        .app-text-normal { font-size: 100%; }
        .app-text-large { font-size: 110%; }
        .app-text-xlarge { font-size: 125%; }

<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // מיתוג LinkBase
        const APP_NAME = "LinkBase";
        const APP_SLOGAN = "הרמוניה תפעולית מוחלטת";
        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/linkbase-icon.jpeg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [verificationModal, setVerificationModal] = useState(null);
            const [verifyPhoneInput, setVerifyPhoneInput] = useState("");
            const [verificationCode, setVerificationCode] = useState("");
            const [generatedCode, setGeneratedCode] = useState(null);
            const [verifyStep, setVerifyStep] = useState(1);
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            
            // Design State
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("'Rubik', sans-serif");
            const [appFontSize, setAppFontSize] = useState("app-text-normal");
            const [appBgColor, setAppBgColor] = useState("#0f172a");
            const [appCardBg, setAppCardBg] = useState("rgba(30, 41, 59, 0.8)");
            const [appRadius, setAppRadius] = useState("1rem");
            
            const [officeEmail, setOfficeEmail] = useState("info@linkbase.co.il");
            
            const [usersTabPassword, setUsersTabPassword] = useState("admin123");
            const [authUsersModal, setAuthUsersModal] = useState(false);
            const [usersPasswordInput, setUsersPasswordInput] = useState("");
            const [isUsersUnlocked, setIsUsersUnlocked] = useState(false);
            
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendanceLogs, setAttendanceLogs] = useState([]);
            
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState(""); 
            
            const [deliveriesView, setDeliveriesView] = useState("pending");

            // גלריה מרוכזת
            const [allPhotos, setAllPhotos] = useState([]);
            const [galleryFilterFolder, setGalleryFilterFolder] = useState("הכל");
            const [mediaPreview, setMediaPreview] = useState(null); // Preview Modal
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [editProjectModal, setEditProjectModal] = useState(null); 
            const [showAddUser, setShowAddUser] = useState(false);
            const [editUserModal, setEditUserModal] = useState(null);
            const [assignModal, setAssignModal] = useState(null); 
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            
            const [statusModal, setStatusModal] = useState(null);
            const [signRequirement, setSignRequirement] = useState(null);
            const [adminOverrideModal, setAdminOverrideModal] = useState(null); // עקיפת מנהל לסטטוס
            
            const [stageHistoryModal, setStageHistoryModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null); 
            const [leaderboardModal, setLeaderboardModal] = useState(false);
            const [callTeamModal, setCallTeamModal] = useState(null);
            
            const [materialsModal, setMaterialsModal] = useState(null);
            const [materialReqType, setMaterialReqType] = useState("stock"); 
            const [materialSignData, setMaterialSignData] = useState(null); 
            
            const [photosModal, setPhotosModal] = useState(null);
            const [currentProjectPhotos, setCurrentProjectPhotos] = useState([]);
            const [activePhotoFolder, setActivePhotoFolder] = useState('כללי');
            
            const [inventoryItemModal, setInventoryItemModal] = useState(null);
            const [invModalTab, setInvModalTab] = useState("gallery"); 
            const [inventoryPhotos, setInventoryPhotos] = useState([]);
            
            const [statusPhotoFiles, setStatusPhotoFiles] = useState(null);
            const [invDeliveryFiles, setInvDeliveryFiles] = useState(null);
            
            const [deliveryModal, setDeliveryModal] = useState(null);
            const [cancelDeliveryModal, setCancelDeliveryModal] = useState(null);
            const [deliveryPhotoFiles, setDeliveryPhotoFiles] = useState(null);

            const [draggedProjId, setDraggedProjId] = useState(null);
            const [draggedDelivId, setDraggedDelivId] = useState(null);
            
            const invSigPad = useRef(null);
            const invCanvasRef = useRef(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            
            const [isUploading, setIsUploading] = useState(false);
            const [isZipLoading, setIsZipLoading] = useState(false);

            const roleLabels = { admin: "מנהל מערכת", accounting: "הנהלת חשבונות", warehouse: "מחסנאי", driver: "נהג חלוקה", worker: "צוות שטח" };
            const projectFolders = ['כללי', ...stages.map(s=>s.label), 'תקלות/תיקונים'];

            const validatePhone = (phone) => /^05\d{8}$/.test(phone);
            const validateTZ = (tz) => /^\d{9}$/.test(tz);

            useEffect(() => { setSearchTerm(""); }, [activeTab]);

            useEffect(() => {
                const savedUser = localStorage.getItem("aquapoolco_user");
                if (savedUser) { try { setCurrentUser(JSON.parse(savedUser)); } catch (e) { localStorage.removeItem("aquapoolco_user"); } }

                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appFont) setAppFont(d.appFont);
                        if (d.appFontSize) setAppFontSize(d.appFontSize);
                        if (d.appBgColor) setAppBgColor(d.appBgColor);
                        if (d.appCardBg) setAppCardBg(d.appCardBg);
                        if (d.appRadius) setAppRadius(d.appRadius);
                        if (d.officeEmail) setOfficeEmail(d.officeEmail);
                        if (d.usersTabPassword) setUsersTabPassword(d.usersTabPassword);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("users").onSnapshot(snapshot => setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("inventory").onSnapshot(snapshot => setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("attendance").orderBy("timestamp", "desc").limit(100).onSnapshot(snapshot => setAttendanceLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
            }, []);

            // שליפת כל התמונות לגלריה המרוכזת
            useEffect(() => {
                let unsub = db.collection("project_photos").orderBy("timestamp", "desc").onSnapshot(snap => {
                    setAllPhotos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                let unsubPhotos = () => {};
                if (photosModal) {
                    unsubPhotos = db.collection("project_photos").where("projId", "==", photosModal.id).orderBy("timestamp", "desc").onSnapshot(snap => {
                        setCurrentProjectPhotos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    });
                }
                return () => unsubPhotos();
            }, [photosModal]);

            useEffect(() => {
                let unsubInvPhotos = () => {};
                if (inventoryItemModal) {
                    unsubInvPhotos = db.collection("inventory_photos").where("inventoryId", "==", inventoryItemModal.id).orderBy("timestamp", "desc").onSnapshot(snap => {
                        setInventoryPhotos(snap.docs.map(d => ({id: d.id, ...d.data()})));
                    });
                }
                return () => unsubInvPhotos();
            }, [inventoryItemModal]);

            useEffect(() => {
                let timeout;
                const resizeCanvas = (ref, padRef) => {
                    if (ref.current) {
                        const canvas = ref.current;
                        const ratio = Math.max(window.devicePixelRatio || 1, 1);
                        canvas.width = canvas.offsetWidth * ratio;
                        canvas.height = canvas.offsetHeight * ratio;
                        canvas.getContext("2d").scale(ratio, ratio);
                        padRef.current = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
                    }
                };
                
                if (signRequirement || materialSignData || deliveryModal || cancelDeliveryModal) timeout = setTimeout(() => resizeCanvas(canvasRef, sigPad), 150);
                if (inventoryItemModal && invModalTab === 'receive') timeout = setTimeout(() => resizeCanvas(invCanvasRef, invSigPad), 150);
                return () => clearTimeout(timeout);
            }, [signRequirement, materialSignData, deliveryModal, cancelDeliveryModal, inventoryItemModal, invModalTab]);

            const addScore = (points) => {
                if (currentUser && currentUser.id && (currentUser.role === 'worker' || currentUser.role === 'driver')) {
                    db.collection("users").doc(currentUser.id).update({ score: firebase.firestore.FieldValue.increment(points) });
                }
            };

            // הורדה מאובטחת למנהל בלבד
            const handleSecureDownload = async (url, filename) => {
                if (currentUser?.role !== 'admin') return;
                try {
                    const res = await fetch(url);
                    const blob = await res.blob();
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    link.click();
                } catch (e) { 
                    alert("שגיאה בהורדה. ייתכן שיש להגדיר חוקי CORS ב-Firebase."); 
                    window.open(url, '_blank');
                }
            };

            // הורדת פרויקט כ-ZIP למנהל בלבד
            const downloadProjectZip = async (projId, projName, folderName = null) => {
                if (currentUser?.role !== 'admin') return;
                setIsZipLoading(true);
                const zip = new JSZip();
                const photosToZip = allPhotos.filter(p => p.projId === projId && (!folderName || p.folder === folderName));
                
                if(photosToZip.length === 0) {
                    alert("אין מדיה להורדה בפרויקט זה.");
                    setIsZipLoading(false);
                    return;
                }

                try {
                    for (let photo of photosToZip) {
                        const res = await fetch(photo.url);
                        const blob = await res.blob();
                        const folder = zip.folder(photo.folder || "כללי");
                        folder.file(`${photo.id}.jpg`, blob);
                    }
                    const content = await zip.generateAsync({type: "blob"});
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `${projName}_${folderName || "ארכיון"}.zip`;
                    link.click();
                } catch(e) {
                    alert("שגיאה ביצירת קובץ ZIP. אנא ודא שחוקי CORS מוגדרים ב-Firebase.");
                }
                setIsZipLoading(false);
            };

            // מחיקת תמונה מהגלריה
            const deletePhoto = async (photoId, isFromModal = false) => {
                if(currentUser?.role !== 'admin') return;
                if(!window.confirm("למחוק תמונה זו מהמערכת? (לא ניתן לשחזר)")) return;
                try {
                    await db.collection("project_photos").doc(photoId).delete();
                    logAttendanceAndLocation("מחיקת תמונה ע\"י מנהל");
                    if(isFromModal) setMediaPreview(null);
                } catch(e) { alert("שגיאה במחיקת התמונה."); }
            };

            // עריכת סטטוס למנהל (ללא צילום וחתימה)
            const adminOverrideStatus = async (projId, stageId, code) => {
                if(currentUser?.role !== 'admin') return;
                try {
                    const historyItem = { stageId: stageId, code: code, remark: "עודכן ידנית ע\"י מנהל", user: currentUser.name, date: new Date().toISOString() };
                    await db.collection("projects").doc(projId).update({
                        [`statuses.${stageId}`]: code,
                        statusHistory: firebase.firestore.FieldValue.arrayUnion(historyItem)
                    });
                    setAdminOverrideModal(null);
                    logAttendanceAndLocation(`עריכת מנהל: שינוי סטטוס פרויקט`);
                } catch(e) { alert("שגיאה בעדכון"); }
            };

            // הפקת תיק מתקן (PDF) ללקוח
            const generateProjectBook = (proj) => {
                const element = document.createElement('div');
                element.style.padding = '40px'; element.style.direction = 'rtl'; element.style.fontFamily = 'Arial, sans-serif';
                
                const deliveredMaterials = (proj.allocatedMaterials || []).filter(m => m.status === 'delivered');
                const teamNames = (Array.isArray(proj.assignedUsers) && proj.assignedUsers.length > 0) ? proj.assignedUsers.map(uid => users.find(x=>x.id===uid)?.name || '').filter(Boolean).join(', ') : 'טרם שובץ צוות';

                element.innerHTML = `
                    <div style="text-align:center; border-bottom: 3px solid #3b82f6; padding-bottom: 20px; margin-bottom: 30px;">
                        <h1 style="color: #0f172a; font-size: 36px; margin: 0; font-weight: 900;">${APP_NAME}</h1>
                        <h2 style="color: #3b82f6; font-size: 22px; margin: 5px 0 0 0;">${APP_SLOGAN}</h2>
                        <h3 style="margin-top:20px; background: #f1f5f9; padding: 10px; display: inline-block; border-radius: 8px;">תיק מתקן - סיכום פרויקט</h3>
                    </div>
                    <div style="font-size: 16px; margin-bottom: 30px; line-height: 1.8;">
                        <p><strong>לקוח / שם הפרויקט:</strong> ${proj.name}</p>
                        <p><strong>כתובת ההתקנה:</strong> ${proj.address || 'לא צוין'}</p>
                        <p><strong>צוות מבצע:</strong> ${teamNames}</p>
                        <p><strong>תאריך הפקת הדוח:</strong> ${new Date().toLocaleDateString('he-IL')}</p>
                    </div>
                    
                    <h3 style="color: #0f172a; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; margin-bottom: 15px;">אבני דרך ושלבי ביצוע:</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 14px;">
                        <tr style="background-color: #f8fafc; text-align: right;">
                            <th style="padding: 12px; border: 1px solid #cbd5e1;">שלב</th>
                            <th style="padding: 12px; border: 1px solid #cbd5e1;">סטטוס ביצוע</th>
                        </tr>
                        ${stages.map(s => `<tr>
                            <td style="padding: 12px; border: 1px solid #cbd5e1; font-weight: bold;">${s.label}</td>
                            <td style="padding: 12px; border: 1px solid #cbd5e1; font-weight: bold; color: ${proj.statuses?.[s.id] === 3 ? '#16a34a' : (proj.statuses?.[s.id] === 2 ? '#dc2626' : '#0f172a')}">${statusLabels[proj.statuses?.[s.id] || 0]}</td>
                        </tr>`).join('')}
                    </table>
                    
                    <h3 style="color: #0f172a; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; margin-bottom: 15px;">מפרט ציוד ומוצרים שהותקנו:</h3>
                    <ul style="font-size: 14px; line-height: 2; padding-right: 20px;">
                        ${deliveredMaterials.length > 0 ? deliveredMaterials.map(m => `<li><strong>${m.name}</strong> - כמות: ${m.quantity} (סופק ב-${new Date(m.deliveredAt).toLocaleDateString('he-IL')})</li>`).join('') : '<li>לא נרשמו מוצרים שסופקו במערכת.</li>'}
                    </ul>
                    
                    <div style="margin-top: 60px; text-align: center; font-size: 12px; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                        מסמך זה מופק אוטומטית ממערכת הניהול של ${APP_NAME}. לכל שאלה, ניתן לפנות לשירות הלקוחות.
                    </div>
                `;
                html2pdf().from(element).save(`תיק_מתקן_${proj.name.replace(/\s+/g, '_')}.pdf`);
            };

            const handleWhatsAppAndPDF = (proj) => {
                generateProjectBook(proj); // מוריד את ה-PDF למנהל
                const msg = `שלום, מצורף עדכון סטטוס ודוח סיום עבודה מ-${APP_NAME}. הדוח נשלח אליך גם בפורמט PDF.`;
                const phone = proj.clientPhone ? proj.clientPhone.replace(/^0/, '972') : '';
                if(phone) {
                    setTimeout(() => window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank'), 1000);
                } else {
                    alert("לא מוגדר טלפון לקוח לפרויקט זה. דוח ה-PDF הורד בהצלחה.");
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    const adminUser = { id: "admin-roei", name: "רועי גלם", username: "roeigalam", role: "admin", tz: "000000000", phone: "0500000000", isVerified: true };
                    setCurrentUser(adminUser); localStorage.setItem("aquapoolco_user", JSON.stringify(adminUser)); return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) { 
                    if (!userDoc.isVerified && userDoc.role !== 'admin') {
                        setVerificationModal(userDoc);
                    } else {
                        setCurrentUser(userDoc); localStorage.setItem("aquapoolco_user", JSON.stringify(userDoc));
                    }
                } 
                else { alert("שם משתמש או סיסמה שגויים. נסה שנית."); }
            };

            const handleSendVerification = (e) => {
                e.preventDefault();
                if (verifyPhoneInput !== verificationModal.phone) {
                    return alert("המספר שהזנת לא תואם למספר ששמור במערכת. פנה למנהל.");
                }
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedCode(code);
                setVerifyStep(2);
                alert(`(הדמיית SMS): קוד האימות שלך לאפליקציה הוא: ${code}\n*במערכת אמיתית זה יישלח ל-${verifyPhoneInput}*`);
            };

            const handleVerifyCode = (e) => {
                e.preventDefault();
                if (verificationCode === generatedCode || verificationCode === "123456") {
                    db.collection("users").doc(verificationModal.id).update({ isVerified: true });
                    const updatedUser = { ...verificationModal, isVerified: true };
                    setCurrentUser(updatedUser);
                    localStorage.setItem("aquapoolco_user", JSON.stringify(updatedUser));
                    setVerificationModal(null);
                } else {
                    alert("קוד שגוי, נסה שוב.");
                }
            };

            const handleLogout = () => { setCurrentUser(null); localStorage.removeItem("aquapoolco_user"); };

            const logAttendanceAndLocation = (actionDetails, callback = null) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        position => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails, lat: position.coords.latitude, lng: position.coords.longitude, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        error => { db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails + " (ללא מיקום)", lat: null, lng: null, timestamp: new Date().toISOString() }); if (callback) callback(); },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                    );
                } else { if (callback) callback(); }
            };

            const handleWazeClick = (proj, e, matItem = null) => {
                if(e) e.preventDefault();
                if (matItem && matItem.status === 'pending') {
                    db.collection("projects").doc(proj.id).get().then(doc => {
                        if(doc.exists){
                            const p = doc.data(); const updatedMats = p.allocatedMaterials.map(m => m.id === matItem.id ? { ...m, status: 'en_route' } : m);
                            db.collection("projects").doc(proj.id).update({ allocatedMaterials: updatedMats });
                        }
                    });
                } else if (!matItem && proj.allocatedMaterials) {
                    let changed = false;
                    const updatedMats = proj.allocatedMaterials.map(m => { if (m.status === 'pending') { changed = true; return { ...m, status: 'en_route' }; } return m; });
                    if (changed) db.collection("projects").doc(proj.id).update({ allocatedMaterials: updatedMats });
                }

                const wazeUrl = `https://waze.com/ul?q=${encodeURIComponent(proj.address)}&navigate=yes`;
                logAttendanceAndLocation(`יציאה לניווט: ${proj.name}`, () => { window.open(wazeUrl, '_blank'); });
            };

            const handleCallTeamClick = (proj) => {
                const team = (proj.assignedUsers || []).map(uid => users.find(u => u.id === uid)).filter(Boolean);
                if (team.length === 0) alert("לא שובץ צוות לפרויקט זה.");
                else if (team.length === 1) window.location.href = `tel:${team[0].phone || ''}`;
                else setCallTeamModal({ projName: proj.name, team });
            };

            const onProjDragStart = (e, id) => { if(currentUser.role==='accounting') return; setDraggedProjId(id); e.dataTransfer.effectAllowed = "move"; };
            const onProjDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedProjId || draggedProjId === targetId || currentUser.role==='accounting') return;
                const list = [...activeProjectsList];
                const draggedIdx = list.findIndex(p => p.id === draggedProjId); const targetIdx = list.findIndex(p => p.id === targetId);
                if(draggedIdx === -1 || targetIdx === -1) return;
                const [draggedItem] = list.splice(draggedIdx, 1);
                list.splice(targetIdx, 0, draggedItem);
                list.forEach((p, index) => { if (p.order !== index) db.collection("projects").doc(p.id).update({ order: index }); });
                setDraggedProjId(null);
            };
            
            const onDelivDragStart = (e, id) => { setDraggedDelivId(id); e.dataTransfer.effectAllowed = "move"; };
            const onDelivDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedDelivId || draggedDelivId === targetId) return;
                const list = [...pendingDeliveriesList];
                const draggedIdx = list.findIndex(d => d.id === draggedDelivId); const targetIdx = list.findIndex(d => d.id === targetId);
                if(draggedIdx === -1 || targetIdx === -1) return;
                const [draggedItem] = list.splice(draggedIdx, 1);
                list.splice(targetIdx, 0, draggedItem);
                list.forEach((item, index) => {
                    db.collection("projects").doc(item.projId).get().then(doc => {
                        const p = doc.data();
                        const updatedMats = p.allocatedMaterials.map(m => m.id === item.id ? {...m, deliveryOrder: index} : m);
                        db.collection("projects").doc(item.projId).update({ allocatedMaterials: updatedMats });
                    });
                });
                setDraggedDelivId(null);
            };

            const handleAddFiles = (e, currentFiles, setter) => {
                if (!e.target.files || e.target.files.length === 0) return;
                const newFiles = Array.from(e.target.files);
                setter([...(currentFiles || []), ...newFiles]);
                e.target.value = ''; 
            };

            const uploadFilesToStorageAndDB = async (files, collectionName, extraData) => {
                if (!files || files.length === 0) return [];
                const uploadPromises = Array.from(files).map(async (file) => {
                    try {
                        let fileUrl = ""; let fileType = "";
                        
                        if (file.type.startsWith('video/')) {
                            const ref = storage.ref(`videos/${Date.now()}_${file.name}`);
                            await ref.put(file); 
                            fileUrl = await ref.getDownloadURL(); 
                            fileType = 'video';
                        } 
                        else if (file.type.startsWith('image/') || file.name.match(/\.(jpg|jpeg|png|webp)$/i) || file.type === '') {
                            // שינוי: מעלה את הקובץ המקורי ללא דחיסת קנבס כדי למנוע תמונות שחורות
                            const ref = storage.ref(`images/${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`);
                            await ref.put(file); 
                            fileUrl = await ref.getDownloadURL(); 
                            fileType = 'image';
                        }

                        if (fileUrl) {
                            const docRef = await db.collection(collectionName).add({ ...extraData, fileUrl: fileUrl, fileType: fileType, uploadedBy: currentUser.name, timestamp: new Date().toISOString(), isDeleted: false });
                            return { id: docRef.id, url: fileUrl, type: fileType };
                        }
                    } catch (error) { 
                        console.error("שגיאת העלאה מפורטת:", error);
                        throw error; 
                    }
                });
                return Promise.all(uploadPromises);
            };

            const handleProjectPhotosUpload = async (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                setIsUploading(true);
                try {
                    await uploadFilesToStorageAndDB(files, "project_photos", { 
                        projId: photosModal.id, 
                        projName: photosModal.name, 
                        folder: activePhotoFolder
                    });
                    
                    addScore(2);
                    setIsUploading(false);
                } catch (err) { alert("שגיאה בהעלאה. ודא ששינית את חוקי האבטחה בפיירבייס"); setIsUploading(false); }
            };

            const confirmSignatureAndStatus = async (e) => {
                e.preventDefault();
                const remark = e.target.remark.value.trim();
                if (!currentUser.tz) return alert("⛔ שגיאה: למשתמש שלך לא מוגדרת תעודת זהות במערכת.");
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס!");
                if (!statusPhotoFiles || statusPhotoFiles.length === 0) return alert("📷 חובה לצלם לפחות תמונה אחת מהשטח כדי לאשר!");
                if (!remark) return alert("חובה להזין הערה / פירוט על העבודה שבוצעה!");

                setIsUploading(true);
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(statusPhotoFiles, "project_photos", { projId: signRequirement.projId, projName: signRequirement.projName, folder: signRequirement.stageLabel });
                    const historyItem = { stageId: signRequirement.stageId, code: signRequirement.code, remark: remark, user: currentUser.name, date: new Date().toISOString(), files: uploadedData };

                    await db.collection("projects").doc(signRequirement.projId).update({
                        [`statuses.${signRequirement.stageId}`]: signRequirement.code, [`hasPhotos.${signRequirement.stageId}`]: true,
                        [`signatures.${signRequirement.stageId}`]: { name: currentUser.name, id: currentUser.tz, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() },
                        statusHistory: firebase.firestore.FieldValue.arrayUnion(historyItem)
                    });

                    addScore(10); 
                    logAttendanceAndLocation(`עדכון סטטוס: ${signRequirement.newStatus} בפרויקט ${signRequirement.projName}`);
                    setIsUploading(false); setStatusPhotoFiles(null); setSignRequirement(null);
                } catch (err) { alert("שגיאה בתהליך העדכון והעלאת התמונות."); setIsUploading(false); }
            };

            const handleMaterialSubmit = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const qty = Number(fd.get('qty'));
                
                if (materialReqType === 'stock') {
                    const itemId = fd.get('itemId'); if (!itemId) return alert("יש לבחור פריט.");
                    const item = inventory.find(i => i.id === itemId); if (!item) return;
                    if (item.quantity < qty) return alert(`שגיאה: במלאי נותרו רק ${item.quantity} יחידות מסוג זה.`);
                    
                    if (currentUser.role === 'admin' || currentUser.role === 'accounting') {
                        const matItem = { id: 'mat_'+Date.now(), inventoryId: item.id, name: item.name, quantity: qty, requestedBy: currentUser.name, status: 'pending', date: new Date().toISOString() };
                        db.collection("projects").doc(materialsModal.id).update({ allocatedMaterials: firebase.firestore.FieldValue.arrayUnion(matItem) });
                        db.collection("inventory").doc(item.id).update({ quantity: firebase.firestore.FieldValue.increment(-qty) });
                        alert("שויך בהצלחה לפרויקט ממלאי קיים!");
                        setMaterialsModal(null);
                    } else { setMaterialSignData({ projId: materialsModal.id, projName: materialsModal.name, inventoryId: item.id, itemName: item.name, qty: qty, type: 'stock' }); }
                } else {
                    const text = fd.get('specialText'); if (!text) return alert("חובה להזין תיאור לציוד הנדרש.");
                    if (currentUser.role === 'admin' || currentUser.role === 'accounting') {
                        const matItem = { id: 'mat_'+Date.now(), name: `הזמנה מיוחדת: ${text}`, quantity: qty, requestedBy: currentUser.name, status: 'pending', date: new Date().toISOString() };
                        db.collection("projects").doc(materialsModal.id).update({ allocatedMaterials: firebase.firestore.FieldValue.arrayUnion(matItem) });
                        alert("בקשת הרכש נשמרה ותועבר לנהג החלוקה.");
                        setMaterialsModal(null);
                    } else { setMaterialSignData({ projId: materialsModal.id, projName: materialsModal.name, itemName: `הזמנה מיוחדת: ${text}`, qty: qty, type: 'special' }); }
                }
            };

            const confirmMaterialSignature = () => {
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום כדי לאשר משיכת ציוד.");
                
                const matItem = { id: 'mat_'+Date.now(), inventoryId: materialSignData.inventoryId || null, name: materialSignData.itemName, quantity: materialSignData.qty, requestedBy: currentUser.name, status: 'pending', date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() };
                db.collection("projects").doc(materialSignData.projId).update({ allocatedMaterials: firebase.firestore.FieldValue.arrayUnion(matItem) });
                if (materialSignData.type === 'stock') { db.collection("inventory").doc(materialSignData.inventoryId).update({ quantity: firebase.firestore.FieldValue.increment(-materialSignData.qty) }); }
                
                addScore(3);
                logAttendanceAndLocation(`בקשת ציוד: ${materialSignData.itemName} (${materialSignData.qty} יח') לפרויקט ${materialSignData.projName}`);
                alert("הבקשה אושרה ונשלחה למשימות החלוקה!");
                setMaterialSignData(null); setMaterialsModal(null);
            };

            const handleDeliveryConfirm = async (e) => {
                e.preventDefault();
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה להחתים את מקבל הסחורה!");
                if (!deliveryPhotoFiles || deliveryPhotoFiles.length === 0) return alert("חובה לצלם את הסחורה שהושארה בשטח!");

                setIsUploading(true);
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(deliveryPhotoFiles, "project_photos", { projId: deliveryModal.projId, projName: deliveryModal.projName, folder: 'כללי', description: `תעודת מסירה: ${deliveryModal.matName}` });
                    db.collection("projects").doc(deliveryModal.projId).get().then(doc => {
                        const p = doc.data();
                        const updatedMats = p.allocatedMaterials.map(m => m.id === deliveryModal.matId ? { ...m, status: 'delivered', deliverySignature: sigPad.current.toDataURL(), deliveryPhotos: uploadedData, deliveredAt: new Date().toISOString(), deliveredBy: currentUser.name } : m);
                        db.collection("projects").doc(deliveryModal.projId).update({ allocatedMaterials: updatedMats });
                    });
                    addScore(5);
                    logAttendanceAndLocation(`חלוקה בוצעה: ${deliveryModal.matName} לפרויקט ${deliveryModal.projName}`);
                    setIsUploading(false); setDeliveryModal(null); setDeliveryPhotoFiles(null);
                } catch(err) { alert("שגיאה בהעלאה."); setIsUploading(false); }
            };

            const handleDeliveryCancel = (e) => {
                e.preventDefault();
                const reason = e.target.reason.value;
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום על הדיווח!");
                if (!reason) return alert("חובה לבחור סטטוס לאי מסירה.");

                db.collection("projects").doc(cancelDeliveryModal.projId).get().then(doc => {
                    const p = doc.data(); const matToCancel = p.allocatedMaterials.find(m => m.id === cancelDeliveryModal.matId);
                    
                    if(matToCancel && matToCancel.inventoryId && (reason === 'not_delivered_closed' || reason === 'not_delivered_client')) { 
                        db.collection("inventory").doc(matToCancel.inventoryId).update({ quantity: firebase.firestore.FieldValue.increment(matToCancel.quantity) }); 
                    }
                    
                    const reasonText = reason === 'not_delivered_client' ? 'לקוח לא זמין (הוחזר למלאי)' : reason === 'not_delivered_closed' ? 'אתר סגור (הוחזר למלאי)' : 'עיכוב / חוסר (נשאר פתוח)';
                    
                    if (reason === 'delayed') {
                        const updatedMats = p.allocatedMaterials.map(m => m.id === cancelDeliveryModal.matId ? { ...m, status: 'delayed', delayReason: reasonText } : m);
                        db.collection("projects").doc(cancelDeliveryModal.projId).update({ allocatedMaterials: updatedMats });
                    } else {
                        const updatedMats = p.allocatedMaterials.map(m => m.id === cancelDeliveryModal.matId ? { ...m, status: 'returned', delayReason: reasonText, returnedAt: new Date().toISOString(), returnedBy: currentUser.name } : m);
                        db.collection("projects").doc(cancelDeliveryModal.projId).update({ allocatedMaterials: updatedMats });
                    }
                });
                
                logAttendanceAndLocation(`דיווח חלוקה: ${cancelDeliveryModal.matName} (${reason})`);
                setCancelDeliveryModal(null);
            };

            const handleInventoryReceive = async (e) => {
                e.preventDefault();
                const qty = Number(e.target.qty.value);
                if (!invSigPad.current || invSigPad.current.isEmpty()) return alert("חובה לחתום לאישור קליטת הסחורה.");
                if (!invDeliveryFiles || invDeliveryFiles.length === 0) return alert("חובה לצלם/להעלות תעודת משלוח.");
                
                setIsUploading(true);
                try {
                    const uploadedData = await uploadFilesToStorageAndDB(invDeliveryFiles, "inventory_photos", { inventoryId: inventoryItemModal.id, itemName: inventoryItemModal.name, qtyAdded: qty, signatureData: invSigPad.current.toDataURL(), signatureName: currentUser.name });
                    await db.collection("inventory").doc(inventoryItemModal.id).update({ quantity: firebase.firestore.FieldValue.increment(qty) });
                    addScore(5);
                    logAttendanceAndLocation(`קליטת סחורה למחסן: ${inventoryItemModal.name} (+${qty} יח')`);
                    setIsUploading(false); setInvDeliveryFiles(null); setInvModalTab("gallery");
                } catch (err) { alert("שגיאה בהעלאה."); setIsUploading(false); }
            };

            const handleAddCustomTask = (projId) => {
                const label = prompt("הכנס שם משימה מיוחדת (לדוגמה: יציקת בטון חריגה):");
                if (!label) return;
                const newTask = { id: 'ct_' + Date.now(), label: label };
                db.collection("projects").doc(projId).update({ customTasks: firebase.firestore.FieldValue.arrayUnion(newTask) });
            };

            const handleDeleteCustomTask = (e, projId, taskId) => {
                e.stopPropagation();
                if(!window.confirm("למחוק משימה זו מהפרויקט?")) return;
                db.collection("projects").doc(projId).get().then(doc => {
                    const p = doc.data(); const updatedTasks = (p.customTasks || []).filter(t => t.id !== taskId);
                    db.collection("projects").doc(projId).update({ customTasks: updatedTasks });
                });
            };

            if (verificationModal) {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 ${appFontSize}`} style={{ backgroundColor: appBgColor, fontFamily: appFont }}>
                        <div className="glass p-10 md:p-12 w-full max-w-sm text-center shadow-2xl relative overflow-hidden" style={{ borderRadius: appRadius, borderTop: `4px solid ${appColor}` }}>
                            <h1 className="text-2xl font-black mb-2 text-white">אימות משתמש חדש</h1>
                            <p className="text-slate-300 text-sm mb-6">לפני הכניסה הראשונה, עליך לאמת את הטלפון שלך (לצורכי הדגמה ה-SMS יקפוץ על המסך).</p>
                            
                            {verifyStep === 1 ? (
                                <form onSubmit={handleSendVerification}>
                                    <label className="block text-right text-xs text-slate-400 mb-1 font-bold">הזן את המספר שלך כפי שהוזן במערכת</label>
                                    <input type="tel" pattern="^05\d{8}$" title="מספר חוקי מתחיל ב-05 וכולל 10 ספרות" required value={verifyPhoneInput} onChange={e=>setVerifyPhoneInput(e.target.value)} placeholder="05XXXXXXXX" className="w-full p-4 bg-black/30 rounded-xl mb-6 text-center text-white outline-none border border-white/10 focus:border-blue-500 font-bold text-lg dir-ltr" />
                                    <button type="submit" className="w-full text-white py-4 rounded-xl font-black transition-all shadow-lg text-lg" style={{backgroundColor: appColor}}>שלח קוד אימות 📱</button>
                                </form>
                            ) : (
                                <form onSubmit={handleVerifyCode}>
                                    <label className="block text-right text-xs text-slate-400 mb-1 font-bold">הזן את הקוד שקיבלת (או 123456)</label>
                                    <input type="text" required value={verificationCode} onChange={e=>setVerificationCode(e.target.value)} placeholder="קוד בן 6 ספרות" className="w-full p-4 bg-black/30 rounded-xl mb-6 text-center text-white outline-none border border-white/10 focus:border-blue-500 font-bold text-lg dir-ltr tracking-widest" />
                                    <button type="submit" className="w-full text-white py-4 rounded-xl font-black transition-all shadow-lg text-lg" style={{backgroundColor: appColor}}>אמת והיכנס למערכת ✅</button>
                                    <button type="button" onClick={()=>setVerifyStep(1)} className="mt-4 text-slate-400 text-sm font-bold block w-full">חזור אחורה</button>
                                </form>
                            )}
                        </div>
                    </div>
                )
            }

            if (!currentUser) {
                return (
                    <div className={`min-h-screen flex items-center justify-center p-4 ${appFontSize}`} style={{ backgroundColor: appBgColor, fontFamily: appFont }}>
                        <style>{`body { font-family: ${appFont} !important; background-color: ${appBgColor} !important; } .theme-bg { background-color: ${appColor} !important; } .theme-text { color: ${appColor} !important; }`}</style>
                        <form onSubmit={handleLogin} className="p-10 md:p-12 w-full max-w-sm text-center shadow-2xl relative overflow-hidden" style={{ background: appCardBg, backdropFilter: 'blur(12px)', borderRadius: appRadius, borderTop: `4px solid ${appColor}` }}>
                            <div className="flex justify-center mb-6"><img src={LOGO_URL} alt="Logo" className="h-24 w-auto object-contain rounded-2xl bg-white p-3 shadow-lg" onError={(e) => { e.target.style.display='none'; }} /></div>
                            <h1 className="text-3xl font-black mb-1 text-white">{APP_NAME}</h1>
                            <p className="font-bold mb-8 text-xs tracking-widest text-blue-400">{APP_SLOGAN}</p>
                            <input type="text" placeholder="שם משתמש" required value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} className="w-full p-4 bg-black/30 rounded-xl mb-4 text-center text-white outline-none border border-white/10 focus:border-blue-500 font-bold text-lg" />
                            <input type="password" placeholder="סיסמה" required value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} className="w-full p-4 bg-black/30 rounded-xl mb-8 text-center text-white outline-none border border-white/10 focus:border-blue-500 font-bold text-lg" />
                            <button type="submit" className="w-full text-white py-4 rounded-xl font-black transition-all shadow-lg theme-bg filter hover:brightness-110 text-lg">כניסה למערכת</button>
                        </form>
                    </div>
                );
            }

            const sTerm = (searchTerm || "").toLowerCase();
            
            const activeProjectsList = projects.filter(p => {
                if (p.isFinished) return false;
                const isAssigned = p.assignedUsers && p.assignedUsers.includes(currentUser.id);
                if (currentUser.role === 'worker' && !isAssigned) return false;
                return p.name?.toLowerCase().includes(sTerm) || p.address?.toLowerCase().includes(sTerm);
            }).sort((a,b) => (a.order || 0) - (b.order || 0));

            const finishedProjectsList = projects.filter(p => p.isFinished && (p.name?.toLowerCase().includes(sTerm) || p.address?.toLowerCase().includes(sTerm)));
            const filteredUsers = users.filter(u => u.name?.toLowerCase().includes(sTerm) || u.role?.toLowerCase().includes(sTerm));
            const filteredInventory = inventory.filter(i => i.name?.toLowerCase().includes(sTerm) || i.category?.toLowerCase().includes(sTerm));
            const filteredAttendance = attendanceLogs.filter(a => a.userName?.toLowerCase().includes(sTerm) || a.action?.toLowerCase().includes(sTerm));
            
            let pendingDeliveriesList = projects.flatMap(p => (p.allocatedMaterials || []).filter(m => m.status === 'pending' || m.status === 'en_route' || m.status === 'delayed').map(m => ({...m, projId: p.id, projAddress: p.address, projName: p.name})));
            pendingDeliveriesList = pendingDeliveriesList.filter(d => d.projName?.toLowerCase().includes(sTerm) || d.name?.toLowerCase().includes(sTerm));
            pendingDeliveriesList.sort((a,b) => (a.deliveryOrder || 0) - (b.deliveryOrder || 0));
            const pendingDeliveriesCount = pendingDeliveriesList.filter(d => d.status === 'pending' || d.status === 'delayed').length;

                                <button onClick={() => setAdminOverrideModal(null)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-bold text-xl">X</button>
                                <h2 className="text-2xl font-black text-white mb-2 text-center">עריכת מנהל (ללא חתימה)</h2>
                                <h3 className="text-blue-300 text-center font-bold mb-6 pb-4 border-b border-white/10">{adminOverrideModal.projName} - {adminOverrideModal.stageLabel}</h3>
                                
                                <div className="space-y-3">
                                    {[0, 1, 2, 3].map(code => {
                                        const color = code === 3 ? "bg-[#10b981] hover:bg-emerald-600" : code === 2 ? "bg-[#ef4444] hover:bg-red-600" : code === 1 ? "bg-[#f59e0b] hover:bg-amber-600" : "bg-slate-600 hover:bg-slate-500";
                                        return (
                                            <button key={code} onClick={() => adminOverrideStatus(adminOverrideModal.projId, adminOverrideModal.stageId, code)} className={`w-full text-white py-4 rounded-xl font-black text-lg transition shadow-lg ${color} ${adminOverrideModal.currentCode === code ? 'ring-4 ring-white border-2 border-black' : ''}`}>
                                                {statusLabels[code]} {adminOverrideModal.currentCode === code && '(נוכחי)'}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* חלון טבלת ניקוד (Leaderboard) */}
                    {leaderboardModal && (
                        <div className="fixed inset-0 bg-black/90 flex justify-center items-center z-[100] animate-fade-in p-4" onClick={() => setLeaderboardModal(false)}>
                            <div className="glass w-full max-w-md p-8 rounded-[2rem] border-t-4 border-amber-500 relative shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setLeaderboardModal(false)} className="absolute top-4 left-4 text-slate-400 hover:text-white font-bold text-xl">X</button>
                                <div className="text-center mb-6">
                                    <div className="text-5xl mb-2">🏆</div>
                                    <h2 className="text-3xl font-black text-white">אלופי השטח</h2>
                                    <p className="text-amber-400 font-bold text-sm">הדירוג המלא של הצוות</p>
                                </div>
                                <div className="space-y-3 max-h-80 overflow-y-auto pr-2">
                                    {users.filter(u => u.role === 'worker' || u.role === 'driver').sort((a,b) => (b.score||0)-(a.score||0)).map((u, i) => (
                                        <div key={u.id} className="flex justify-between items-center bg-black/40 p-4 rounded-2xl border border-white/5 shadow-inner">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-lg ${i===0?'bg-yellow-500 text-black shadow-[0_0_15px_rgba(234,179,8,0.5)]':i===1?'bg-slate-300 text-black':i===2?'bg-amber-700 text-white':'bg-black/50 text-slate-400 border border-white/10'}`}>{i+1}</div>
                                                <div>
                                                    <div className="font-black text-white text-lg">{u.name}</div>
                                                    <div className="text-xs text-slate-400">{roleLabels[u.role] || 'עובד'}</div>
                                                </div>
                                            </div>
                                            <div className="font-black text-amber-400 text-xl bg-amber-900/20 px-3 py-1 rounded-xl border border-amber-500/30">{u.score || 0} נק'</div>
                                        </div>
                                    ))}
                                    {users.length === 0 && <div className="text-center text-slate-500 py-4">אין משתמשים במערכת.</div>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* צפייה בתמונה (Preview Modal) */}
                    {mediaPreview && (
                        <div className="fixed inset-0 bg-black/95 flex flex-col justify-center items-center z-[110] p-4" onClick={() => setMediaPreview(null)}>
                            <div className="relative w-full max-w-3xl flex flex-col items-center" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setMediaPreview(null)} className="absolute -top-10 right-0 text-white font-bold text-xl bg-black/50 w-8 h-8 rounded-full hover:bg-white/20 transition">X</button>
                                {mediaPreview.type === 'video' ? (
                                    <video src={mediaPreview.url} controls autoPlay className="max-w-full max-h-[80vh] rounded-lg shadow-2xl" />
                                ) : (
                                    <img src={mediaPreview.url} className="max-w-full max-h-[80vh] rounded-lg shadow-2xl border border-white/10" />
                                )}
                                <div className="mt-4 text-center">
                                    <div className="font-black text-xl text-white">{mediaPreview.projName}</div>
                                    <div className="text-sm text-slate-400">הועלה ע"י: {mediaPreview.uploadedBy} | תאריך: {new Date(mediaPreview.timestamp).toLocaleString('he-IL')}</div>
                                    {currentUser.role === 'admin' && (
                                        <div className="mt-4 flex gap-3 justify-center">
                                            <button onClick={() => handleSecureDownload(mediaPreview.url, `תמונה_${mediaPreview.projName}.jpg`)} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg transition">⬇️ הורד תמונה</button>
                                            <button onClick={() => deletePhoto(mediaPreview.id, true)} className="bg-red-600 hover:bg-red-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg transition">🗑️ מחק תמונה</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* מסכי טעינה כלליים */}
                    {(isUploading || isZipLoading) && (
                        <div className="fixed inset-0 bg-black/90 z-[200] flex flex-col items-center justify-center">
                            <div className="loader mb-4 border-t-blue-500 border-l-transparent w-12 h-12 border-4"></div>
                            <div className="font-bold text-lg text-white">{isZipLoading ? 'מכין קובץ ZIP של כל הפרויקט...' : 'מעבד נתונים ומעלה קבצים...'}</div>
                            <div className="text-sm text-slate-400 mt-2">אנא המתן, לא לסגור את החלון.</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
