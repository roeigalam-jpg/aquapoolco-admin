<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; transition: all 0.3s; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .status-0 { background-color: #334155; } .status-1 { background-color: #f59e0b; } .status-2 { background-color: #ef4444; } .status-3 { background-color: #10b981; }
        header { z-index: 100; position: sticky; top: 0; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState("board");
            const [projects, setProjects] = useState([]);
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendance, setAttendance] = useState([]);
            const [settings, setSettings] = useState({ 
                portalName: "אקוופולקו חן בע\"מ", 
                mainColor: "#3b82f6", 
                headerTextColor: "#ffffff",
                cardBg: "#1e293b" 
            });

            // מודאלים
            const [showAddProject, setShowAddProject] = useState(false);
            const [editProjectModal, setEditProjectModal] = useState(null);
            const [statusModal, setStatusModal] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem("aquapoolco_user");
                if (saved) setCurrentUser(JSON.parse(saved));

                db.collection("settings").doc("general").onSnapshot(doc => doc.exists && setSettings(doc.data()));
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(s => setProjects(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("users").onSnapshot(s => setUsers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("inventory").onSnapshot(s => setInventory(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("attendance").orderBy("timestamp", "desc").onSnapshot(s => setAttendance(s.docs.map(d => ({id: d.id, ...d.data()}))));
            }, []);

            const handleLogout = () => { localStorage.removeItem("aquapoolco_user"); setCurrentUser(null); };

            // סידור נוכחות לפי ימים
            const groupedAttendance = attendance.reduce((groups, entry) => {
                const date = new Date(entry.timestamp).toLocaleDateString('he-IL');
                if (!groups[date]) groups[date] = [];
                groups[date].push(entry);
                return groups;
            }, {});

            if (!currentUser) return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                        <h1 className="text-2xl font-black mb-6">Aquapoolco Login</h1>
                        <button onClick={() => {
                            const u = { name: "רועי גלם", role: "admin", id: "roei" };
                            setCurrentUser(u); localStorage.setItem("aquapoolco_user", JSON.stringify(u));
                        }} className="w-full bg-blue-600 py-3 rounded-xl font-bold">כניסת מנהל (דימוי)</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col" style={{ backgroundColor: settings.cardBg + '10' }}>
                    <header className="glass p-4 sticky top-0 z-50 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="font-black text-xl" style={{ color: settings.headerTextColor }}>{settings.portalName}</div>
                        <nav className="flex gap-2 overflow-x-auto w-full md:w-auto hide-scroll">
                            <button onClick={() => setActiveTab("board")} className={`px-4 py-2 rounded-xl font-bold ${activeTab === "board" ? "bg-blue-600" : "bg-slate-800"}`}>לוח עבודה</button>
                            <button onClick={() => setActiveTab("attendance")} className={`px-4 py-2 rounded-xl font-bold ${activeTab === "attendance" ? "bg-blue-600" : "bg-slate-800"}`}>נוכחות</button>
                            <button onClick={() => setActiveTab("inventory")} className={`px-4 py-2 rounded-xl font-bold ${activeTab === "inventory" ? "bg-blue-600" : "bg-slate-800"}`}>מחסן</button>
                            <button onClick={() => setActiveTab("users")} className={`px-4 py-2 rounded-xl font-bold ${activeTab === "users" ? "bg-blue-600" : "bg-slate-800"}`}>משתמשים</button>
                            <button onClick={() => setActiveTab("settings")} className={`px-4 py-2 rounded-xl font-bold ${activeTab === "settings" ? "bg-blue-600" : "bg-slate-800"}`}>הגדרות</button>
                        </nav>
                        <button onClick={handleLogout} className="text-slate-500 text-sm">התנתק</button>
                    </header>

                    <main className="p-4 md:p-8 flex-1">
                        {activeTab === "board" && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <button onClick={() => setShowAddProject(true)} className="bg-blue-600 p-6 rounded-3xl font-black text-xl">+ פרויקט חדש</button>
                                {projects.map(p => (
                                    <div key={p.id} className="bg-slate-900 p-6 rounded-3xl shadow-xl border border-white/5">
                                        <div className="flex justify-between items-start mb-4">
                                            <h3 className="font-black text-xl">{p.name}</h3>
                                            <button onClick={() => setEditProjectModal(p)} className="text-blue-400">✏️</button>
                                        </div>
                                        <p className="text-slate-400 text-sm mb-4">📍 {p.address}</p>
                                        <div className="flex justify-between border-t border-white/5 pt-4">
                                            <button className="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold">📷 תמונות</button>
                                            <button className="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold">📦 ציוד</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === "attendance" && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <h2 className="text-2xl font-black mb-6">📍 דוח נוכחות יומי</h2>
                                {Object.keys(groupedAttendance).map(date => (
                                    <div key={date} className="bg-slate-900 rounded-3xl overflow-hidden border border-white/5">
                                        <div className="bg-blue-600/20 p-4 font-bold border-b border-white/5">{date}</div>
                                        {groupedAttendance[date].map(log => (
                                            <div key={log.id} className="p-4 flex justify-between items-center border-b border-white/5 last:border-0">
                                                <div><span className="font-bold">{log.userName}</span>: <span className="text-emerald-400">{log.action}</span></div>
                                                <div className="text-xs text-slate-500">{new Date(log.timestamp).toLocaleTimeString('he-IL')}</div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === "inventory" && (
                            <div className="max-w-6xl mx-auto">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black">📦 מלאי מחסן</h2>
                                    <button className="bg-amber-600 px-6 py-2 rounded-xl font-bold">פריט חדש</button>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {inventory.map(item => (
                                        <div key={item.id} className="bg-slate-900 p-6 rounded-3xl text-center border border-white/5">
                                            <div className="text-slate-500 text-xs mb-1">{item.category}</div>
                                            <div className="font-black text-lg mb-4">{item.name}</div>
                                            <div className="text-3xl font-black text-blue-400">{item.quantity}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === "users" && (
                            <div className="max-w-4xl mx-auto bg-slate-900 rounded-3xl p-6 border border-white/5">
                                <h2 className="text-2xl font-black mb-6">👥 ניהול משתמשים והרשאות</h2>
                                <div className="space-y-4">
                                    {users.map(u => (
                                        <div key={u.id} className="flex justify-between items-center bg-slate-800 p-4 rounded-2xl">
                                            <div><div className="font-bold">{u.name}</div><div className="text-xs text-blue-400">{u.role}</div></div>
                                            <button className="text-red-400">🗑️</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === "settings" && (
                            <div className="max-w-2xl mx-auto bg-slate-900 rounded-3xl p-8 border border-white/5 space-y-6">
                                <h2 className="text-2xl font-black mb-6">⚙️ הגדרות מערכת ועיצוב</h2>
                                <div>
                                    <label className="block text-xs text-slate-500 mb-2">שם הפורטל</label>
                                    <input value={settings.portalName} onChange={e => setSettings({...settings, portalName: e.target.value})} className="w-full bg-slate-800 p-4 rounded-xl outline-none" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-2">צבע כותרות</label>
                                        <input type="color" value={settings.headerTextColor} onChange={e => setSettings({...settings, headerTextColor: e.target.value})} className="w-full h-12 rounded-xl bg-transparent border-0 cursor-pointer" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-500 mb-2">צבע רקע כרטיסים</label>
                                        <input type="color" value={settings.cardBg} onChange={e => setSettings({...settings, cardBg: e.target.value})} className="w-full h-12 rounded-xl bg-transparent border-0 cursor-pointer" />
                                    </div>
                                </div>
                                <button onClick={() => { db.collection("settings").doc("general").set(settings); alert("הגדרות נשמרו!"); }} className="w-full bg-blue-600 py-4 rounded-xl font-black text-lg">שמור הגדרות עיצוב</button>
                            </div>
                        )}
                    </main>

                    {/* מודאלים נשארים באותו מבנה פונקציונלי כפי שהיו */}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
