<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקוופולקו חן - ניהול מחלקת טיח</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // הגדרות Firebase שנתת לי
        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        // אתחול Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function App() {
            const [projects, setProjects] = useState([]);
            const [selectedProject, setSelectedProject] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);

            // טעינת פרויקטים מהענן
            useEffect(() => {
                const unsubscribe = db.collection("projects").onSnapshot((snapshot) => {
                    const projectsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProjects(projectsData);
                });
                return () => unsubscribe();
            }, []);

            const addProject = (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const address = e.target.address.value;
                db.collection("projects").add({
                    name,
                    address,
                    team: "צוות א",
                    status: "הכנת תשתית",
                    checklist: { prep: false, sealing1: false, plaster: false, sealing2: false, flood: false }
                });
                setShowAddModal(false);
            };

            const toggleCheck = (projId, step) => {
                const proj = projects.find(p => p.id === projId);
                const newChecklist = { ...proj.checklist, [step]: !proj.checklist[step] };
                db.collection("projects").doc(projId).update({ checklist: newChecklist });
            };

            return (
                <div className="min-h-screen font-sans pb-10">
                    {/* Header עם לוגו */}
                    <header className="bg-white shadow-md p-4 mb-8 sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <img src="https://i.imgur.com/WfVp07m.jpg" alt="Aquapoolco Logo" className="h-16" />
                            <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-blue-700 transition">
                                ➕ פרויקט חדש
                            </button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4">
                        <h2 className="text-2xl font-black text-slate-800 mb-6 border-r-4 border-blue-500 pr-3">ניהול מחלקת טיח בריכות</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {projects.map(proj => (
                                <div key={proj.id} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition">
                                    <div className="flex justify-between items-start mb-4">
                                        <h3 className="text-xl font-black text-blue-900">{proj.name}</h3>
                                        <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">{proj.status}</span>
                                    </div>
                                    <p className="text-slate-500 font-bold mb-4">📍 {proj.address}</p>
                                    
                                    <div className="bg-slate-50 p-4 rounded-xl mb-4">
                                        <h4 className="font-black text-sm mb-3 text-slate-700">צ'ק ליסט פיקוח:</h4>
                                        <div className="space-y-2">
                                            {Object.entries({
                                                prep: "הכנת תשתית וניקיון",
                                                sealing1: "איטום ראשוני",
                                                plaster: "שכבת טיח מיישר",
                                                sealing2: "איטום סופי",
                                                flood: "בדיקת הצפה"
                                            }).map(([key, label]) => (
                                                <div key={key} className="flex items-center gap-3 cursor-pointer" onClick={() => toggleCheck(proj.id, key)}>
                                                    <div className={`w-5 h-5 rounded border-2 flex items-center justify-center ${proj.checklist?.[key] ? 'bg-green-500 border-green-500' : 'border-slate-300'}`}>
                                                        {proj.checklist?.[key] && <span className="text-white text-xs">✓</span>}
                                                    </div>
                                                    <span className={`text-sm ${proj.checklist?.[key] ? 'text-slate-400 line-through' : 'text-slate-700 font-bold'}`}>{label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-2">
                                        <button className="flex-1 bg-slate-100 text-slate-700 py-2 rounded-lg font-bold text-sm">📄 תוכניות</button>
                                        <button className="flex-1 bg-slate-100 text-slate-700 py-2 rounded-lg font-bold text-sm">📏 כמויות</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* מודאל הוספה */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            <form onSubmit={addProject} className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
                                <h3 className="text-2xl font-black mb-6 text-blue-900">הוספת פרויקט חדש</h3>
                                <div className="space-y-4">
                                    <input name="name" placeholder="שם הפרויקט" className="w-full p-4 bg-slate-100 rounded-xl outline-none font-bold" required />
                                    <input name="address" placeholder="כתובת" className="w-full p-4 bg-slate-100 rounded-xl outline-none font-bold" required />
                                    <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">שמור במערכת</button>
                                    <button type="button" onClick={() => setShowAddModal(false)} className="w-full text-slate-500 font-bold">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
