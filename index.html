<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    
    <script>
        const manifest = { "name": "Aquapoolco ERP", "short_name": "אקוופולקו", "display": "standalone", "start_url": ".", "theme_color": "#0f172a", "background_color": "#0f172a", "icons": [{"src": "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg", "sizes": "512x512", "type": "image/jpeg", "purpose": "any maskable"}] };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 3rem; }
        .status-cell:active { transform: scale(0.95); }
        
        .status-0 { background-color: #334155; color: #cbd5e1; } 
        .status-1 { background-color: #f59e0b; color: #fff; } 
        .status-2 { background-color: #ef4444; color: #fff; } 
        .status-3 { background-color: #10b981; color: #fff; } 

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
        .dir-ltr { direction: ltr; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("system-ui");
            const [portalName, setPortalName] = useState("אקוופולקו חן בע\"מ");
            const [officeEmail, setOfficeEmail] = useState("info@aquapoolco.co.il");
            
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendanceLogs, setAttendanceLogs] = useState([]);
            
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [showAddUser, setShowAddUser] = useState(false);
            const [editUserModal, setEditUserModal] = useState(null);
            const [assignModal, setAssignModal] = useState(null); 
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            
            const [statusModal, setStatusModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null); 
            
            const [materialsModal, setMaterialsModal] = useState(null);
            const [materialReqType, setMaterialReqType] = useState("stock"); 
            const [materialSignData, setMaterialSignData] = useState(null); 
            
            // גלריית פרויקטים
            const [photosModal, setPhotosModal] = useState(null);
            const [currentProjectPhotos, setCurrentProjectPhotos] = useState([]);
            const [activePhotoFolder, setActivePhotoFolder] = useState('כללי');
            
            // ניהול פריט מחסן מתקדם
            const [inventoryItemModal, setInventoryItemModal] = useState(null);
            const [invModalTab, setInvModalTab] = useState("gallery"); 
            const [inventoryPhotos, setInventoryPhotos] = useState([]);
            const [invSignerName, setInvSignerName] = useState("");
            const [invSignerId, setInvSignerId] = useState("");
            const invSigPad = useRef(null);
            const invCanvasRef = useRef(null);
            
            const [isUploading, setIsUploading] = useState(false);
            
            // חתימה וסטטוס
            const [signRequirement, setSignRequirement] = useState(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const [signerName, setSignerName] = useState("");
            const [signerId, setSignerId] = useState("");

            useEffect(() => {
                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appFont) setAppFont(d.appFont);
                        if (d.portalName) setPortalName(d.portalName);
                        if (d.officeEmail) setOfficeEmail(d.officeEmail);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("users").onSnapshot(snapshot => {
                    setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("inventory").onSnapshot(snapshot => {
                    setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("attendance").orderBy("timestamp", "desc").limit(100).onSnapshot(snapshot => {
                    setAttendanceLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, []);

            useEffect(() => {
                let unsubscribe = () => {};
                if (photosModal) {
                    unsubscribe = db.collection("project_photos").where("projId", "==", photosModal.id).orderBy("timestamp", "desc").onSnapshot(snapshot => {
                        setCurrentProjectPhotos(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                }
                return () => unsubscribe();
            }, [photosModal]);

            useEffect(() => {
                let unsubscribe = () => {};
                if (inventoryItemModal) {
                    unsubscribe = db.collection("inventory_photos").where("itemId", "==", inventoryItemModal.id).orderBy("timestamp", "desc").onSnapshot(snapshot => {
                        setInventoryPhotos(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                }
                return () => unsubscribe();
            }, [inventoryItemModal]);

            useEffect(() => {
                const resizeCanvas = (canvas, padRef) => {
                    if(canvas) {
                        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
                        canvas.width = canvas.offsetWidth * ratio;
                        canvas.height = canvas.offsetHeight * ratio;
                        canvas.getContext("2d").scale(ratio, ratio);
                        padRef.current.clear();
                    }
                };

                if ((signRequirement || materialSignData) && canvasRef.current) {
                    sigPad.current = new SignaturePad(canvasRef.current, { backgroundColor: 'rgb(255, 255, 255)' });
                    resizeCanvas(canvasRef.current, sigPad);
                }
                
                if (inventoryItemModal && invModalTab === 'receive' && invCanvasRef.current) {
                    invSigPad.current = new SignaturePad(invCanvasRef.current, { backgroundColor: 'rgb(255, 255, 255)' });
                    resizeCanvas(invCanvasRef.current, invSigPad);
                }
            }, [signRequirement, materialSignData, inventoryItemModal, invModalTab]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    setCurrentUser({ id: "admin-roei", name: "רועי גלם (מנכ''ל)", username: "roeigalam", role: "admin", tz: "admin" });
                    return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) setCurrentUser(userDoc);
                else alert("שם משתמש או סיסמה שגויים. נסה שנית.");
            };

            const logAttendanceAndLocation = (actionDetails, callback = null) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        position => {
                            db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails, lat: position.coords.latitude, lng: position.coords.longitude, timestamp: new Date().toISOString() });
                            if (callback) callback();
                        },
                        error => {
                            console.warn("Location permission denied or failed.");
                            db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails + " (ללא מיקום)", lat: null, lng: null, timestamp: new Date().toISOString() });
                            if (callback) callback();
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                    );
                } else { if (callback) callback(); }
            };

            const handleWazeClick = (proj, e) => {
                e.preventDefault();
                const wazeUrl = `waze://?q=${encodeURIComponent(proj.address)}&navigate=yes`;
                logAttendanceAndLocation(`יציאה לניווט: ${proj.name}`, () => { window.location.href = wazeUrl; });
                setTimeout(() => { window.location.href = wazeUrl; }, 1000);
            };

            const processAndUploadFiles = async (files, collectionName, extraData) => {
                if (!files || files.length === 0) return [];
                const uploadPromises = Array.from(files).map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader(); 
                        reader.readAsDataURL(file);
                        reader.onload = (event) => {
                            const img = new Image(); img.src = event.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas'); const MAX_WIDTH = 1000; 
                                const scaleSize = Math.min(1, MAX_WIDTH / img.width);
                                canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                db.collection(collectionName).add({
                                    ...extraData,
                                    imageBase64: canvas.toDataURL('image/jpeg', 0.6),
                                    uploadedBy: currentUser.name,
                                    timestamp: new Date().toISOString()
                                }).then(resolve).catch(reject);
                            };
                        };
                    });
                });
                return Promise.all(uploadPromises);
            };

            const handleProjectPhotosUpload = async (e) => {
                const files = e.target.files;
                if (!files.length) return;
                setIsUploading(true);
                try {
                    await processAndUploadFiles(files, "project_photos", {
                        projId: photosModal.id,
                        projName: photosModal.name,
                        folder: activePhotoFolder
                    });
                } catch(err) { alert("שגיאה בהעלאת התמונות"); }
                setIsUploading(false);
            };

            const deletePhoto = (collection, photoId) => { if(window.confirm("למחוק את התמונה לצמיתות?")) db.collection(collection).doc(photoId).delete(); };

            // === אישור סטטוס כולל בדיקת ת.ז ותמונת חובה ===
            const confirmSignatureAndStatus = async (e) => {
                e.preventDefault();
                
                if (!signerName || signerName.length < 2) return alert("יש להזין שם מלא");
                if (!signerId || signerId.length !== 9 || isNaN(signerId)) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                
                // בדיקת תעודת זהות מול המשתמש המחובר!
                if (currentUser.role !== 'admin' && currentUser.tz && String(signerId) !== String(currentUser.tz)) {
                    return alert(`⛔ שגיאה: תעודת הזהות (${signerId}) אינה תואמת למשתמש המחובר למערכת.\nרק עובד הצוות רשאי לחתום.`);
                }

                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס");

                const photoInput = document.getElementById("statusPhotoInput");
                if (!photoInput || !photoInput.files || photoInput.files.length === 0) {
                    return alert("📷 חובה לצלם/להעלות תמונה מהשטח כדי לאשר סטטוס עבודה!");
                }

                setIsUploading(true);

                try {
                    // 1. העלאת התמונה מהשטח לתיקייה של הפרויקט לפי שם השלב
                    const file = photoInput.files[0];
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    
                    reader.onload = (event) => {
                        const img = new Image(); img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas'); const MAX_WIDTH = 1000;
                            const scaleSize = Math.min(1, MAX_WIDTH / img.width);
                            canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            
                            // שמירת התמונה
                            db.collection("project_photos").add({
                                projId: signRequirement.projId,
                                projName: projects.find(p => p.id === signRequirement.projId)?.name,
                                folder: signRequirement.stageLabel, // התמונה נכנסת לתיקייה של השלב
                                imageBase64: canvas.toDataURL('image/jpeg', 0.6),
                                uploadedBy: currentUser.name,
                                timestamp: new Date().toISOString()
                            }).then(() => {
                                // 2. עדכון הסטטוס והחתימה רק אחרי שהתמונה עלתה!
                                const proj = projects.find(p => p.id === signRequirement.projId);
                                logAttendanceAndLocation(`עדכון סטטוס: ${signRequirement.newStatus} בפרויקט ${proj.name}`);

                                db.collection("projects").doc(signRequirement.projId).update({
                                    [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                                    [`signatures.${signRequirement.stageId}`]: { name: signerName, id: signerId, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() }
                                });

                                setIsUploading(false);
                                setSignRequirement(null); setStatusModal(null); setSignerName(""); setSignerId("");
                            });
                        };
                    };
                } catch (error) {
                    alert("שגיאה בהעלאת התמונה ועדכון הסטטוס.");
                    setIsUploading(false);
                }
            };

            const handleMaterialSubmit = (e) => {
                e.preventDefault();
                const data = { type: materialReqType, qty: Number(e.target.qty.value) };

                if (materialReqType === 'stock') {
                    const itemId = e.target.itemId.value;
                    const item = inventory.find(i => i.id === itemId);
                    if (!item) return alert("שגיאה בזיהוי הפריט");
                    if (item.quantity < data.qty) return alert("אין מספיק פריטים במלאי המחסן!");
                    data.itemId = itemId;
                    data.itemName = item.name;
                } else {
                    const specialText = e.target.specialText.value.trim();
                    if (!specialText) return alert("חובה להזין את פירוט הבקשה!");
                    data.itemName = "הזמנה מיוחדת: " + specialText;
                }

                if (currentUser.role === 'admin') {
                    executeMaterialAllocation(data, null);
                } else {
                    setMaterialSignData(data);
                }
            };

            const confirmMaterialSignature = () => {
                if (!signerName || signerName.length < 2) return alert("יש להזין שם מלא");
                if (!signerId || signerId.length !== 9 || isNaN(signerId)) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הבקשה");

                const signature = { name: signerName, id: signerId, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() };
                executeMaterialAllocation(materialSignData, signature);
                setSignerName(""); setSignerId("");
            };

            const executeMaterialAllocation = (data, signature) => {
                if (data.type === 'stock') {
                    const item = inventory.find(i => i.id === data.itemId);
                    db.collection("inventory").doc(data.itemId).update({ quantity: item.quantity - data.qty });
                }

                const currentMaterials = materialsModal.allocatedMaterials || [];
                const newMaterialObj = { id: Date.now().toString(), name: data.itemName, quantity: data.qty, date: new Date().toISOString(), status: 'pending' };
                if (signature) newMaterialObj.signature = signature;

                db.collection("projects").doc(materialsModal.id).update({
                    allocatedMaterials: [...currentMaterials, newMaterialObj]
                });

                setMaterialSignData(null);
                setTimeout(() => {
                    if (window.confirm("הבקשה נרשמה בהצלחה!\n\nהאם תרצה לשלוח כעת הודעת ווצאפ לנהג לעדכון?")) {
                        const msg = `היי, יש בקשת ציוד חדשה לאתר:\n*${materialsModal.name}*\n\nכמות: ${data.qty} x ${data.itemName}\nאנא בדוק באפליקציה!`;
                        window.location.href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
                    }
                    setMaterialsModal(null);
                }, 100);
            };
            
            const handleInventoryReceive = async (e) => {
                e.preventDefault();
                const qty = Number(e.target.qty.value);
                const files = e.target.deliveryPhotos.files;
                
                if(!invSignerName) return alert("יש להזין שם המקבל/נהג");
                if(invSignerId.length !== 9) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                if(!invSigPad.current || invSigPad.current.isEmpty()) return alert("חובה לחתום על המסך");
                if(files.length === 0) return alert("חובה לצלם/לעלות תעודת משלוח או תמונה של הסחורה");
                
                setIsUploading(true);
                
                try {
                    await processAndUploadFiles(files, "inventory_photos", {
                        itemId: inventoryItemModal.id,
                        type: 'delivery_note',
                        qtyAdded: qty,
                        signatureName: invSignerName,
                        signatureData: invSigPad.current.toDataURL()
                    });

                    const currentItem = inventory.find(i => i.id === inventoryItemModal.id);
                    await db.collection("inventory").doc(inventoryItemModal.id).update({ quantity: currentItem.quantity + qty });
                    
                    logAttendanceAndLocation(`קליטת סחורה מחסן: הוזנו ${qty} יח' של ${currentItem.name}`);

                    alert("הסחורה נקלטה בהצלחה!");
                    
                    setInvSignerName(""); setInvSignerId(""); e.target.reset();
                    setInvModalTab("gallery");
                } catch (error) {
                    alert("שגיאה בתהליך הקליטה.");
                }
                setIsUploading(false);
            };

            const alertStrictInventory = () => {
                alert("⛔ על פי נהלי החברה, לא ניתן לשנות מלאי באופן ידני!\n\nהורדת מלאי מתבצעת אוטומטית בעת שיוך חומרים לפרויקט.\nהוספת מלאי מתבצעת רק דרך כפתור 'ניהול מלאי וקליטה' שדורש העלאת תעודת משלוח וחתימה.");
            };

            const deleteAttendanceRecord = (id) => { if(window.confirm("למחוק את הדיווח?")) db.collection("attendance").doc(id).delete(); };

            const exportPDF = (proj, callback = null) => {
                const element = document.createElement('div');
                const teamNames = (Array.isArray(proj.assignedUsers) && proj.assignedUsers.length > 0) 
                    ? proj.assignedUsers.map(uid => { const u = users.find(x=>x.id===uid); return u ? u.name : ''; }).filter(Boolean).join(', ')
                    : 'טרם שובץ צוות';

                let milestonesHtml = stages.map(stage => {
                    const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                    const sig = proj.signatures && proj.signatures[stage.id];
                    let signatureImage = '';
                    if (sig && sig.signatureData) {
                        signatureImage = `<tr><td colspan="4" style="text-align:center; padding: 10px; border-bottom: 1px solid #ddd;"><img src="${sig.signatureData}" style="max-height: 80px; border: 1px solid #ccc; border-radius: 4px;" crossorigin="anonymous" /></td></tr>`;
                    }
