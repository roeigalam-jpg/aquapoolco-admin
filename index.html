<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquapoolco Elite Management</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [projects, setProjects] = useState([]);
            const [pass, setPass] = useState("");
            const [showAdd, setShowAdd] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            // משיכת נתונים עם הגנה מלאה מקריסות
            useEffect(() => {
                try {
                    const unsub = db.collection("projects").onSnapshot(s => {
                        try {
                            const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                            setProjects(data);
                            setErrorMsg(""); 
                        } catch(err) {
                            setErrorMsg("שגיאה בהצגת הפרויקטים: " + err.message);
                        }
                    }, err => {
                        setErrorMsg("שגיאת התחברות לשרת: " + err.message);
                    });
                    return unsub;
                } catch(err) {
                    setErrorMsg("מערכת הנתונים לא מגיבה: " + err.message);
                }
            }, []);

            const toggle = (id, step) => {
                const p = projects.find(x => x.id === id);
                if(!p || !p.checklist) return; // הגנה: אם אין צ'ק ליסט, אל תקרוס
                db.collection("projects").doc(id).update({
                    [`checklist.${step}`]: !p.checklist[step]
                }).catch(err => alert("שגיאה בעדכון: " + err.message));
            };

            const deleteProj = (id) => {
                if(window.confirm("האם אתה בטוח שברצונך למחוק פרויקט זה?")) {
                    db.collection("projects").doc(id).delete();
                }
            };

            if (errorMsg) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass p-10 rounded-2xl border border-red-500 text-center">
                            <h2 className="text-red-500 text-2xl font-bold mb-4">⚠️ תקלה במערכת</h2>
                            <p>{errorMsg}</p>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass p-10 rounded-[2rem] w-full max-w-sm text-center border-t-4 border-blue-500 shadow-2xl">
                            <h1 className="text-4xl font-black mb-2 italic text-white tracking-tighter">AQUAPOOLCO</h1>
                            <p className="text-blue-500 font-bold mb-8 uppercase text-sm">Elite Management</p>
                            <input type="password" placeholder="סיסמה (2026)" onChange={e=>setPass(e.target.value)} className="w-full p-4 bg-slate-800 rounded-xl mb-4 text-center outline-none border border-white/10 text-xl text-white" />
                            <button onClick={() => pass === "2026" ? setIsLoggedIn(true) : alert("סיסמה שגויה")} className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black transition">כניסה למערכת</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-8 max-w-5xl mx-auto pb-20">
                    <header className="flex justify-between items-center mb-10 glass p-6 rounded-2xl border-b border-white/10">
                        <div className="text-2xl font-black italic tracking-tighter">AQUAPOOLCO <span className="text-blue-500">CHEN</span></div>
                        <button onClick={() => setShowAdd(true)} className="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full font-bold shadow-lg transition">➕ הוסף פרויקט</button>
                    </header>

                    <div className="grid gap-6">
                        {projects.length === 0 && (
                            <div className="text-center text-slate-500 mt-10 p-10 glass rounded-2xl">אין פרויקטים במערכת. לחץ על "הוסף פרויקט" כדי להתחיל.</div>
                        )}
                        
                        {projects.map(p => (
                            <div key={p.id} className="glass p-6 rounded-[2rem] border-r-4 border-blue-500 relative">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-1 text-white">{p.name || "פרויקט ללא שם"}</h3>
                                        <p className="text-blue-400 text-sm font-bold">📍 {p.address || "כתובת לא הוזנה"} | 👷 {p.team || "צוות לא הוגדר"}</p>
                                    </div>
                                    <button onClick={() => deleteProj(p.id)} className="text-slate-500 hover:text-red-500 transition px-3 py-1 bg-white/5 rounded-lg text-sm">🗑️ מחק</button>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                    <div className="bg-slate-900/50 p-4 rounded-xl">
                                        <h4 className="text-slate-400 text-xs font-bold uppercase mb-3">צ'ק ליסט שלבי טיח:</h4>
                                        {Object.entries({
                                            prep: "הכנת תשתית",
                                            sealing1: "איטום א'",
                                            plaster: "טיח מיישר",
                                            sealing2: "איטום ב'",
                                            flood: "בדיקת הצפה"
                                        }).map(([key, label]) => {
                                            const isChecked = p.checklist ? p.checklist[key] : false;
                                            return (
                                                <div key={key} onClick={() => toggle(p.id, key)} className="flex items-center justify-between p-2 hover:bg-white/5 rounded-lg cursor-pointer mb-1 transition">
                                                    <span className={`font-bold text-sm ${isChecked ? "text-slate-500 line-through" : "text-white"}`}>{label}</span>
                                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${isChecked ? 'bg-blue-500 border-blue-500' : 'border-slate-600'}`}>
                                                        {isChecked && <span className="text-white text-xs">✓</span>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="bg-slate-900/50 p-4 rounded-xl flex flex-col justify-center gap-3">
                                        <button className="w-full bg-blue-600/20 text-blue-400 py-3 rounded-xl text-sm font-bold border border-blue-500/20">📷 צלם תיעוד שטח</button>
                                        <button onClick={() => window.print()} className="w-full bg-white/5 text-white py-3 rounded-xl text-sm font-bold border border-white/10 hover:bg-white/10 transition">📄 שמור דו"ח PDF</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {showAdd && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <form onSubmit={e => {
                                e.preventDefault();
                                db.collection("projects").add({
                                    name: e.target.n.value,
                                    address: e.target.a.value,
                                    team: e.target.t.value,
                                    checklist: {prep:false, sealing1:false, plaster:false, sealing2:false, flood:false},
                                    createdAt: new Date()
                                }).then(() => setShowAdd(false)).catch(err => alert("שגיאה בשמירה: " + err.message));
                            }} className="glass p-8 rounded-3xl w-full max-w-md space-y-5 border-t-4 border-blue-500 shadow-2xl">
                                <h2 className="text-white text-2xl font-black mb-4">פרויקט חדש</h2>
                                <input name="n" placeholder="שם הלקוח / הפרויקט" className="w-full p-4 bg-slate-800 text-white rounded-xl outline-none font-bold" required />
                                <input name="a" placeholder="כתובת האתר" className="w-full p-4 bg-slate-800 text-white rounded-xl outline-none font-bold" required />
                                <select name="t" className="w-full p-4 bg-slate-800 text-white rounded-xl outline-none font-bold appearance-none">
                                    <option>צוות א' - אלכס</option>
                                    <option>צוות ב' - סעיד</option>
                                    <option>צוות ג' - קבלן משנה</option>
                                </select>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black transition">פתח פרויקט ועדכן צוות</button>
                                <button type="button" onClick={()=>setShowAdd(false)} className="w-full text-slate-500 font-bold">ביטול</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
