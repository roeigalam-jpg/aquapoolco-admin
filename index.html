<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquapoolco Elite ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; }
        .status-cell:hover { filter: brightness(1.1); border-color: rgba(255,255,255,0.2); }
        
        .status-0 { background-color: #334155; color: #cbd5e1; } 
        .status-1 { background-color: #f59e0b; color: #fff; } 
        .status-2 { background-color: #ef4444; color: #fff; } 
        .status-3 { background-color: #10b981; color: #fff; } 

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("system-ui");
            const [portalName, setPortalName] = useState("אקוופולקו חן בע\"מ");
            const [officeEmail, setOfficeEmail] = useState("info@aquapoolco.co.il");
            
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [showAddUser, setShowAddUser] = useState(false);
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            
            const [statusModal, setStatusModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null); 
            
            const [signRequirement, setSignRequirement] = useState(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const [signerName, setSignerName] = useState("");
            const [signerId, setSignerId] = useState("");

            const [materialsModal, setMaterialsModal] = useState(null);

            useEffect(() => {
                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appFont) setAppFont(d.appFont);
                        if (d.portalName) setPortalName(d.portalName);
                        if (d.officeEmail) setOfficeEmail(d.officeEmail);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("users").onSnapshot(snapshot => {
                    setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("inventory").onSnapshot(snapshot => {
                    setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, []);

            useEffect(() => {
                if (signRequirement && canvasRef.current) {
                    sigPad.current = new SignaturePad(canvasRef.current, { backgroundColor: 'rgb(255, 255, 255)' });
                }
            }, [signRequirement]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    setCurrentUser({ name: "רועי גלם (מנכ''ל)", username: "roeigalam", role: "admin", department: "הנהלה" });
                    return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) setCurrentUser(userDoc);
                else alert("שם משתמש או סיסמה שגויים. נסה שנית.");
            };

            const exportPDF = (proj, callback = null) => {
                const element = document.createElement('div');
                
                let milestonesHtml = stages.map(stage => {
                    const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                    const sig = proj.signatures && proj.signatures[stage.id];
                    let signatureImage = '';
                    if (sig && sig.signatureData) {
                        signatureImage = `<tr><td colspan="4" style="text-align:center; padding: 10px; border-bottom: 1px solid #ddd;"><img src="${sig.signatureData}" style="max-height: 80px; border: 1px solid #ccc; border-radius: 4px;" crossorigin="anonymous" /></td></tr>`;
                    }
                    return `
                        <tr>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold;">${stage.label}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${statusLabels[code]}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${sig ? `${sig.name}<br/><span style="color:gray; font-size: 10px;">ת.ז: ${sig.id}</span>` : '-'}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${sig ? new Date(sig.date).toLocaleString('he-IL') : '-'}</td>
                        </tr>
                        ${signatureImage}
                    `;
                }).join('');

                element.innerHTML = `
                    <div style="direction: rtl; font-family: Arial, sans-serif; padding: 40px; color: #333; letter-spacing: 0px; word-spacing: 2px;">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <img src="${LOGO_URL}" style="max-height: 100px;" crossorigin="anonymous" />
                        </div>
                        <h1 style="color: ${appColor}; text-align: center; border-bottom: 2px solid ${appColor}; padding-bottom: 10px; font-size: 24px;">${portalName} - דוח סטטוס פרויקט</h1>
                        <h2 style="text-align: center; margin-top: 20px; font-size: 20px;">פרויקט: ${proj.name}</h2>
                        
                        <div style="background-color: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 14px; border: 1px solid #e2e8f0;">
                            <p style="margin: 5px 0;"><strong>כתובת האתר:</strong> ${proj.address}</p>
                            <p style="margin: 5px 0;"><strong>מחלקה מבצעת:</strong> ${proj.department || 'כללי'}</p>
                            <p style="margin: 5px 0;"><strong>אימייל לקוח:</strong> ${proj.clientEmail || 'לא הוזן'}</p>
                            <p style="margin: 5px 0;"><strong>תאריך הפקת דוח:</strong> ${new Date().toLocaleString('he-IL')}</p>
                        </div>

                        <h3 style="color: #475569; margin-bottom: 15px; font-size: 16px;">פירוט אבני דרך וחתימות:</h3>
                        <table style="width: 100%; border-collapse: collapse; text-align: right; border: 1px solid #e2e8f0; font-size: 14px;">
                            <thead>
                                <tr style="background-color: ${appColor}; color: white;">
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">שלב עבודה</th>
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">סטטוס</th>
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">מאשר</th>
                                    <th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">תאריך</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${milestonesHtml}
                            </tbody>
                        </table>
                        
                        <p style="text-align: center; margin-top: 40px; font-size: 12px; color: #94a3b8;">הופק אוטומטית באמצעות מערכת ה-ERP של ${portalName}</p>
                    </div>
                `;

                const opt = {
                    margin:       10,
                    filename:     `דוח_פרויקט_${proj.name.replace(/ /g, '_')}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true }, 
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                html2pdf().set(opt).from(element).save().then(() => {
                    if (callback) callback();
                });
            };

            const confirmSignatureAndStatus = () => {
                if (!signerName || signerName.length < 2) return alert("יש להזין שם מלא");
                if (!signerId || signerId.length !== 9 || isNaN(signerId)) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                if (sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס");

                const proj = projects.find(p => p.id === signRequirement.projId);
                
                db.collection("projects").doc(signRequirement.projId).update({
                    [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                    [`signatures.${signRequirement.stageId}`]: {
                        name: signerName, id: signerId, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL()
                    }
                });

                setSignRequirement(null);
                setStatusModal(null);
                setSignerName("");
                setSignerId("");
            };

            const handleAllocateMaterial = (e) => {
                e.preventDefault();
                const invId = e.target.item.value;
                const qty = Number(e.target.qty.value);
                const item = inventory.find(i => i.id === invId);
                if(!item || item.quantity < qty) return alert("אין מספיק מלאי במחסן!");

                db.collection("inventory").doc(invId).update({ quantity: item.quantity - qty });
                const proj = projects.find(p => p.id === materialsModal.id);
                const currentMaterials = proj.allocatedMaterials || [];
                db.collection("projects").doc(proj.id).update({
                    allocatedMaterials: [...currentMaterials, { id: Date.now().toString(), name: item.name, quantity: qty, date: new Date().toISOString(), status: 'pending' }]
                });
                alert("החומר שויך בהצלחה ונשלחה משימה לנהג!");
                setMaterialsModal(null);
            };

            const markMaterialDelivered = (projId, matId) => {
                const proj = projects.find(p => p.id === projId);
                const updatedMaterials = proj.allocatedMaterials.map(m => 
                    m.id === matId ? { ...m, status: 'delivered', deliveryDate: new Date().toISOString() } : m
                );
                db.collection("projects").doc(projId).update({ allocatedMaterials: updatedMaterials });
            };

            const confirmFinishProject = (e) => {
                e.preventDefault();
                const toEmail = e.target.email.value;
                const ccOffice = e.target.cc.checked;
                const proj = projects.find(p => p.id === finishModal.id);
                
                db.collection("projects").doc(finishModal.id).update({ isFinished: true, finishedAt: new Date().toISOString() });
                
                const subject = `פרויקט הסתיים: ${finishModal.name}`;
                const body = `שלום,\n\nהפרויקט ${finishModal.name} (בכתובת: ${finishModal.address}) סומן כ"הסתיים" במערכת ה-ERP.\n\n*שים לב: מצורף לדוא"ל זה קובץ ה-PDF שירד כרגע למחשב שלך. אנא הוסף אותו באופן ידני לפני השליחה.*\n\nבברכה,\n${portalName}`;
                
                let ccString = ccOffice ? officeEmail : "";
                const mailtoLink = `mailto:${toEmail}?cc=${ccString}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                
                exportPDF(proj, () => {
                    window.location.href = mailtoLink;
                });
                
                setFinishModal(null);
            };

            const deleteProject = (projId) => {
                if (window.confirm("שים לב! זוהי מחיקה לצמיתות (לא לארכיון!). הפרויקט יימחק ממסד הנתונים לחלוטין. להמשיך?")) {
                    db.collection("projects").doc(projId).delete();
                }
            };
            
            // פונקציה לעריכת מחלקה על ידי מנהל
            const handleEditDepartment = (proj) => {
                if (currentUser.role !== 'admin') return;
                const currentDept = proj.department || 'כללי';
                const newDept = window.prompt(`ערוך שיוך מחלקה לפרויקט "${proj.name}":\n(משתמשי שטח השייכים למחלקה זו בלבד יראו את הפרויקט)`, currentDept);
                
                if (newDept !== null) {
                    const finalDept = newDept.trim() || 'כללי';
                    db.collection("projects").doc(proj.id).update({ department: finalDept });
                }
            };

            const handleFinanceChange = (projId, field, value) => {
                db.collection("projects").doc(projId).update({ [field]: Number(value) });
            };

            const filteredProjects = projects.filter(p => {
                const pName = p.name || "";
                const pAddress = p.address || "";
                const matchesSearch = pName.includes(searchTerm) || pAddress.includes(searchTerm);
                if (!matchesSearch) return false;
                if (currentUser && currentUser.role === 'worker') return p.department === currentUser.department;
                return true; 
            });

            const activeProjectsList = filteredProjects.filter(p => !p.isFinished);
            const finishedProjectsList = filteredProjects.filter(p => p.isFinished);

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <style>{`body { font-family: ${appFont}, sans-serif !important; } .theme-bg { background-color: ${appColor} !important; } .theme-text { color: ${appColor} !important; }`}</style>
                        <form onSubmit={handleLogin} className="glass p-12 rounded-[2rem] w-full max-w-sm text-center shadow-2xl" style={{ borderTop: `4px solid ${appColor}` }}>
                            <div className="flex justify-center mb-6">
                                <img src={LOGO_URL} alt="Logo" className="h-20 object-contain rounded-xl bg-white p-2 shadow-lg" onError={(e) => { e.target.style.display='none'; }} />
                            </div>
                            <h1 className="text-2xl font-black mb-1 text-white">כניסה למערכת ERP</h1>
                            <p className="font-bold mb-8 uppercase text-xs tracking-widest theme-text">{portalName}</p>
                            
                            <input type="text" placeholder="שם משתמש" required value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-4 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold" />
                            <input type="password" placeholder="סיסמה" required value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-6 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold" />
                            
                            <button type="submit" className="w-full text-white py-4 rounded-xl font-black transition-all shadow-lg theme-bg filter hover:brightness-110">התחברות מאובטחת</button>
                        </form>
                    </div>
                );
            }

            const roleLabels = { admin: "מנכ''ל", warehouse: "מנהל מחסן", driver: "נהג חלוקה", worker: "צוות ביצוע" };

            return (
                <div className="min-h-screen flex flex-col">
                    <style>{`
                        :root { --theme-color: ${appColor}; --theme-font: ${appFont}; }
                        body { font-family: var(--theme-font), sans-serif !important; }
                        .theme-bg { background-color: var(--theme-color) !important; color: white !important; }
                        .theme-text { color: var(--theme-color) !important; }
                        .theme-border { border-color: var(--theme-color) !important; }
                    `}</style>

                    <header className="glass px-6 py-4 flex justify-between items-center sticky top-0 z-30 overflow-x-auto border-b border-white/5">
                        <div className="flex items-center gap-6 min-w-max">
                            <div className="flex items-center gap-4 border-l border-white/10 pl-6">
                                <img src={LOGO_URL} alt="Logo" className="h-10 bg-white rounded p-1 object-contain" onError={(e) => e.target.style.display='none'} />
                                <div>
                                    <div className="text-lg font-black text-white leading-tight">{portalName}</div>
                                    <div className="text-[10px] font-bold uppercase tracking-widest theme-text">מחובר כ: {currentUser.name} | {roleLabels[currentUser.role]}</div>
                                </div>
                            </div>
                            <nav className="flex gap-2">
                                <button onClick={() => setActiveTab("board")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'board' ? 'theme-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📊 לוח עבודה</button>
                                
                                <button onClick={() => setActiveTab("archive")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'archive' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📁 ארכיון</button>

                                {(currentUser.role === 'admin' || currentUser.role === 'driver') && (
                                    <button onClick={() => setActiveTab("deliveries")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'deliveries' ? 'theme-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>🚚 משימות חלוקה</button>
                                )}

                                {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                    <button onClick={() => setActiveTab("inventory")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'inventory' ? 'theme-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📦 מלאי מחסן</button>
                                )}
                                {currentUser.role === 'admin' && (
                                    <>
                                        <button onClick={() => setActiveTab("finance")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'finance' ? 'theme-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>💰 כספים</button>
                                        <button onClick={() => setActiveTab("users")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'users' ? 'theme-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>👥 משתמשים</button>
                                        <button onClick={() => setActiveTab("settings")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'settings' ? 'theme-bg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>⚙️ הגדרות</button>
                                    </>
                                )}
                            </nav>
                        </div>
                        <div className="flex gap-4 items-center min-w-max pr-4">
                            {currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="theme-bg px-6 py-2 rounded-full font-bold shadow-lg transition-all text-sm filter hover:brightness-110">➕ פרויקט חדש</button>}
                            <button onClick={() => setCurrentUser(null)} className="text-slate-500 hover:text-white font-bold text-sm transition-colors">התנתק</button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 md:p-8">
                        
                        {activeTab === "board" && (
                            <div className="animate-fade-in max-w-[1600px] mx-auto">
                                <div className="flex justify-between items-end mb-6 gap-4 flex-wrap">
                                    <input type="text" placeholder="🔍 חפש פרויקט פעיל..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500 w-full md:w-80 font-bold" />
                                </div>

                                <div className="table-container bg-[#1e293b]/50 shadow-2xl">
                                    <table className="w-full text-right">
                                        <thead>
                                            <tr>
                                                <th className="w-2"></th>
                                                <th className="min-w-[250px]">שם פרויקט, מיקום ומחלקה</th>
                                                {stages.map(s => <th key={s.id} className="text-center">{s.label}</th>)}
                                                <th>התקדמות</th>
                                                <th className="text-center">פעולות וניהול</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {activeProjectsList.length === 0 && <tr><td colSpan={stages.length + 4} className="text-center py-10 text-slate-500">אין פרויקטים פעילים להציג.</td></tr>}
                                            {activeProjectsList.map(proj => {
                                                const doneCount = stages.filter(s => proj.statuses && proj.statuses[s.id] === 3).length;
                                                const progress = stages.length ? Math.round((doneCount / stages.length) * 100) : 0;
                                                
                                                return (
                                                    <tr key={proj.id} className="group transition-colors">
                                                        <td className="border-r-4 theme-border"></td>
                                                        <td>
                                                            <div className="font-black text-white text-lg flex items-center gap-2">{proj.name}</div>
                                                            <div className="flex items-center gap-2 mt-1 mb-1">
                                                                <span className="text-xs text-slate-400">📍 {proj.address}</span>

                                    <div className="bg-slate-900/50 p-6 rounded-2xl border border-white/5">
                                        <h3 className="text-xl font-bold text-white mb-4">🏷️ שמות הסטטוסים</h3>
                                        <div className="space-y-4">
                                            {[ { code: 0, title: "התחלתי", color: "border-slate-500" }, { code: 1, title: "בתהליך", color: "border-amber-500" }, { code: 2, title: "בעיה", color: "border-red-500" }, { code: 3, title: "סיום", color: "border-emerald-500" } ].map(opt => (
                                                <div key={opt.code} className={`pl-4 border-l-4 ${opt.color}`}>
                                                    <label className="text-xs text-slate-400 block mb-1">{opt.title}</label>
                                                    <input value={statusLabels[opt.code]} onChange={(e) => setStatusLabels({...statusLabels, [opt.code]: e.target.value})} className="w-full bg-slate-800 text-white px-3 py-2 rounded-lg outline-none border border-slate-700" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => { db.collection("settings").doc("general").update({ stages, statusLabels, appColor, appFont, portalName, officeEmail }); alert("ההגדרות נשמרו בהצלחה לכלל המשתמשים!"); }} className="w-full mt-8 text-white py-4 rounded-xl font-black shadow-lg transition theme-bg filter hover:brightness-110">💾 שמור הגדרות מערכת</button>
                            </div>
                        )}
                        
                    </main>

                    {/* חלון סיום והעברה לארכיון (הכפתור הירוק ✅) */}
                    {finishModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fade-in">
                            <form onSubmit={confirmFinishProject} className="glass p-8 rounded-[2rem] w-full max-w-md border-t-4 border-emerald-500">
                                <h2 className="text-white text-2xl font-black mb-2">✅ סיום פרויקט והעברה לארכיון</h2>
                                <p className="text-slate-400 text-sm mb-6 border-b border-white/10 pb-4">
                                    הפרויקט **{finishModal.name}** יוסר מהלוח המרכזי ויישמר בארכיון הפעילות.
                                </p>
                                <div className="space-y-4">
                                    <div className="bg-blue-900/30 border border-blue-500/30 p-4 rounded-xl mb-4">
                                        <p className="text-blue-300 text-xs font-bold">📄 המערכת תוריד הרגע דוח PDF למחשב שלך.</p>
                                        <p className="text-blue-300 text-xs font-bold mt-1">📧 תוכנת המייל תיפתח אוטומטית, אנא צרף את קובץ ה-PDF ידנית לאימייל לפני השליחה.</p>
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-400 font-bold block mb-1">לאיזה מייל לשלוח הודעת סיום ללקוח?</label>
                                        <input name="email" type="email" defaultValue={finishModal.email} placeholder="client@email.com (אופציונלי)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none border border-slate-700" />
                                    </div>
                                    <div className="flex items-center gap-3 bg-slate-900/50 p-4 rounded-xl border border-white/5 cursor-pointer">
                                        <input type="checkbox" id="ccOffice" name="cc" defaultChecked className="w-5 h-5 accent-emerald-500" />
                                        <label htmlFor="ccOffice" className="text-white font-bold text-sm cursor-pointer">שלח עותק למשרד ({officeEmail})</label>
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-6 pt-6 border-t border-white/10">
                                    <button type="submit" className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black transition">הפק PDF ופתח מייל</button>
                                    <button type="button" onClick={() => setFinishModal(null)} className="px-6 text-slate-400 font-bold hover:text-white transition">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* מודאל שינוי סטטוס וחתימה */}
                    {statusModal && !signRequirement && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fade-in" onClick={() => setStatusModal(null)}>
                            <div className="glass p-8 rounded-[2rem] w-full max-w-sm" style={{ borderTop: `4px solid ${appColor}` }} onClick={e=>e.stopPropagation()}>
                                <h3 className="text-center text-slate-400 text-sm font-bold">{statusModal.projName}</h3>
                                <h2 className="text-center text-2xl font-black text-white mb-6 border-b border-white/10 pb-4">{statusModal.stageLabel}</h2>
                                <div className="space-y-3">
                                    {[ {code: 0, label: statusLabels[0], color: "status-0"}, {code: 1, label: statusLabels[1], color: "status-1"}, {code: 2, label: statusLabels[2], color: "status-2"}, {code: 3, label: statusLabels[3], color: "status-3"} ].map(opt => (
                                        <button key={opt.code} onClick={() => {
                                            if (opt.code !== statusModal.currentCode) setSignRequirement({ projId: statusModal.projId, stageId: statusModal.stageId, code: opt.code, stageLabel: statusModal.stageLabel, newStatus: opt.label });
                                            else setStatusModal(null);
                                        }} className={`w-full py-4 rounded-xl font-black text-lg ${opt.color} transition-transform hover:scale-[1.02] ${statusModal.currentCode===opt.code?'ring-4 ring-white':''}`}>{opt.label}</button>
                                    ))}
                                </div>
                                <button onClick={()=>setStatusModal(null)} className="w-full mt-4 text-slate-400 font-bold pt-4 hover:text-white transition">ביטול</button>
                            </div>
                        </div>
                    )}

                    {signRequirement && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="glass p-8 rounded-[2rem] w-full max-w-md shadow-2xl" style={{ borderTop: `4px solid ${appColor}` }}>
                                <h2 className="text-white text-center text-2xl font-black mb-2">אישור ושינוי סטטוס</h2>
                                <p className="text-center text-slate-400 text-sm mb-6 border-b border-white/10 pb-4">משנה לסטטוס: <span className="theme-text font-bold">{signRequirement.newStatus}</span></p>
                                <div className="space-y-4">
                                    <input value={signerName} onChange={e=>setSignerName(e.target.value)} placeholder="שם מלא (מאשר)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none border border-slate-700 focus:border-blue-500" required />
                                    <input type="text" maxLength="9" value={signerId} onChange={e=>setSignerId(e.target.value.replace(/\D/g,''))} placeholder="תעודת זהות (9 ספרות)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none border border-slate-700 tracking-widest text-center text-xl font-bold focus:border-blue-500" required />
                                    <div>
                                        <label className="text-xs text-slate-400 font-bold mb-1 flex justify-between"><span>חתימה:</span><span onClick={() => sigPad.current.clear()} className="text-blue-400 underline cursor-pointer">נקה</span></label>
                                        <canvas ref={canvasRef} className="signature-pad w-full h-40" />
                                    </div>
                                </div>
                                <div className="flex gap-3 pt-6 mt-6 border-t border-white/10">
                                    <button onClick={confirmSignatureAndStatus} className="flex-1 text-white py-4 rounded-xl font-black theme-bg filter hover:brightness-110 transition">חתום ואשר</button>
                                    <button onClick={() => {setSignRequirement(null); setStatusModal(null);}} className="px-6 text-slate-400 font-bold hover:text-white transition">ביטול</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* הוספת משתמש */}
                    {showAddUser && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <form onSubmit={e => { 
                                e.preventDefault(); 
                                db.collection("users").add({ name: e.target.n.value, username: e.target.u.value, password: e.target.p.value, role: newUserRole, department: newUserRole === 'worker' ? e.target.d.value : 'הנהלה/מטה' }); 
                                setShowAddUser(false); 
                            }} className="glass p-8 rounded-[2rem] w-full max-w-sm space-y-4">
                                <h2 className="text-white text-2xl font-black mb-2">משתמש חדש במערכת</h2>
                                <input name="n" placeholder="שם העובד (מוצג במערכת)" className="w-full p-3 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                <div className="flex gap-2">
                                    <input name="u" placeholder="שם משתמש" className="w-full p-3 bg-slate-900 text-white rounded-xl border border-blue-500" required />
                                    <input name="p" type="password" placeholder="סיסמה" className="w-full p-3 bg-slate-900 text-white rounded-xl border border-blue-500" required />
                                </div>
                                <select value={newUserRole} onChange={(e) => setNewUserRole(e.target.value)} className="w-full p-4 bg-slate-900 text-white rounded-xl border border-slate-700 mt-2">
                                    <option value="worker">צוות שטח (מורשה מחלקה ספציפית)</option>
                                    <option value="driver">נהג חלוקה (רואה הכל)</option>
                                    <option value="warehouse">מנהל מחסן (רואה הכל)</option>
                                    <option value="admin">מנהל מערכת (גישה מלאה להכל)</option>
                                </select>
                                {newUserRole === 'worker' && (
                                    <div>
                                        <label className="text-xs text-emerald-400 font-bold mb-1 block">שיוך מחלקתי (חובה)</label>
                                        <input name="d" placeholder="למשל: 'מחלקת טיח'" className="w-full p-3 bg-slate-900 text-white rounded-xl border border-emerald-500" required />
                                    </div>
                                )}
                                <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-bold mt-4">צור הרשאה</button>
                                <button type="button" onClick={()=>setShowAddUser(false)} className="w-full text-slate-400 font-bold">ביטול</button>
                            </form>
                        </div>
                    )}

                    {showAddInventory && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fade-in">
                            <form onSubmit={e => { e.preventDefault(); db.collection("inventory").add({ name: e.target.n.value, category: e.target.c.value, quantity: Number(e.target.q.value) }); setShowAddInventory(false); }} className="glass p-8 rounded-[2rem] w-full max-w-sm space-y-4 border-t-4 border-amber-500">
                                <h2 className="text-white text-2xl font-black">הוספת פריט למלאי</h2>
                                <input name="n" placeholder="שם הפריט" className="w-full p-4 bg-slate-900 text-white rounded-xl" required />
                                <input name="c" placeholder="קטגוריה" className="w-full p-4 bg-slate-900 text-white rounded-xl" required />
                                <input name="q" type="number" placeholder="כמות" className="w-full p-4 bg-slate-900 text-white rounded-xl" required />
                                <button type="submit" className="w-full bg-amber-600 text-white py-4 rounded-xl font-bold">שמור במחסן</button>
                                <button type="button" onClick={()=>setShowAddInventory(false)} className="w-full text-slate-400 font-bold">ביטול</button>
                            </form>
                        </div>
                    )}

                    {materialsModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="glass p-8 rounded-[2rem] w-full max-w-md">
                                <h2 className="text-white text-2xl font-black mb-2">📦 ציוד וחומרים באתר</h2>
                                <p className="text-slate-400 text-sm mb-6 border-b border-white/10 pb-4">פרויקט: <span className="text-white font-bold">{materialsModal.name}</span></p>
                                
                                {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                    <form onSubmit={handleAllocateMaterial} className="space-y-4 mb-8 bg-slate-900/50 p-4 rounded-xl border border-white/5">
                                        <select name="item" className="w-full p-3 bg-slate-800 text-white rounded-xl border border-slate-700" required>
                                            <option value="">-- בחר פריט למשיכה --</option>
                                            {inventory.filter(i => i.quantity > 0).map(i => <option key={i.id} value={i.id}>{i.name} (במלאי: {i.quantity})</option>)}
                                        </select>
                                        <input name="qty" type="number" min="1" placeholder="כמות" className="w-full p-3 bg-slate-800 text-white rounded-xl border border-slate-700" required />
                                        <button type="submit" className="w-full bg-amber-600 text-white py-3 rounded-xl font-bold">שייך לפרויקט ושלח לנהג</button>
                                    </form>
                                )}

                                <ul className="space-y-2 text-sm max-h-48 overflow-y-auto pr-2">
                                    {materialsModal.allocatedMaterials && materialsModal.allocatedMaterials.length > 0 ? 
                                        materialsModal.allocatedMaterials.map((m, i) => (
                                            <li key={i} className="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-white/5">
                                                <div>
                                                    <div className="text-white font-bold">{m.name} <span className="text-amber-400 px-2">x{m.quantity}</span></div>
                                                    <div className={`text-xs mt-1 font-bold ${m.status === 'delivered' ? 'text-emerald-400' : 'text-amber-500'}`}>
                                                        {m.status === 'delivered' ? '✓ סופק לאתר' : '⏳ ממתין להובלה'}
                                                    </div>
                                                </div>
                                            </li>
                                        )) : <li className="text-slate-500 text-center py-4">אין חומרים ששויכו.</li>
                                    }
                                </ul>
                                <button onClick={()=>setMaterialsModal(null)} className="w-full mt-6 text-slate-400 font-bold">סגור</button>
                            </div>
                        </div>
                    )}

                    {showAddProject && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <form onSubmit={e => { 
                                e.preventDefault(); 
                                db.collection("projects").add({ 
                                    name: e.target.n.value, address: e.target.a.value, clientEmail: e.target.e.value, department: e.target.d.value, statuses: {}, isFinished: false, createdAt: firebase.firestore.Timestamp.now() 
                                }).then(() => setShowAddProject(false)); 
                            }} className="glass p-10 rounded-[2rem] w-full max-w-md space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]" style={{ borderTop: `4px solid ${appColor}` }}>
                                <h2 className="text-white text-center text-2xl font-black mb-4">הקמת פרויקט חדש</h2>
                                <div><label className="text-xs text-slate-400 font-bold">שם הפרויקט</label><input name="n" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-slate-700" required /></div>
                                <div><label className="text-xs theme-text font-bold">* כתובת לניווט</label><input name="a" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border theme-border" required /></div>
                                <div><label className="text-xs text-emerald-400 font-bold">אימייל לקוח (לעדכונים)</label><input name="e" type="email" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-emerald-500" /></div>
                                <div><label className="text-xs text-amber-400 font-bold">שיוך למחלקה</label><input name="d" placeholder="'מחלקת טיח'" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-amber-500" required /></div>
                                <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black mt-2 filter hover:brightness-110">הקם פרויקט</button>
                                <button type="button" onClick={()=>setShowAddProject(false)} className="w-full text-slate-400 font-bold">ביטול</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
