<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquapoolco Elite ERP</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; }
        .status-cell:hover { filter: brightness(1.1); border-color: rgba(255,255,255,0.2); }
        
        .status-0 { background-color: #334155; color: #cbd5e1; } 
        .status-1 { background-color: #f59e0b; color: #fff; } 
        .status-2 { background-color: #ef4444; color: #fff; } 
        .status-3 { background-color: #10b981; color: #fff; } 

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            
            // שינוי לניהול שם משתמש וסיסמה
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [showAddUser, setShowAddUser] = useState(false);
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            const [statusModal, setStatusModal] = useState(null);
            
            const [signRequirement, setSignRequirement] = useState(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            const [signerName, setSignerName] = useState("");
            const [signerId, setSignerId] = useState("");

            const [materialsModal, setMaterialsModal] = useState(null);

            useEffect(() => {
                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        if (doc.data().stages) setStages(doc.data().stages);
                        if (doc.data().statusLabels) setStatusLabels(doc.data().statusLabels);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => {
                    setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("users").onSnapshot(snapshot => {
                    setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                db.collection("inventory").onSnapshot(snapshot => {
                    setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, []);

            useEffect(() => {
                if (signRequirement && canvasRef.current) {
                    sigPad.current = new SignaturePad(canvasRef.current, { backgroundColor: 'rgb(255, 255, 255)' });
                }
            }, [signRequirement]);

            const handleLogin = (e) => {
                e.preventDefault();
                // משתמש מאסטר חסין
                if (loginUsername === "roee" && loginPassword === "2026") {
                    setCurrentUser({ name: "רועי (מנכ''ל)", role: "admin", department: "הנהלה" });
                    return;
                }
                
                // חיפוש לפי שם משתמש וסיסמה במסד הנתונים
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) {
                    setCurrentUser(userDoc);
                } else {
                    alert("שם משתמש או סיסמה שגויים. נסה שנית.");
                }
            };

            const confirmSignatureAndStatus = () => {
                if (!signerName || signerName.length < 2) return alert("יש להזין שם מלא");
                if (!signerId || signerId.length !== 9 || isNaN(signerId)) return alert("ת.ז חייבת להכיל 9 ספרות בדיוק");
                if (sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס");

                const proj = projects.find(p => p.id === signRequirement.projId);
                
                db.collection("projects").doc(signRequirement.projId).update({
                    [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                    [`signatures.${signRequirement.stageId}`]: {
                        name: signerName,
                        id: signerId,
                        date: new Date().toISOString(),
                        signatureData: sigPad.current.toDataURL()
                    }
                }).then(() => {
                    if (signRequirement.code === 3) {
                        let doneCount = stages.filter(s => 
                            (s.id === signRequirement.stageId ? 3 : (proj.statuses && proj.statuses[s.id])) === 3
                        ).length;
                        let newProgress = stages.length ? Math.round((doneCount / stages.length) * 100) : 0;
                        
                        let subject, body;
                        if (newProgress === 100) {
                            subject = `פרויקט ${proj.name} - דרישת תשלום גמר עבודות גמר`;
                            body = `לקוח יקר,\n\nהרינו לעדכן כי כלל עבודות הגמר בפרויקט ${proj.name} הושלמו בהצלחה ב-100%.\nמצ"ב דרישת תשלום בגין גמר העבודות.\n\nבברכה,\nאקוופולקו חן בע"מ`;
                        } else {
                            subject = `עדכון סטטוס פרויקט ${proj.name} - שלב ${signRequirement.stageLabel} הושלם`;
                            body = `לקוח יקר,\n\nהרינו לעדכן כי השלב "${signRequirement.stageLabel}" בפרויקט ${proj.name} סומן הרגע כ"בוצע" במערכת.\n\nבברכה,\nצוות אקוופולקו חן בע"מ`;
                        }
                        if (proj.clientEmail) {
                            window.location.href = `mailto:${proj.clientEmail}?cc=office@aquapoolco.co.il&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                        }
                    }
                });

                setSignRequirement(null);
                setStatusModal(null);
                setSignerName("");
                setSignerId("");
            };

            const handleAllocateMaterial = (e) => {
                e.preventDefault();
                const invId = e.target.item.value;
                const qty = Number(e.target.qty.value);
                const item = inventory.find(i => i.id === invId);
                if(!item || item.quantity < qty) return alert("אין מספיק מלאי במחסן!");

                db.collection("inventory").doc(invId).update({ quantity: item.quantity - qty });
                const proj = projects.find(p => p.id === materialsModal.id);
                const currentMaterials = proj.allocatedMaterials || [];
                db.collection("projects").doc(proj.id).update({
                    allocatedMaterials: [...currentMaterials, { 
                        id: Date.now().toString(), name: item.name, quantity: qty, date: new Date().toISOString(), status: 'pending' 
                    }]
                });
                alert("החומר שויך בהצלחה ונשלחה משימה לנהג!");
                setMaterialsModal(null);
            };

            const markMaterialDelivered = (projId, matId) => {
                const proj = projects.find(p => p.id === projId);
                const updatedMaterials = proj.allocatedMaterials.map(m => 
                    m.id === matId ? { ...m, status: 'delivered', deliveryDate: new Date().toISOString() } : m
                );
                db.collection("projects").doc(projId).update({ allocatedMaterials: updatedMaterials });
            };

            // סיום פרויקט - שליחת מייל והעברה לארכיון
            const finishProject = (proj) => {
                if(window.confirm(`האם לסמן את פרויקט "${proj.name}" כפרויקט שהסתיים? הוא יוסר מהלוח המרכזי ויועבר לארכיון.`)) {
                    db.collection("projects").doc(proj.id).update({ isFinished: true, finishedAt: new Date().toISOString() });
                    
                    const subject = `פרויקט הסתיים: ${proj.name}`;
                    const body = `שלום,\n\nהפרויקט ${proj.name} (בכתובת: ${proj.address}) סומן כרגע כ"הסתיים" במערכת ה-ERP.\nהפרויקט הועבר לארכיון לצורך תיעוד אבני הדרך והחתימות.\n\nבברכה,\nמערכת אקוופולקו חן`;
                    window.location.href = `mailto:office@aquapoolco.co.il?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                }
            };

            // מחיקת פרויקט (פח אדום) - רק לאדמין
            const deleteProject = (projId) => {
                if (window.confirm("פעולה בלתי הפיכה! האם אתה בטוח שברצונך למחוק לחלוטין את הפרויקט מהמערכת?")) {
                    db.collection("projects").doc(projId).delete();
                }
            };

            // סינון פרויקטים מתקדם: לפי חיפוש, חיתוך בין פרויקטים פעילים לארכיון, ומידור מחלקות
            const filteredProjects = projects.filter(p => {
                const pName = p.name || "";
                const pAddress = p.address || "";
                const matchesSearch = pName.includes(searchTerm) || pAddress.includes(searchTerm);
                if (!matchesSearch) return false;
                
                // הרשאות: צוות שטח רואה רק פרויקטים במחלקה שלו. מנהל/מחסן/נהג רואים הכל.
                if (currentUser && currentUser.role === 'worker') {
                    return p.department === currentUser.department;
                }
                return true; 
            });

            const activeProjectsList = filteredProjects.filter(p => !p.isFinished);
            const finishedProjectsList = filteredProjects.filter(p => p.isFinished);

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <form onSubmit={handleLogin} className="glass p-12 rounded-[2rem] w-full max-w-sm text-center border-t-4 border-blue-500 shadow-2xl">
                            <div className="flex justify-center mb-6">
                                <img src={LOGO_URL} alt="Logo" className="h-20 object-contain rounded-xl bg-white p-2 shadow-lg" onError={(e) => { e.target.style.display='none'; }} />
                            </div>
                            <h1 className="text-2xl font-black mb-1 text-white">כניסה למערכת ERP</h1>
                            <p className="text-blue-500 font-bold mb-8 uppercase text-xs tracking-widest">אקוופולקו חן בע"מ</p>
                            
                            <input type="text" placeholder="שם משתמש" required value={loginUsername} onChange={e=>setLoginUsername(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-4 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold" />
                            <input type="password" placeholder="סיסמה" required value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} className="w-full p-4 bg-slate-900 rounded-xl mb-6 text-center text-white outline-none border border-slate-700 focus:border-blue-500 font-bold" />
                            
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-black transition-all shadow-lg">התחברות מאובטחת</button>
                        </form>
                    </div>
                );
            }

            const roleLabels = { admin: "מנכ''ל", warehouse: "מנהל מחסן", driver: "נהג חלוקה", worker: "צוות ביצוע" };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="glass px-6 py-4 flex justify-between items-center sticky top-0 z-30 overflow-x-auto border-b border-white/5">
                        <div className="flex items-center gap-6 min-w-max">
                            <div className="flex items-center gap-4 border-l border-white/10 pl-6">
                                <img src={LOGO_URL} alt="Logo" className="h-10 bg-white rounded p-1 object-contain" onError={(e) => e.target.style.display='none'} />
                                <div>
                                    <div className="text-lg font-black text-white leading-tight">אקוופולקו חן בע"מ</div>
                                    <div className="text-[10px] font-bold text-blue-400 uppercase tracking-widest">מחובר כ: {currentUser.name} | {roleLabels[currentUser.role]}</div>
                                </div>
                            </div>
                            <nav className="flex gap-2">
                                <button onClick={() => setActiveTab("board")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'board' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📊 לוח עבודה</button>
                                
                                <button onClick={() => setActiveTab("archive")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'archive' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📁 ארכיון (הסתיימו)</button>

                                {(currentUser.role === 'admin' || currentUser.role === 'driver') && (
                                    <button onClick={() => setActiveTab("deliveries")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'deliveries' ? 'bg-cyan-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>🚚 משימות חלוקה</button>
                                )}

                                {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                    <button onClick={() => setActiveTab("inventory")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'inventory' ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>📦 מלאי מחסן</button>
                                )}
                                {currentUser.role === 'admin' && (
                                    <>
                                        <button onClick={() => setActiveTab("finance")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'finance' ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>💰 כספים</button>
                                        <button onClick={() => setActiveTab("users")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'users' ? 'bg-purple-600 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>👥 הרשאות משתמשים</button>
                                        <button onClick={() => setActiveTab("settings")} className={`px-4 py-2 rounded-lg font-bold transition-all ${activeTab === 'settings' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>⚙️ הגדרות מערכת</button>
                                    </>
                                )}
                            </nav>
                        </div>
                        <div className="flex gap-4 items-center min-w-max pr-4">
                            {currentUser.role === 'admin' && <button onClick={() => setShowAddProject(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full font-bold shadow-lg transition-all text-sm">➕ פרויקט חדש</button>}
                            <button onClick={() => setCurrentUser(null)} className="text-slate-500 hover:text-white font-bold text-sm transition-colors">התנתק</button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 md:p-8">
                        
                        {/* טאב: לוח עבודה פעיל */}
                        {activeTab === "board" && (
                            <div className="animate-fade-in max-w-[1600px] mx-auto">
                                <div className="flex justify-between items-end mb-6 gap-4 flex-wrap">
                                    <input type="text" placeholder="🔍 חפש פרויקט פעיל..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500 w-full md:w-80 font-bold" />
                                </div>

                                <div className="table-container bg-[#1e293b]/50 shadow-2xl">
                                    <table className="w-full text-right">
                                        <thead>
                                            <tr>
                                                <th className="w-2"></th>
                                                <th className="min-w-[250px]">שם פרויקט, מיקום ומחלקה</th>
                                                {stages.map(s => <th key={s.id} className="text-center">{s.label}</th>)}
                                                <th>התקדמות</th>
                                                <th className="text-center">פעולות שטח וניהול</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {activeProjectsList.length === 0 && <tr><td colSpan={stages.length + 4} className="text-center py-10 text-slate-500">אין פרויקטים פעילים להציג.</td></tr>}
                                            {activeProjectsList.map(proj => {
                                                const doneCount = stages.filter(s => proj.statuses && proj.statuses[s.id] === 3).length;
                                                const progress = stages.length ? Math.round((doneCount / stages.length) * 100) : 0;
                                                
                                                return (
                                                    <tr key={proj.id} className="group transition-colors">
                                                        <td className="border-r-4 border-blue-500"></td>
                                                        <td>
                                                            <div className="font-black text-white text-lg flex items-center gap-2">{proj.name}</div>
                                                            <div className="flex items-center gap-2 mt-1 mb-1">
                                                                <span className="text-xs text-slate-400">📍 {proj.address}</span>
                                                                <a href={`waze://?q=${encodeURIComponent(proj.address)}&navigate=yes`} className="bg-blue-600/20 text-blue-400 hover:bg-blue-600 hover:text-white px-2 py-0.5 rounded text-[10px] font-bold transition flex items-center gap-1">🚗 Waze</a>
                                                            </div>
                                                            <div className="bg-slate-800 text-slate-300 px-2 py-0.5 rounded text-[10px] font-bold inline-block border border-white/5">
                                                                מחלקה: {proj.department || 'כללי'}
                                                            </div>
                                                        </td>
                                                        
                                                        {stages.map(stage => {
                                                            const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                                                            const color = code === 3 ? "bg-[#10b981] text-white shadow-lg shadow-emerald-500/20" : code === 2 ? "bg-[#ef4444] text-white" : code === 1 ? "bg-[#f59e0b] text-white" : "bg-[#334155] text-slate-300";
                                                            const label = statusLabels[code] || "סטטוס חסר";
                                                            
                                                            return (
                                                                <td key={stage.id} onClick={() => { 
                                                                    if(currentUser.role === 'driver') return alert("לנהגים אין הרשאה לעדכון סטטוס.");
                                                                    setStatusModal({ projId: proj.id, stageId: stage.id, projName: proj.name, stageLabel: stage.label, currentCode: code });
                                                                }}>
                                                                    <div className={`status-cell ${color}`}>{label}</div>
                                                                </td>
                                                            );
                                                        })}
                                                        
                                                        <td className="px-4">
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-xs font-bold w-8 text-slate-300">{progress}%</span>
                                                                <div className="flex-1 bg-slate-800 rounded-full h-2 overflow-hidden border border-white/5">
                                                                    <div className={`h-full rounded-full transition-all duration-700 ${progress===100?'bg-emerald-500':'bg-blue-500'}`} style={{width:`${progress}%`}}></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="text-center">
                                                            <div className="flex justify-center gap-2 transition-opacity">
                                                                <button onClick={() => setMaterialsModal(proj)} title="חומרים באתר" className="p-2 bg-slate-800 hover:bg-amber-600 rounded-lg transition border border-white/5 text-lg">📦</button>
                                                                
                                                                {currentUser.role === 'admin' && (
                                                                    <>
                                                                        <button onClick={() => finishProject(proj)} title="סמן פרויקט כהסתיים והעבר לארכיון" className="p-2 bg-emerald-600/20 text-emerald-500 hover:bg-emerald-500 hover:text-white rounded-lg transition border border-emerald-500/30 text-lg font-bold">✅</button>
                                                                        <button onClick={() => deleteProject(proj.id)} title="מחק פרויקט לצמיתות" className="p-2 bg-red-600/20 text-red-500 hover:bg-red-600 hover:text-white rounded-lg transition border border-red-500/30 text-lg">🗑️</button>
                                                                    </>
                                                                )}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* טאב: ארכיון פרויקטים שהסתיימו */}
                        {activeTab === "archive" && (
                            <div className="animate-fade-in max-w-5xl mx-auto glass p-8 rounded-[2rem] border-t-4 border-indigo-500">

                                <p className="text-slate-400 text-sm mb-6 border-b border-white/10 pb-4">פרויקט: <span className="text-white font-bold">{materialsModal.name}</span></p>
                                
                                {(currentUser.role === 'admin' || currentUser.role === 'warehouse') && (
                                    <form onSubmit={handleAllocateMaterial} className="space-y-4 mb-8 bg-slate-900/50 p-4 rounded-xl border border-white/5">
                                        <select name="item" className="w-full p-3 bg-slate-800 text-white rounded-xl border border-slate-700" required>
                                            <option value="">-- בחר פריט למשיכה --</option>
                                            {inventory.filter(i => i.quantity > 0).map(i => <option key={i.id} value={i.id}>{i.name} (במלאי: {i.quantity})</option>)}
                                        </select>
                                        <input name="qty" type="number" min="1" placeholder="כמות" className="w-full p-3 bg-slate-800 text-white rounded-xl border border-slate-700" required />
                                        <button type="submit" className="w-full bg-amber-600 text-white py-3 rounded-xl font-bold">שייך לפרויקט ושלח לנהג</button>
                                    </form>
                                )}

                                <ul className="space-y-2 text-sm max-h-48 overflow-y-auto pr-2">
                                    {materialsModal.allocatedMaterials && materialsModal.allocatedMaterials.length > 0 ? 
                                        materialsModal.allocatedMaterials.map((m, i) => (
                                            <li key={i} className="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-white/5">
                                                <div>
                                                    <div className="text-white font-bold">{m.name} <span className="text-amber-400 px-2">x{m.quantity}</span></div>
                                                    <div className={`text-xs mt-1 font-bold ${m.status === 'delivered' ? 'text-emerald-400' : 'text-amber-500'}`}>
                                                        {m.status === 'delivered' ? '✓ סופק לאתר' : '⏳ ממתין להובלה'}
                                                    </div>
                                                </div>
                                            </li>
                                        )) : <li className="text-slate-500 text-center py-4">אין חומרים ששויכו.</li>
                                    }
                                </ul>
                                <button onClick={()=>setMaterialsModal(null)} className="w-full mt-6 text-slate-400 font-bold">סגור</button>
                            </div>
                        </div>
                    )}

                    {/* טופס הוספת פרויקט עם שיוך מחלקה */}
                    {showAddProject && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <form onSubmit={e => { 
                                e.preventDefault(); 
                                db.collection("projects").add({ 
                                    name: e.target.n.value, 
                                    address: e.target.a.value, 
                                    clientEmail: e.target.e.value,
                                    department: e.target.d.value, // שיוך למחלקה ספציפית
                                    statuses: {}, 
                                    isFinished: false, 
                                    createdAt: firebase.firestore.Timestamp.now() 
                                }).then(() => setShowAddProject(false)); 
                            }} className="glass p-10 rounded-[2rem] w-full max-w-md space-y-4 border-t-4 border-blue-500 shadow-2xl overflow-y-auto max-h-[90vh]">
                                <h2 className="text-white text-center text-2xl font-black mb-4">הקמת פרויקט חדש</h2>
                                <div>
                                    <label className="text-xs text-slate-400 font-bold">שם הפרויקט / לקוח</label>
                                    <input name="n" placeholder="לדוגמה: משפחת כהן" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-slate-700" required />
                                </div>
                                <div>
                                    <label className="text-xs text-blue-400 font-bold">* כתובת לניווט</label>
                                    <input name="a" placeholder="רחוב הרצל 15, כפר סבא" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-blue-500" required />
                                </div>
                                <div>
                                    <label className="text-xs text-emerald-400 font-bold">אימייל לקוח (לעדכונים)</label>
                                    <input name="e" type="email" placeholder="client@email.com" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-emerald-500" />
                                </div>
                                <div>
                                    <label className="text-xs text-amber-400 font-bold">שיוך למחלקה מורשית</label>
                                    <input name="d" placeholder="למשל: 'מחלקת טיח' (קריטי להרשאות)" className="w-full p-3 mt-1 bg-slate-900 text-white rounded-xl border border-amber-500" required />
                                    <p className="text-[10px] text-slate-400 mt-1">רק עובדים שהוגדרו במחלקה זו יוכלו לראות ולערוך את הפרויקט.</p>
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black mt-2">הקם פרויקט</button>
                                <button type="button" onClick={()=>setShowAddProject(false)} className="w-full text-slate-400 font-bold">ביטול</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
