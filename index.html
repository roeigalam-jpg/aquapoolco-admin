<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אקוופולקו חן - מערכת ניהול</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            // הגדרת המצבים (המוח של האפליקציה)
            const [showModal, setShowModal] = useState(false);
            const [projects, setProjects] = useState([
                { id: 1, name: 'וילה משפחת לוי - קיסריה', address: 'רחוב האורנים 12', team: 'צוות א - אלכס', status: 'בביצוע' },
                { id: 2, name: 'בריכת שחייה אולימפית - כפר סבא', address: 'מרכז ספורט עירוני', team: 'צוות ב - סעיד', status: 'חדש' }
            ]);

            // נתונים מהטופס
            const [newName, setNewName] = useState('');
            const [newAddress, setNewAddress] = useState('');
            const [newTeam, setNewTeam] = useState('צוות א - אלכס');

            // פונקציה שמוסיפה פרויקט חדש לרשימה
            const handleAddProject = () => {
                if(!newName) {
                    alert('נא להזין שם פרויקט');
                    return;
                }
                const newProj = {
                    id: Date.now(),
                    name: newName,
                    address: newAddress,
                    team: newTeam,
                    status: 'חדש'
                };
                setProjects([newProj, ...projects]); // הוספה לראש הרשימה
                setShowModal(false); // סגירת החלון
                setNewName(''); // ניקוי הטופס
                setNewAddress('');
            };

            return (
                <div className="min-h-screen p-4 font-sans">
                    <header className="max-w-5xl mx-auto flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-md border-b-4 border-blue-600">
                        <div>
                            <h1 className="text-3xl md:text-4xl font-black text-blue-900 italic tracking-tighter">אקוופולקו חן בע"מ</h1>
                            <p className="text-slate-500 font-bold mt-1">מערכת ניהול פרויקטים בשטח</p>
                        </div>
                        <button 
                            onClick={() => setShowModal(true)}
                            className="bg-blue-600 hover:bg-blue-700 transition-all text-white px-6 py-3 md:py-4 rounded-xl font-bold shadow-lg flex items-center gap-2 transform active:scale-95">
                            ➕ הקמת פרויקט
                        </button>
                    </header>

                    <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                        {projects.map(proj => (
                            <div key={proj.id} className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 hover:shadow-xl transition-all group">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-2xl font-black text-slate-800 group-hover:text-blue-600 transition-colors">{proj.name}</h3>
                                    <span className={`px-4 py-1 rounded-full text-sm font-black ${proj.status === 'בביצוע' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}`}>
                                        {proj.status}
                                    </span>
                                </div>
                                <div className="space-y-3 mb-6 bg-slate-50 p-4 rounded-xl">
                                    <p className="font-bold text-slate-600">📍 {proj.address}</p>
                                    <p className="font-bold text-slate-600">👷 {proj.team}</p>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button className="bg-blue-50 hover:bg-blue-100 text-blue-700 py-3 rounded-xl font-bold transition-colors">📄 תוכנית</button>
                                    <button className="bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-bold transition-colors">📏 כמויות</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* חלון פופ-אפ להוספת פרויקט */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[30px] w-full max-w-lg p-8 shadow-2xl relative animate-fade-in">
                                <button 
                                    onClick={() => setShowModal(false)}
                                    className="absolute top-6 left-6 text-slate-400 hover:text-red-500 text-2xl font-bold transition-colors">
                                    ✕
                                </button>
                                <h2 className="text-3xl font-black text-slate-900 mb-6 text-right border-r-4 border-blue-600 pr-3">פרטי פרויקט חדש</h2>
                                
                                <div className="space-y-5 text-right">
                                    <div>
                                        <label className="block text-slate-700 font-bold mb-2">שם הפרויקט או הלקוח</label>
                                        <input value={newName} onChange={e => setNewName(e.target.value)} type="text" className="w-full p-4 bg-slate-100 border-none rounded-xl outline-none font-bold focus:ring-4 focus:ring-blue-500/20 transition-all" placeholder="לדוגמה: וילה כפר סבא" />
                                    </div>
                                    <div>
                                        <label className="block text-slate-700 font-bold mb-2">כתובת האתר</label>
                                        <input value={newAddress} onChange={e => setNewAddress(e.target.value)} type="text" className="w-full p-4 bg-slate-100 border-none rounded-xl outline-none font-bold focus:ring-4 focus:ring-blue-500/20 transition-all" placeholder="עיר ורחוב" />
                                    </div>
                                    <div>
                                        <label className="block text-slate-700 font-bold mb-2">צוות מבצע</label>
                                        <select value={newTeam} onChange={e => setNewTeam(e.target.value)} className="w-full p-4 bg-slate-100 border-none rounded-xl outline-none font-bold focus:ring-4 focus:ring-blue-500/20 transition-all appearance-none cursor-pointer">
                                            <option>צוות א' - אלכס</option>
                                            <option>צוות ב' - סעיד</option>
                                            <option>צוות ג' - קבלן משנה</option>
                                        </select>
                                    </div>
                                    
                                    <button 
                                        onClick={handleAddProject}
                                        className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-xl shadow-xl shadow-blue-500/30 hover:bg-blue-700 transition-all mt-6 transform active:scale-95">
                                        שמור ועדכן את הצוות
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
