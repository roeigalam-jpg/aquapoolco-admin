<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aquapoolco Elite ERP</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg">
    
    <script>
        const manifest = { "name": "Aquapoolco ERP", "short_name": "אקוופולקו", "display": "standalone", "start_url": ".", "theme_color": "#0f172a", "background_color": "#0f172a", "icons": [{"src": "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg", "sizes": "512x512", "type": "image/jpeg", "purpose": "any maskable"}] };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.write('<link rel="manifest" href="' + URL.createObjectURL(blob) + '">');
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .table-container { overflow-x: auto; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { background: #1e293b; padding: 1rem; text-align: right; font-weight: 800; color: #94a3b8; font-size: 0.875rem; border-bottom: 2px solid #334155; white-space: nowrap; }
        td { padding: 1rem 0.5rem; border-bottom: 1px solid #334155; white-space: nowrap; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        
        .status-cell { cursor: pointer; border-radius: 0.5rem; text-align: center; font-weight: bold; padding: 0.75rem 0.5rem; transition: all 0.2s; border: 1px solid transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 3rem; }
        .status-cell:active { transform: scale(0.95); }
        
        .status-0 { background-color: #334155; color: #cbd5e1; } 
        .status-1 { background-color: #f59e0b; color: #fff; } 
        .status-2 { background-color: #ef4444; color: #fff; } 
        .status-3 { background-color: #10b981; color: #fff; } 

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        
        .signature-pad { background: white; border-radius: 8px; cursor: crosshair; touch-action: none; border: 2px solid #3b82f6; }
        .dir-ltr { direction: ltr; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDld2PBV8RugpAEZyTmkMrfBZNDZp4GkJw",
            authDomain: "aquapoolco-manager.firebaseapp.com",
            projectId: "aquapoolco-manager",
            storageBucket: "aquapoolco-manager.firebasestorage.app",
            messagingSenderId: "874091382276",
            appId: "1:874091382276:web:35865613a6705c86f89751"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const LOGO_URL = "https://raw.githubusercontent.com/roeigalam-jpg/aquapoolco-admin/main/src/logo.jpg";

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            const [projects, setProjects] = useState([]);
            const [stages, setStages] = useState([]);
            const [statusLabels, setStatusLabels] = useState({ 0: "טרם התחיל", 1: "בתהליך", 2: "מעוכב ⚠️", 3: "בוצע ✓" });
            
            const [appColor, setAppColor] = useState("#3b82f6");
            const [appFont, setAppFont] = useState("system-ui");
            const [portalName, setPortalName] = useState("אקוופולקו חן בע\"מ");
            const [officeEmail, setOfficeEmail] = useState("info@aquapoolco.co.il");
            
            const [users, setUsers] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [attendanceLogs, setAttendanceLogs] = useState([]);
            
            const [activeTab, setActiveTab] = useState("board");
            const [searchTerm, setSearchTerm] = useState("");
            
            const [showAddProject, setShowAddProject] = useState(false);
            const [showAddUser, setShowAddUser] = useState(false);
            const [editUserModal, setEditUserModal] = useState(null);
            const [assignModal, setAssignModal] = useState(null); 
            const [newUserRole, setNewUserRole] = useState("worker"); 
            const [showAddInventory, setShowAddInventory] = useState(false);
            
            const [statusModal, setStatusModal] = useState(null);
            const [finishModal, setFinishModal] = useState(null); 
            
            const [materialsModal, setMaterialsModal] = useState(null);
            const [materialReqType, setMaterialReqType] = useState("stock"); 
            const [materialSignData, setMaterialSignData] = useState(null); 
            
            // פרויקטים תמונות
            const [photosModal, setPhotosModal] = useState(null);
            const [currentProjectPhotos, setCurrentProjectPhotos] = useState([]);
            const [activePhotoFolder, setActivePhotoFolder] = useState('כללי');
            
            // מחסן תמונות
            const [inventoryItemModal, setInventoryItemModal] = useState(null);
            const [invModalTab, setInvModalTab] = useState("gallery"); 
            const [inventoryPhotos, setInventoryPhotos] = useState([]);
            
            // ניהול קבצים נבחרים ברמת סטייט
            const [statusPhotoFile, setStatusPhotoFile] = useState(null);
            const [invDeliveryFiles, setInvDeliveryFiles] = useState(null);
            
            // חתימות
            const invSigPad = useRef(null);
            const invCanvasRef = useRef(null);
            const sigPad = useRef(null);
            const canvasRef = useRef(null);
            
            const [isUploading, setIsUploading] = useState(false);
            const [signRequirement, setSignRequirement] = useState(null);

            useEffect(() => {
                db.collection("settings").doc("general").onSnapshot(doc => {
                    if (doc.exists) {
                        const d = doc.data();
                        if (d.stages) setStages(d.stages);
                        if (d.statusLabels) setStatusLabels(d.statusLabels);
                        if (d.appColor) setAppColor(d.appColor);
                        if (d.appFont) setAppFont(d.appFont);
                        if (d.portalName) setPortalName(d.portalName);
                        if (d.officeEmail) setOfficeEmail(d.officeEmail);
                    }
                });
                db.collection("projects").orderBy("createdAt", "desc").onSnapshot(snapshot => setProjects(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("users").onSnapshot(snapshot => setUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("inventory").onSnapshot(snapshot => setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                db.collection("attendance").orderBy("timestamp", "desc").limit(100).onSnapshot(snapshot => setAttendanceLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
            }, []);

            useEffect(() => {
                let unsubscribe = () => {};
                if (photosModal) {
                    unsubscribe = db.collection("project_photos").where("projId", "==", photosModal.id).orderBy("timestamp", "desc").onSnapshot(snapshot => setCurrentProjectPhotos(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                }
                return () => unsubscribe();
            }, [photosModal]);

            useEffect(() => {
                let unsubscribe = () => {};
                if (inventoryItemModal) {
                    unsubscribe = db.collection("inventory_photos").where("itemId", "==", inventoryItemModal.id).orderBy("timestamp", "desc").onSnapshot(snapshot => setInventoryPhotos(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                }
                return () => unsubscribe();
            }, [inventoryItemModal]);

            useEffect(() => {
                let timeout;
                const resizeCanvas = (ref, padRef) => {
                    if (ref.current) {
                        const canvas = ref.current;
                        const ratio = Math.max(window.devicePixelRatio || 1, 1);
                        canvas.width = canvas.offsetWidth * ratio;
                        canvas.height = canvas.offsetHeight * ratio;
                        canvas.getContext("2d").scale(ratio, ratio);
                        padRef.current = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
                    }
                };
                
                if (signRequirement || materialSignData) {
                    timeout = setTimeout(() => resizeCanvas(canvasRef, sigPad), 150);
                }
                if (inventoryItemModal && invModalTab === 'receive') {
                    timeout = setTimeout(() => resizeCanvas(invCanvasRef, invSigPad), 150);
                }
                return () => clearTimeout(timeout);
            }, [signRequirement, materialSignData, inventoryItemModal, invModalTab]);

            // ניקוי קבצים זמניים בסגירת חלונות
            useEffect(() => { if(!signRequirement) setStatusPhotoFile(null); }, [signRequirement]);
            useEffect(() => { if(!inventoryItemModal || invModalTab !== 'receive') setInvDeliveryFiles(null); }, [inventoryItemModal, invModalTab]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUsername === "roeigalam" && loginPassword === "2026") {
                    setCurrentUser({ id: "admin-roei", name: "רועי גלם (מנכ''ל)", username: "roeigalam", role: "admin", tz: "000000000", phone: "0500000000" });
                    return;
                }
                const userDoc = users.find(u => u.username === loginUsername && u.password === loginPassword);
                if (userDoc) setCurrentUser(userDoc);
                else alert("שם משתמש או סיסמה שגויים. נסה שנית.");
            };

            const logAttendanceAndLocation = (actionDetails, callback = null) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        position => {
                            db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails, lat: position.coords.latitude, lng: position.coords.longitude, timestamp: new Date().toISOString() });
                            if (callback) callback();
                        },
                        error => {
                            db.collection("attendance").add({ userId: currentUser.id, userName: currentUser.name, action: actionDetails + " (ללא מיקום)", lat: null, lng: null, timestamp: new Date().toISOString() });
                            if (callback) callback();
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } 
                    );
                } else { if (callback) callback(); }
            };

            const handleWazeClick = (proj, e) => {
                e.preventDefault();
                const wazeUrl = `waze://?q=${encodeURIComponent(proj.address)}&navigate=yes`;
                logAttendanceAndLocation(`יציאה לניווט: ${proj.name}`, () => { window.location.href = wazeUrl; });
                setTimeout(() => { window.location.href = wazeUrl; }, 1000);
            };

            const exportPDF = (proj, callback = null) => {
                // פונקציית עזר לתיקון רווחים בעברית ל-PDF
                const rtl = (text) => (text || '').toString().replace(/ /g, '&nbsp;');
                
                const element = document.createElement('div');
                const teamNames = (Array.isArray(proj.assignedUsers) && proj.assignedUsers.length > 0) 
                    ? proj.assignedUsers.map(uid => { const u = users.find(x=>x.id===uid); return u ? u.name : ''; }).filter(Boolean).join(', ')
                    : 'טרם שובץ צוות';

                let milestonesHtml = stages.map(stage => {
                    const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                    const sig = proj.signatures && proj.signatures[stage.id];
                    let signatureImage = '';
                    if (sig && sig.signatureData) {
                        signatureImage = `<tr><td colspan="4" style="text-align:center; padding: 10px; border-bottom: 1px solid #ddd;"><img src="${sig.signatureData}" style="max-height: 80px; border: 1px solid #ccc; border-radius: 4px;" crossorigin="anonymous" /></td></tr>`;
                    }
                    return `
                        <tr>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold;">${rtl(stage.label)}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${rtl(statusLabels[code])}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${sig ? `${rtl(sig.name)}<br/><span style="color:gray; font-size: 10px;">ת.ז:&nbsp;${sig.id}</span>` : '-'}</td>
                            <td style="padding: 10px; border-bottom: 1px solid #ddd;">${sig ? new Date(sig.date).toLocaleString('he-IL').replace(/ /g, '&nbsp;') : '-'}</td>
                        </tr>
                        ${signatureImage}
                    `;
                }).join('');

                element.innerHTML = `
                    <div style="direction: rtl; font-family: Arial, sans-serif; padding: 40px; color: #333; letter-spacing: 0px; word-spacing: 2px;">
                        <div style="text-align: center; margin-bottom: 20px;">
                            <img src="${LOGO_URL}" style="max-height: 100px;" crossorigin="anonymous" />
                        </div>
                        <h1 style="color: ${appColor}; text-align: center; border-bottom: 2px solid ${appColor}; padding-bottom: 10px; font-size: 24px;">${rtl(portalName)}&nbsp;-&nbsp;דוח&nbsp;סטטוס&nbsp;פרויקט</h1>
                        <h2 style="text-align: center; margin-top: 20px; font-size: 20px;">פרויקט:&nbsp;${rtl(proj.name)}</h2>
                        <div style="background-color: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 14px; border: 1px solid #e2e8f0;">
                            <p style="margin: 5px 0;"><strong>כתובת&nbsp;האתר:</strong>&nbsp;${rtl(proj.address)}</p>
                            <p style="margin: 5px 0;"><strong>צוות&nbsp;מבצע:</strong>&nbsp;${rtl(teamNames)}</p>
                            <p style="margin: 5px 0;"><strong>תאריך&nbsp;הפקת&nbsp;דוח:</strong>&nbsp;${new Date().toLocaleString('he-IL').replace(/ /g, '&nbsp;')}</p>
                        </div>
                        <h3 style="color: #475569; margin-bottom: 15px; font-size: 16px;">פירוט&nbsp;אבני&nbsp;דרך&nbsp;וחתימות:</h3>
                        <table style="width: 100%; border-collapse: collapse; text-align: right; border: 1px solid #e2e8f0; font-size: 14px;">
                            <thead><tr style="background-color: ${appColor}; color: white;"><th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">שלב&nbsp;עבודה</th><th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">סטטוס</th><th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">מאשר</th><th style="padding: 12px; border-bottom: 2px solid #cbd5e1;">תאריך</th></tr></thead>
                            <tbody>${milestonesHtml}</tbody>
                        </table>
                    </div>
                `;

                const opt = { margin: 10, filename: `דוח_פרויקט_${proj.name.replace(/ /g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                html2pdf().set(opt).from(element).save().then(() => { if (callback) callback(); });
            };

            const sendWhatsAppToClient = (proj) => {
                let phone = proj.clientPhone || '';
                if (phone) {
                    phone = phone.replace(/\D/g, '');
                    if (phone.startsWith('0')) phone = '972' + phone.substring(1);
                } else {
                    alert("שימו לב: לא הוזן טלפון לקוח בפרויקט זה. תוכלו לבחור למי לשלוח מתוך ווצאפ.");
                }
                
                let msg = `שלום, מצורף דוח סטטוס מעודכן לפרויקט ${proj.name}.\n\nלהלן פירוט השלבים:\n`;
                stages.forEach((stage, idx) => {
                    const code = (proj.statuses && proj.statuses[stage.id]) !== undefined ? proj.statuses[stage.id] : 0;
                    msg += `${idx+1}. ${stage.label} - ${statusLabels[code]}\n`;
                });
                msg += `\nבברכה,\n${portalName}`;
                
                alert("⏳ מכין ומוריד את קובץ ה-PDF...\n\nמיד ייפתח הווצאפ עם ההודעה המוכנה. אנא זכור ללחוץ על האטב 📎 בווצאפ ולצרף את הקובץ שירד לחלון הצ'אט.");
                
                exportPDF(proj, () => {
                    let waLink = `https://wa.me/?text=${encodeURIComponent(msg)}`;
                    if (phone && phone.length > 8) waLink = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
                    window.location.href = waLink;
                });
            };

            const processAndUploadFiles = (files, collectionName, extraData) => {
                if (!files || files.length === 0) return Promise.resolve([]);
                const uploadPromises = Array.from(files).map(file => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader(); 
                        reader.onload = (event) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas'); const MAX_WIDTH = 1000; 
                                const scaleSize = Math.min(1, MAX_WIDTH / img.width);
                                canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                
                                db.collection(collectionName).add({
                                    ...extraData,
                                    imageBase64: canvas.toDataURL('image/jpeg', 0.6),
                                    uploadedBy: currentUser.name,
                                    timestamp: new Date().toISOString()
                                }).then(resolve).catch(reject);
                            };
                            img.src = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    });
                });
                return Promise.all(uploadPromises);
            };

            const handleProjectPhotosUpload = (e) => {
                const files = e.target.files;
                if (!files || !files.length) return;
                setIsUploading(true);
                processAndUploadFiles(files, "project_photos", {
                    projId: photosModal.id,
                    projName: photosModal.name,
                    folder: activePhotoFolder
                }).then(() => {
                    setIsUploading(false);
                }).catch(() => {
                    alert("שגיאה בהעלאת התמונות. אנא נסה שוב.");
                    setIsUploading(false);
                });
            };

            const deletePhoto = (collection, photoId) => { if(window.confirm("למחוק את התמונה לצמיתות?")) db.collection(collection).doc(photoId).delete(); };

            const confirmSignatureAndStatus = (e) => {
                e.preventDefault();
                
                if (!currentUser.tz) return alert("⛔ שגיאה: למשתמש שלך לא מוגדרת תעודת זהות במערכת. אנא פנה למנהל.");
                if (!sigPad.current || sigPad.current.isEmpty()) return alert("חובה לחתום על המסך לאישור הסטטוס!");
                if (!statusPhotoFile) return alert("📷 חובה לצלם/לעלות תמונה מהשטח כדי לאשר סטטוס עבודה!");

                setIsUploading(true);

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const MAX_WIDTH = 1000;
                        const scaleSize = Math.min(1, MAX_WIDTH / img.width);
                        canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        db.collection("project_photos").add({
                            projId: signRequirement.projId,
                            projName: projects.find(p => p.id === signRequirement.projId)?.name,
                            folder: signRequirement.stageLabel,
                            imageBase64: canvas.toDataURL('image/jpeg', 0.6),
                            uploadedBy: currentUser.name,
                            timestamp: new Date().toISOString()
                        }).then(() => {
                            const proj = projects.find(p => p.id === signRequirement.projId);
                            logAttendanceAndLocation(`עדכון סטטוס: ${signRequirement.newStatus} בפרויקט ${proj.name}`);

                            db.collection("projects").doc(signRequirement.projId).update({
                                [`statuses.${signRequirement.stageId}`]: signRequirement.code,
                                [`signatures.${signRequirement.stageId}`]: { name: currentUser.name, id: currentUser.tz, date: new Date().toISOString(), signatureData: sigPad.current.toDataURL() }
                            }).then(() => {
                                setIsUploading(false);
                                setStatusPhotoFile(null);
                                setSignRequirement(null); 
                                setStatusModal(null);
                            });
                        }).catch(() => {
                            alert("שגיאה בהעלאת התמונה ועדכון הסטטוס.");
                            setIsUploading(false);
                        });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(statusPhotoFile);
            };

            const handleMaterialSubmit = (e) => {
                e.preventDefault();
                const data = { type: materialReqType, qty: Number(e.target.qty.value) };

                if (materialReqType === 'stock') {
                    const itemId = e.target.itemId.value;
                    const item = inventory.find(i => i.id === itemId);
                    if (!item) return alert("שגיאה בזיהוי הפריט");
                    if (item.quantity < data.qty) return alert("אין מספיק פריטים במלאי המחסן!");
                    data.itemId = itemId;
                    data.itemName = item.name;
                } else {
                    const specialText = e.target.specialText.value.trim();
                    if (!specialText) return alert("חובה להזין את פירוט הבקשה!");
                    data.itemName = "הזמנה מיוחדת: " + specialText;
                }

                if (currentUser.role === 'admin') {
                    executeMaterialAllocation(data, null);
                } else {
                    if (!currentUser.tz) return alert("לא הוגדרה ת.ז למשתמש שלך, לא ניתן לחתום.");
                    setMaterialSignData(data);
                }
            };

            const confirmMaterialSignature = () => {

                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4" onClick={() => setStatusModal(null)}>
                            <div className="bg-[#1e293b] w-full md:max-w-sm rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl" style={{ borderTop: `6px solid ${appColor}` }} onClick={e=>e.stopPropagation()}>
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>
                                <h3 className="text-center text-slate-400 text-xs font-bold uppercase tracking-wider">{statusModal.projName}</h3>
                                <h2 className="text-center text-2xl font-black text-white mb-6 border-b border-white/10 pb-4">{statusModal.stageLabel}</h2>
                                <div className="space-y-3">
                                    {[ {code: 0, label: statusLabels[0], color: "status-0"}, {code: 1, label: statusLabels[1], color: "status-1"}, {code: 2, label: statusLabels[2], color: "status-2"}, {code: 3, label: statusLabels[3], color: "status-3"} ].map(opt => (
                                        <button key={opt.code} onClick={() => {
                                            if (opt.code !== statusModal.currentCode) setSignRequirement({ projId: statusModal.projId, stageId: statusModal.stageId, code: opt.code, stageLabel: statusModal.stageLabel, newStatus: opt.label });
                                            else setStatusModal(null);
                                        }} className={`w-full py-4 rounded-xl font-black text-lg flex items-center justify-center gap-2 ${opt.color} active:scale-95 transition-transform ${statusModal.currentCode===opt.code?'ring-4 ring-white/30':''}`}>
                                            {statusModal.currentCode===opt.code && <span>📍</span>} {opt.label}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={()=>setStatusModal(null)} className="w-full mt-4 text-slate-400 font-bold py-3 active:bg-white/5 rounded-xl">ביטול</button>
                            </div>
                        </div>
                    )}

                    {/* משתמש חדש */}
                    {showAddUser && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => { 
                                e.preventDefault(); db.collection("users").add({ name: e.target.n.value, username: e.target.u.value, password: e.target.p.value, tz: e.target.tz.value, phone: e.target.phone.value, role: newUserRole }); setShowAddUser(false); 
                            }} className="bg-[#1e293b] w-full md:max-w-sm rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl" style={{ borderTop: `6px solid ${appColor}` }}>
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>
                                <h2 className="text-white text-2xl font-black mb-5">משתמש חדש</h2>
                                <div className="space-y-4">
                                    <input name="n" placeholder="שם העובד (יוצג באפליקציה)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold" required />
                                    <div className="flex gap-2">
                                        <input name="u" placeholder="שם משתמש" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" required />
                                        <input name="p" type="tel" placeholder="סיסמה" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" required />
                                    </div>
                                    <input name="tz" type="tel" maxLength="9" placeholder="תעודת זהות (חובה לצורך חתימות)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right font-black tracking-widest" required />
                                    <input name="phone" type="tel" placeholder="מספר טלפון (חובה)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right font-black tracking-widest border border-transparent focus:border-blue-500" required />
                                    <select value={newUserRole} onChange={(e) => setNewUserRole(e.target.value)} className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold">
                                        <option value="worker">צוות שטח (ביצוע בשטח)</option>
                                        <option value="driver">נהג חלוקה</option>
                                        <option value="warehouse">מנהל מחסן</option>
                                        <option value="admin">מנהל מערכת (הכל)</option>
                                    </select>
                                </div>
                                <div className="flex flex-col gap-3 mt-6">
                                    <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg active:scale-95 transition">צור משתמש</button>
                                    <button type="button" onClick={()=>setShowAddUser(false)} className="w-full text-slate-400 font-bold py-2">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* עריכת משתמש */}
                    {editUserModal && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => { 
                                e.preventDefault(); 
                                db.collection("users").doc(editUserModal.id).update({ name: e.target.n.value, username: e.target.u.value, password: e.target.p.value, tz: e.target.tz.value, phone: e.target.phone.value, role: editUserModal.role }); 
                                setEditUserModal(null); 
                            }} className="bg-[#1e293b] w-full md:max-w-sm rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl" style={{ borderTop: `6px solid ${appColor}` }}>
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>
                                <h2 className="text-white text-2xl font-black mb-5">עריכת עובד</h2>
                                <div className="space-y-4">
                                    <input name="n" defaultValue={editUserModal.name} placeholder="שם העובד" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold" required />
                                    <div className="flex gap-2">
                                        <input name="u" defaultValue={editUserModal.username} placeholder="שם משתמש" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" required />
                                        <input name="p" defaultValue={editUserModal.password} placeholder="סיסמה" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right" required />
                                    </div>
                                    <input name="tz" defaultValue={editUserModal.tz} type="tel" maxLength="9" placeholder="תעודת זהות (חובה לצורך חתימות)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right font-black tracking-widest" required />
                                    <input name="phone" defaultValue={editUserModal.phone} type="tel" placeholder="מספר טלפון (חובה)" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right font-black tracking-widest border border-transparent focus:border-blue-500" required />
                                    <select value={editUserModal.role} onChange={(e) => setEditUserModal({...editUserModal, role: e.target.value})} className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold">
                                        <option value="worker">צוות שטח (מבצע פרויקטים)</option>
                                        <option value="driver">נהג חלוקה (רואה הכל)</option>
                                        <option value="warehouse">מנהל מחסן (רואה הכל)</option>
                                        <option value="admin">מנהל מערכת (גישה מלאה להכל)</option>
                                    </select>
                                </div>
                                <div className="flex flex-col mt-6 gap-3">
                                    <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg active:scale-95 transition">שמור</button>
                                    <button type="button" onClick={()=>setEditUserModal(null)} className="w-full text-slate-400 font-bold py-2">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* יצירת פריט במלאי */}
                    {showAddInventory && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => {
                                e.preventDefault();
                                db.collection("inventory").add({
                                    name: e.target.n.value, category: e.target.c.value, quantity: Number(e.target.q.value)
                                }).then(() => setShowAddInventory(false));
                            }} className="bg-[#1e293b] w-full md:max-w-sm rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px] border-amber-500">
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>
                                <h2 className="text-white text-2xl font-black mb-5">פריט חדש במחסן</h2>
                                
                                <label className="text-xs text-slate-400 font-bold block mb-1">שם הפריט</label>
                                <input name="n" placeholder="למשל: צינור 50 מ''מ" className="w-full p-4 bg-slate-900 text-white rounded-xl mb-4 outline-none font-bold" required />
                                
                                <label className="text-xs text-slate-400 font-bold block mb-1">קטגוריה</label>
                                <input name="c" placeholder="למשל: צנרת, כימיקלים" className="w-full p-4 bg-slate-900 text-white rounded-xl mb-4 outline-none font-bold" required />
                                
                                <label className="text-xs text-slate-400 font-bold block mb-1">כמות התחלתית להזנה</label>
                                <input name="q" type="number" defaultValue="0" min="0" className="w-full p-4 bg-slate-900 text-white rounded-xl mb-6 outline-none dir-ltr text-right font-black text-xl" required />
                                
                                <div className="flex flex-col md:flex-row gap-3">
                                    <button type="submit" className="w-full bg-amber-600 text-white py-4 rounded-xl font-black text-lg active:scale-95 transition">הוסף למלאי</button>
                                    <button type="button" onClick={() => setShowAddInventory(false)} className="w-full text-slate-400 font-bold py-3 active:bg-white/5 rounded-xl">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* יצירת פרויקט חדש */}
                    {showAddProject && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => { 
                                e.preventDefault(); 
                                const assigned = getCheckedValues(e.target, 'assignedUsers');
                                db.collection("projects").add({ 
                                    name: e.target.n.value, address: e.target.a.value, clientPhone: e.target.phone.value, assignedUsers: assigned, statuses: {}, isFinished: false, createdAt: firebase.firestore.Timestamp.now() 
                                }).then(() => setShowAddProject(false)); 
                            }} className="bg-[#1e293b] w-full h-[90vh] md:h-auto md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl flex flex-col" style={{ borderTop: `6px solid ${appColor}` }}>
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden shrink-0"></div>
                                <h2 className="text-white text-2xl font-black mb-5 shrink-0">הקמת פרויקט חדש</h2>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                                    <div><label className="text-[10px] text-slate-400 font-bold uppercase block mb-1">שם פרויקט / לקוח</label><input name="n" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-black text-lg border border-transparent focus:border-blue-500" required /></div>
                                    <div><label className="text-[10px] theme-text font-bold uppercase block mb-1">* כתובת מדוייקת (לניווט בוויז)</label><input name="a" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-bold border border-transparent focus:theme-border" required /></div>
                                    <div><label className="text-[10px] text-[#25D366] font-bold uppercase block mb-1">טלפון לקוח (חובה לשליחת ווצאפ)</label><input name="phone" type="tel" placeholder="050-0000000" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none dir-ltr text-right border border-transparent focus:border-[#25D366]" required /></div>
                                    
                                    <div className="pt-2 border-t border-white/5">
                                        <label className="text-[10px] text-amber-400 font-bold uppercase block mb-2">שייך צוות (ניתן לסמן כמה):</label>
                                        <div className="bg-slate-900 rounded-2xl p-2 max-h-40 overflow-y-auto shadow-inner">
                                            {users.length === 0 && <span className="text-slate-500 text-xs p-3 block text-center">אין משתמשים</span>}
                                            {users.map(u => (
                                                <label key={u.id} className="flex items-center gap-3 p-3 cursor-pointer hover:bg-slate-800 rounded-xl transition active:bg-slate-700">
                                                    <input type="checkbox" value={u.id} name="assignedUsers" className="w-5 h-5 rounded accent-blue-500" />
                                                    <div className="flex flex-col">
                                                        <span className="text-white font-bold">{u.name}</span>
                                                        <span className="text-[10px] text-slate-500">{roleLabels[u.role]}</span>
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3 mt-4 pt-4 border-t border-white/10 shrink-0">
                                    <button type="submit" className="w-full theme-bg text-white py-4 rounded-xl font-black text-lg active:scale-95 transition shadow-lg">צור פרויקט</button>
                                    <button type="button" onClick={()=>setShowAddProject(false)} className="w-full text-slate-400 font-bold py-2">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* שיוך צוות מהיר */}
                    {assignModal && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={e => {
                                e.preventDefault(); const assigned = getCheckedValues(e.target, 'assignedUsers');
                                db.collection("projects").doc(assignModal.id).update({ assignedUsers: assigned }); setAssignModal(null);
                            }} className="bg-[#1e293b] w-full md:max-w-sm rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px] border-blue-500">
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>
                                <h2 className="text-white text-2xl font-black mb-1">שיוך צוות</h2>
                                <p className="text-blue-300 font-bold mb-4">{assignModal.name}</p>
                                <div className="max-h-[50vh] overflow-y-auto bg-slate-900 rounded-2xl p-2 mb-6 shadow-inner">
                                    {users.length === 0 && <p className="text-slate-500 text-sm p-4 text-center">אין משתמשים במערכת.</p>}
                                    {users.map(u => (
                                        <label key={u.id} className="flex items-center gap-4 p-4 cursor-pointer hover:bg-slate-800 rounded-xl transition active:bg-slate-700">
                                            <input type="checkbox" value={u.id} name="assignedUsers" defaultChecked={assignModal.users.includes(u.id)} className="w-6 h-6 rounded accent-blue-500" />
                                            <div className="flex flex-col">
                                                <span className="text-white font-black text-lg leading-none">{u.name}</span>
                                                <span className="text-xs text-slate-400 mt-1">{roleLabels[u.role]}</span>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                                <div className="flex flex-col md:flex-row gap-3">
                                    <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg active:scale-95 transition">שמור שינויים</button>
                                    <button type="button" onClick={()=>setAssignModal(null)} className="w-full text-slate-400 font-bold py-3 active:bg-white/5 rounded-xl">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* סיום פרויקט לארכיון */}
                    {finishModal && (
                        <div className="fixed inset-0 bg-slate-900/90 flex flex-col justify-end md:justify-center items-center z-50 animate-fade-in md:p-4">
                            <form onSubmit={confirmFinishProject} className="bg-[#1e293b] w-full md:max-w-md rounded-t-[2rem] md:rounded-[2rem] p-6 shadow-2xl border-t-[6px] border-emerald-500">
                                <div className="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4 md:hidden"></div>
                                <h2 className="text-white text-2xl font-black mb-2">✅ סיום פרויקט וארכיון</h2>
                                <p className="text-slate-400 text-sm mb-5">הפרויקט <strong className="text-white">{finishModal.name}</strong> יעבור לארכיון.</p>
                                
                                <div className="bg-emerald-900/30 border border-emerald-500/30 p-4 rounded-2xl mb-5">
                                    <p className="text-emerald-300 text-sm font-bold flex gap-2"><span>1️⃣</span> ה-PDF יירד למכשיר שלך הרגע.</p>
                                    <p className="text-emerald-300 text-sm font-bold flex gap-2 mt-2"><span>2️⃣</span> הווצאפ ייפתח להודעה מוכנה ללקוח. תצטרך רק לצרף את הקובץ.</p>
                                </div>
                                
                                <div className="mb-6">
                                    <label className="text-xs text-slate-400 font-bold block mb-2">טלפון נייד של הלקוח לווצאפ (אופציונלי):</label>
                                    <input name="phone" type="tel" placeholder="0501234567" className="w-full p-4 bg-slate-900 text-white rounded-xl outline-none font-black text-xl dir-ltr text-center tracking-widest border border-slate-700 focus:border-emerald-500" />
                                </div>
                                
                                <div className="flex flex-col md:flex-row gap-3">
                                    <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-xl font-black text-lg active:scale-95 transition flex items-center justify-center gap-2">
                                        סגור ושלח ווצאפ
                                    </button>
                                    <button type="button" onClick={() => setFinishModal(null)} className="w-full text-slate-400 font-bold py-3">ביטול</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
